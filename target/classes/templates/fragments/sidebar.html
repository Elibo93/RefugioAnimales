<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:fragment="sidebar(currentPage)">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    
    <aside id="app-sidebar" class="app-sidebar">
        <div class="sidebar-header">
            <a th:href="@{/web/home}" class="header-left" style="text-decoration: none; color: inherit;">
                <img th:src="@{/images/logo-Refugio.png}" class="sidebar-logo">
                <div class="app-brand">
                    <span class="app-name" th:text="#{app.name}">Refugio</span>
                    <span class="app-subtitle" th:text="#{app.subtitle}">Gestión</span>
                </div>
            </a>
            <button id="close-sidebar" class="btn-icon close-btn">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="sidebar-content">
            <div class="sidebar-section">
                <div class="user-profile-large" sec:authorize="isAuthenticated()">
                    <div class="avatar-large"><i data-lucide="user"></i></div>
                    <div class="user-info">
                        <span class="user-fullname" sec:authentication="name">User</span>
                        <span class="user-email" style="font-size: 0.75rem; color: var(--text-muted);">Conectado</span>
                    </div>
                </div>
                <div class="user-profile-large" sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        <i data-lucide="log-in"></i>
                        <span th:text="#{auth.login.title}">Iniciar Sesión</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-menu">
                    <a th:href="@{/web/home}" class="sidebar-item">
                        <i data-lucide="home"></i>
                        <span>Inicio</span>
                    </a>
                    <a th:href="@{/web/animales}" class="sidebar-item">
                        <i data-lucide="dog"></i>
                        <span th:text="#{menu.animales.card.title}">Animales</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="lang-selector-grid">
                    <a th:href="@{/login(lang=es)}" class="lang-option" th:classappend="${#locale.language == 'es'} ? 'active' : ''">
                        <span class="flag">🇪🇸</span><span>Español</span>
                    </a>
                    <a th:href="@{/login(lang=en)}" class="lang-option" th:classappend="${#locale.language == 'en'} ? 'active' : ''">
                        <span class="flag">🇬🇧</span><span>English</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="sidebar-footer" sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="width: 100%;">
                <button type="submit" class="btn-logout">
                    <i data-lucide="log-out"></i>
                    <span th:text="#{header.logout}">Cerrar Sesión</span>
                </button>
            </form>
        </div>
    </aside>
</div>

</html>
