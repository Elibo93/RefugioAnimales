services:
  # Base de datos para el microservicio de Autenticación
  db-auth:
    image: mysql:8.0
    container_name: mysql_refugio_auth
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME_AUTH}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT_AUTH}:3306"

  # Base de datos para el microservicio Backend (Negocio)
  db-backend:
    image: mysql:8.0
    container_name: mysql_refugio_backend
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME_BACKEND}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT_BACKEND}:3306"
  # Adminer (Opcional - Interfaz web para visualizar la base de datos)
