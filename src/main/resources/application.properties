# Aplicación
spring.application.name=refugio-animales

# Perfil activo - comentar para usar MySQL local, 'dev' para H2, 'prod' para producción en Docker
# spring.profiles.active=dev

# Configuración general de la aplicación
api.version=1.0
server.error.include-message=always
server.port=8443

# Configuración de la base de datos MySQL (Local Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/refugio_db?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# Configuración JPA/Hibernate - validate valida que el esquema sea correcto
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Inicialización de datos — desactivado: Flyway gestiona esquema y datos
spring.sql.init.mode=never

# Charset del servidor
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# --- FRONTEND / VIEWS (Thymeleaf) ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Mensajes / i18n
spring.messages.encoding=UTF-8
spring.messages.basename=messages

# Logging general
# logging.level.org.springframework=DEBUG

# SSL (HTTPS)
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=mi_contrasena_segura
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=springboot

# Swagger / OpenAPI - Accesible en https://localhost:8443/api-docs
springdoc.swagger-ui.path=/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.tags-sorter=alpha

# Liquibase — gestiona el esquema y los datos de prueba
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml