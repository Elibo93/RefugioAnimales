databaseChangeLog:
  - changeSet:
      id: 003-add-solicitud-adopcion-id-to-adopciones
      author: refugio
      changes:
        - addColumn:
            tableName: adopciones
            columns:
              - column:
                  name: solicitud_adopcion_id
                  type: INT
        - addForeignKeyConstraint:
            baseTableName: adopciones
            baseColumnNames: solicitud_adopcion_id
            referencedTableName: solicitudes_adopcion
            referencedColumnNames: id
            constraintName: fk_adopciones_solicitud
            onDelete: SET NULL
