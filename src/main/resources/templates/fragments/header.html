<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">




<header th:fragment="header(currentPage, showBack)" class="app-header-wrapper">
    <div class="header-banner" th:classappend="${!showBack} ? 'hero-header' : ''"></div>
    <div class="header-container">
        <div class="header-left">
            <!-- Sidebar Toggle Button (Now on the left) -->
            <button id="open-sidebar" class="sidebar-toggle-btn" title="Menú de usuario">
                <i data-lucide="menu" sec:authorize="!isAuthenticated()"></i>
                <i data-lucide="user" sec:authorize="isAuthenticated()"></i>
                <i data-lucide="chevron-right" class="toggle-arrow"></i>
            </button>

            <a th:if="${showBack}" th:href="@{/web/home}" class="back-link" title="Volver">
                <i data-lucide="arrow-left" class="back-arrow" style="width:20px;"></i>
            </a>
            <img th:src="@{/images/logo-Refugio.png}" class="app-logo">
            <div class="app-brand">
                <span class="app-name" th:text="#{app.name}">Refugio</span>
                <span class="app-subtitle" th:text="#{app.subtitle}">Gestión</span>
            </div>
        </div>
        <div class="header-right">
            <!-- empty for now or placeholders -->
        </div>
    </div>
</header>

</html>
