<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title" th:text="${voluntario.id == null ? #messages.msg('professor.form.title') : #messages.msg('professor.modal.edit.title')}">Registrar voluntario</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;" th:text="${voluntario.id == null ? #messages.msg('voluntario.form.subtitle.create') : #messages.msg('voluntario.form.subtitle.edit')}">Añada un nuevo voluntario al equipo</p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form th:action="@{${voluntario.id == null ? '/web/voluntarios/nuevo' : '/web/voluntarios/' + voluntario.id.value + '/editar'}}" method="post" th:object="${voluntario}">
                <div class="form-grid">
                    <div class="form-group">
                        <label th:text="#{professor.field.name}">Nombre</label>
                        <input type="text" name="nombre" th:field="*{nombre}" required th:attr="placeholder=#{persona.placeholder.name}" th:readonly="${voluntario.id != null}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{professor.field.surname}">Apellido</label>
                        <input type="text" name="apellido" th:field="*{apellido}" required th:attr="placeholder=#{persona.placeholder.surname}" th:readonly="${voluntario.id != null}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{professor.field.specialty}">Especialidad</label>
                        <input type="text" name="especialidad" th:field="*{especialidad}" required
                            placeholder="Ej: Veterinaria">
                    </div>

                    <div class="form-group">
                        <label th:text="#{professor.field.email}">Email</label>
                        <input type="email" name="email" th:field="*{email}" required
                            th:attr="placeholder=#{persona.placeholder.email}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{professor.field.phone}">Teléfono</label>
                        <input type="text" name="telefono" th:field="*{telefono}" th:attr="placeholder=#{persona.placeholder.phone}">
                    </div>
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/voluntarios}" class="btn btn-secondary" style="justify-content:center;"
                        th:text="#{generic.btn.cancel}">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="justify-content:center;"
                        th:text="#{generic.btn.save}">Guardar</button>
                </div>
            </form>
        </div>
    

    </div>
</body>
</html>
