<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="content">
    <div class="page-header" style="text-align:center;">
        <h1 class="page-title" th:text="${solicitud.id == null ? #messages.msg('solicitud.form.title') : #messages.msg('solicitud.modal.edit.title')}">Nueva solicitud</h1>
    </div>
    <div class="card" style="max-width:800px; margin:0 auto;">
        <form th:action="@{${solicitud.id == null ? '/web/solicitudes/nueva' : '/web/solicitudes/' + solicitud.id.value + '/editar'}}" method="post" th:object="${solicitud}">
            <div class="form-grid">
                <div class="form-group">
                    <label th:text="#{solicitud.field.animal}">Animal</label>
                    <select name="animalId" required>
                        <option value="" th:text="#{form.select.workshop}">Seleccione un animal...</option>
                        <option th:each="a : ${animales}" 
                                th:if="${a.estado.toString() == 'DISPONIBLE' or a.estado.toString() == 'EN_TRATAMIENTO' or (solicitud.animalId != null and a.id.value == solicitud.animalId.value)}"
                                th:value="${a.id.value}" th:text="${a.nombre}" 
                                th:selected="${solicitud.animalId != null and a.id.value == solicitud.animalId.value}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label th:text="#{solicitud.field.adoptante}">Solicitante</label>
                    <select name="adoptanteId" required>
                        <option value="" th:text="#{form.select.student}">Seleccione una persona...</option>
                        <option th:each="ad : ${adoptantes}" th:value="${ad.id.value}" th:text="${ad.nombre + ' ' + ad.apellido}" 
                                th:selected="${solicitud.adoptanteId != null and ad.id.value == solicitud.adoptanteId.value}"></option>
                    </select>
                </div>
                <div class="form-group" sec:authorize="hasRole('ADMIN')">
                    <label th:text="#{solicitud.field.estado}">Estado</label>
                    <select name="estado" required>
                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}" th:selected="${e == solicitud.estado}"></option>
                    </select>
                </div>
                <input type="hidden" name="estado" 
                       th:value="${solicitud.estado != null ? solicitud.estado : 'PENDIENTE'}" 
                       sec:authorize="!hasRole('ADMIN')">
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{solicitud.field.comentario}">Comentario</label>
                    <textarea name="comentario" th:text="${solicitud.comentario}"></textarea>
                </div>
            </div>
            <div class="modal-actions" style="margin-top:2rem;">
                <a th:href="@{/web/solicitudes}" class="btn btn-secondary" th:text="#{generic.btn.cancel}">Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar solicitud</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
