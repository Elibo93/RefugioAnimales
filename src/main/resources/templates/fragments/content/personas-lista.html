<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{persona.list.title}">personas</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/personas/pdf}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">Exportar PDF</span>
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/personas/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo persona</span>
                    </a>
                </div>
            </div>

            <table id="tablapersonas">
                <thead>
                    <tr>
                        <th th:text="#{persona.table.header.id}">ID</th>
                        <th th:text="#{persona.table.header.name}">Nombre</th>
                        <th th:text="#{persona.table.header.apellido}">Apellido</th>
                        <th th:text="#{persona.table.header.dni}">DNI</th>
                        <th th:text="#{persona.table.header.email}">Email</th>
                        <th th:text="#{persona.table.header.telefono}">Tlf</th>
                        <th th:text="#{persona.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-personas-body">
                    <tr th:each="a : ${personas}" th:id="'row-' + ${a.id.value}"
                        th:attr="data-id=${a.id.value}, data-email=${a.email}, data-tlf=${a.telefono}, data-dir=${a.direccion}">

                        <td th:text="${a.id.value}">1</td>
                        <td style="font-weight:600; color:var(--text-main);" th:text="${a.nombre}">Juan</td>
                        <td th:text="${a.apellido}">Pérez</td>
                        <td><span class="badge-soon" style="background:#F1F5F9; color:#64748B;"
                                th:text="${a.dni}">12345678A</span></td>
                        <td class="col-email" th:text="${a.email}">juan@mail.com</td>
                        <td class="col-tlf" th:text="${a.telefono}">600...</td>
                        <td style="display:flex; gap:8px;">
                            <a class="btn-icon" th:href="@{/web/personas/{id}/editar(id=${a.id.value})}">
                                <i data-lucide="edit-2" style="width:16px;"></i>
                            </a>
                            <button class="btn-icon delete" hx-post
                                th:hx-post="@{/web/personas/{id}/borrar(id=${a.id.value})}" hx-target
                                th:hx-target="'#row-' + ${a.id.value}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar persona?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(personas)}" style="text-align:center; padding:3rem; color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p>No hay personas registrados.</p>
            </div>
        </div>

    </div>
</body>

</html>
