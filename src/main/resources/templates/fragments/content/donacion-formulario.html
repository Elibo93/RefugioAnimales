<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="content">
    <div class="page-header" style="text-align:center;">
        <h1 class="page-title" th:text="${donacion.id == null ? #messages.msg('donacion.form.title') : #messages.msg('donacion.modal.edit.title')}">Registrar donación</h1>
    </div>
    <div class="card" style="max-width:800px; margin:0 auto;">
        <form th:action="@{${donacion.id == null ? '/web/donaciones/nueva' : '/web/donaciones/' + donacion.id.value + '/editar'}}" method="post" th:object="${donacion}">
            <div class="form-grid">
                <div class="form-group">
                    <label th:text="#{donacion.field.usuario}">Donante</label>
                    <select name="usuarioId" required>
                        <option value="" th:text="#{form.select.student}">Seleccione una persona...</option>
                        <option th:each="u : ${usuarios}" th:value="${u.id.value}" th:text="${u.nombre + ' ' + u.apellido}" 
                                th:selected="${donacion.usuarioId != null and u.id.value == donacion.usuarioId.value}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label th:text="#{donacion.field.tipo}">Tipo</label>
                    <select name="tipo" required>
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}" th:selected="${t == donacion.tipo}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label th:text="#{donacion.field.cantidad}">Cantidad</label>
                    <input type="number" step="0.01" name="cantidad" th:value="${donacion.cantidad}" required>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{donacion.field.descripcion}">Descripción</label>
                    <textarea name="descripcion" th:text="${donacion.descripcion}"></textarea>
                </div>
            </div>
            <div class="modal-actions" style="margin-top:2rem;">
                <a th:href="@{/web/donaciones}" class="btn btn-secondary" th:text="#{generic.btn.cancel}">Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar donación</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
