<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title" th:text="${adopcion.id == null ? 'Registrar Adopción' : 'Editar Adopción'}">Registrar Inscripción</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;" th:text="${adopcion.id == null ? 'Asocie una persona a un animal' : 'Modifique la asociación'}">Asocie un persona a un animal</p>
        </div>

        <div class="card" style="max-width:600px; margin:0 auto;">
            <form th:action="@{${adopcion.id == null ? '/web/adopciones/nueva' : '/web/adopciones/' + adopcion.id.value + '/editar'}}" method="post" th:object="${adopcion}">
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="form-group">
                        <label th:text="#{enrollment.field.student}">persona</label>
                        <select name="idpersona" required>
                            <option value="" disabled selected th:text="#{form.select.student}">Seleccione un persona...
                            </option>
                            <option th:each="a : ${personas}" th:value="${a.id.value}"
                                th:text="${a.nombre} + ' ' + ${a.apellido} + ' (DNI: ' + ${a.dni} + ')'"
                                th:selected="${adopcion.personaId != null and a.id.value == adopcion.personaId.value}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label th:text="#{enrollment.field.workshop}">animal</label>
                        <select name="idanimal" required>
                            <option value="" disabled selected th:text="#{form.select.workshop}">Seleccione un animal...
                            </option>
                            <option th:each="t : ${animales}" th:value="${t.id.value}"
                                th:text="${t.nombre} + ' (' + ${t.especie} + ')'"
                                th:selected="${adopcion.animalId != null and t.id.value == adopcion.animalId.value}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/adopciones}" class="btn btn-secondary" style="justify-content:center;"
                        th:text="#{generic.btn.cancel}">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="justify-content:center;"
                        th:text="#{generic.btn.save}">Guardar Inscripción</button>
                </div>
            </form>
        </div>
    

    </div>
</body>
</html>
