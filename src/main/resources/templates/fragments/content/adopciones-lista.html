<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{enrollment.list.title}">adopciones</span>
                <div style="display:flex; gap:10px; align-items: center;">
                    <form id="filterForm" th:action="@{/web/adopciones}" method="get"
                        style="display:flex; gap:10px; margin:0;">
                        <select name="adoptanteId" class="filter-select" hx-get th:hx-get="@{/web/adopciones}"
                            hx-target="#tabla-adopciones-body" hx-select="#tabla-adopciones-body"
                            hx-swap="outerHTML" hx-include="#filterForm">
                            <option value="" th:text="#{enrollment.filter.student.all}">Todo personas</option>
                            <option th:each="a : ${listaadoptantes}" th:value="${a.id.value}"
                                th:text="${personasMap[a.usuarioId] != null ? personasMap[a.usuarioId].nombre + ' ' + personasMap[a.usuarioId].apellido : 'Desconocido'}"
                                th:selected="${a.id.value == selectedAdoptanteId}">adoptante</option>
                        </select>
                        <select name="animalId" class="filter-select" hx-get th:hx-get="@{/web/adopciones}"
                            hx-target="#tabla-adopciones-body" hx-select="#tabla-adopciones-body"
                            hx-swap="outerHTML" hx-include="#filterForm">
                            <option value="" th:text="#{enrollment.filter.workshop.all}">Todo animales</option>
                            <option th:each="t : ${listaanimales}" th:value="${t.id.value}" th:text="${t.nombre}"
                                th:selected="${t.id.value == selectedanimalId}">animal</option>
                        </select>
                    </form>
                    <a class="btn btn-secondary" th:href="@{/web/adopciones/pdf}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">Exportar PDF</span>
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/adopciones/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva</span>
                    </a>
                </div>
            </div>

            <table id="tablaadopciones">
                <thead>
                    <tr>
                        <th th:text="#{enrollment.table.header.id}">ID</th>
                        <th th:text="#{enrollment.table.header.student}">persona</th>
                        <th th:text="#{enrollment.table.header.workshop}">animal</th>
                        <th th:text="#{enrollment.table.header.date}">Fecha</th>
                        <th th:text="#{enrollment.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-adopciones-body">
                    <tr th:each="i : ${adopciones}" th:id="'row-' + ${i.id.value}"
                        th:attr="data-id=${i.id.value}, data-adoptante-id=${i.adoptanteId.value}, data-adoptante-name=${adoptanteNombres[i.adoptanteId.value] ?: 'Desconocido'}, data-animal=${i.animalId.value}">
                        <td th:text="${i.id.value}">1</td>
                        <td style="font-weight:600; color:var(--text-main);"
                            th:text="${adoptanteNombres[i.adoptanteId.value] ?: 'Desconocido'}">
                            Juan Pérez</td>
                        <td style="color:var(--primary); font-weight:500;"
                            th:text="${animales[i.animalId.value].nombre}">Pintura</td>
                        <td th:text="${#temporals.format(i.fechaAdopcion, 'dd/MM/yyyy HH:mm')}">01/01/2023</td>
                        <td style="display:flex; gap:8px;">
                            <a class="btn-icon" th:href="@{/web/adopciones/{id}/editar(id=${i.id.value})}">
                                <i data-lucide="edit-2" style="width:16px;"></i>
                            </a>
                            <button class="btn-icon delete" hx-post
                                th:hx-post="@{/web/adopciones/{id}/borrar(id=${i.id.value})}" hx-target
                                th:hx-target="'#row-' + ${i.id.value}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar inscripción?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(adopciones)}"
                style="text-align:center; padding:3rem; color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{adopcion.list.empty}">No hay adopciones registradas.</p>
            </div>
        </div>

        <script th:inline="javascript">
            // Re-inicializar lucide después de HTMX swap
            document.body.addEventListener('htmx:afterSwap', function () {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });
        </script>
    </div>
</body>

</html>
