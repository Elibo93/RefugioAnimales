<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="success-modal" class="modal-overlay" id="modal" onclick="this.remove()">
    <div class="modal" onclick="event.stopPropagation()" style="text-align:center; max-width: 450px; padding: 3rem 2rem;">
        
        <div style="background: #DCFCE7; color: #15803D; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
            <i data-lucide="check-circle" style="width: 48px; height: 48px;"></i>
        </div>

        <h2 style="font-size: 1.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem;">
            ¡Solicitud Enviada!
        </h2>
        
        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;">
            Hemos registrado tu solicitud de adopción correctamente. El equipo del refugio la revisará pronto.
        </p>

        <button class="btn btn-primary" style="width: 100%; padding: 1rem;" onclick="window.location.reload()">
            Entendido
        </button>

        <script>
            lucide.createIcons();
            // Recargar automáticamente después de 5 segundos si el usuario no hace clic
            setTimeout(() => { window.location.reload(); }, 5000);
        </script>
    </div>
</div>

</body>
</html>
