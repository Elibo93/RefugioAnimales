<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>

<div th:fragment="content">

    <div class="actions-bar">
        <h2 class="page-title" th:text="#{enrollment.filter.workshop.all}">Animales</h2>

        <div class="filters-container" style="display:flex; gap:15px; align-items:center;">
            <select name="estado" 
                    hx-get="/web/animales" 
                    hx-target="#contenido-dinamico" 
                    hx-push-url="true"
                    hx-trigger="change"
                    class="form-select"
                    style="padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); cursor: pointer;">
                <option value="" th:selected="${selectedEstado == null}" th:text="#{animal.filter.all}">Todos los animales</option>
                <option value="DISPONIBLE" th:selected="${#strings.toString(selectedEstado) == 'DISPONIBLE'}" th:text="#{animal.status.available}">Disponibles</option>
                <option value="RESERVADO" th:selected="${#strings.toString(selectedEstado) == 'RESERVADO'}" th:text="#{animal.status.reserved}">Reservados</option>
                <option value="EN_TRATAMIENTO" th:selected="${#strings.toString(selectedEstado) == 'EN_TRATAMIENTO'}" th:text="#{animal.status.treatment}">En tratamiento</option>
                <option value="ADOPTADO" th:selected="${#strings.toString(selectedEstado) == 'ADOPTADO'}" th:text="#{animal.status.adopted}">Adoptados</option>
            </select>

            <div style="display:flex; gap:10px;" sec:authorize="hasAnyRole('ADMIN', 'VOLUNTARIO')">
                <a class="btn btn-secondary" th:href="@{/web/animales/pdf}" target="_blank" th:text="#{generic.link.export.pdf}">
                    Exportar PDF
                </a>

                <a class="btn btn-primary" th:href="@{/web/animales/nuevo}">
                    <i data-lucide="plus" style="width:18px;"></i>
                    <span th:text="#{generic.link.create}">+ Nuevo animal</span>
                </a>
            </div>
        </div>
    </div>

    <div class="animal-grid" id="animal-grid">
        <div th:each="a : ${animales}" 
             class="animal-card" 
             th:id="'card-' + ${a.id.value}">
            
            <div class="animal-image-wrapper">
                <img th:if="${a.foto}" th:src="${a.foto}" class="animal-image" alt="Animal">
                <img th:unless="${a.foto}" src="/images/placeholder-animal.png" class="animal-image" alt="Animal">
                <span class="animal-status-badge" th:text="${a.estado}">Disponible</span>
            </div>

            <div class="animal-info">
                <div class="animal-header">
                    <h3 class="animal-name" th:text="${a.nombre}">Luna</h3>
                </div>

                <div class="animal-meta">
                    <div class="meta-item">
                        <i data-lucide="info" style="width:14px;"></i>
                        <span th:text="${a.especie}">Perro</span>
                    </div>
                    <div class="meta-item">
                        <i data-lucide="tag" style="width:14px;"></i>
                        <span th:text="${a.raza}">Labrador</span>
                    </div>
                    <div class="meta-item">
                        <i data-lucide="calendar" style="width:14px;"></i>
                        <span th:text="${a.edad} + ' años'">3 años</span>
                    </div>
                </div>

                <p class="animal-description" th:text="${a.descripcion}">Muy tranquila y cariñosa.</p>

                <div class="animal-actions" th:if="${a.estado.toString() == 'DISPONIBLE' or a.estado.toString() == 'EN_TRATAMIENTO'}">
                    <!-- Botón para ya Adoptantes -->
                    <div sec:authorize="hasRole('ADOPTANTE')">
                        <a th:href="@{/web/solicitudes/nueva(animalId=${a.id.value})}" class="btn-adopt">
                            <i data-lucide="heart" style="width:18px; fill: currentColor;"></i>
                            !Adopta a este compañero!
                        </a>
                    </div>

                    <!-- Botón para otros roles (Público, Admin, Voluntario) para su flow correspondiente -->
                    <div sec:authorize="!hasRole('ADOPTANTE')">
                        <button class="btn-adopt"
                                th:attr="hx-get=@{/web/adoptantes/modal-convertir(animalId=${a.id.value})}"
                                hx-target="#modal-host"
                                hx-trigger="click">
                            <i data-lucide="heart" style="width:18px; fill: currentColor;"></i>
                            !Adopta a este compañero!
                        </button>
                    </div>
                </div>

                <!-- Acciones Admin (Sutiles en hover) -->
                <div class="admin-actions" sec:authorize="hasAnyRole('ADMIN', 'VOLUNTARIO')">
                    <a class="admin-btn" th:href="@{/web/animales/{id}/editar(id=${a.id.value})}">
                        <i data-lucide="edit-2" style="width:16px;"></i>
                    </a>
                    <button class="admin-btn delete"
                            th:attr="hx-post=@{/web/animales/{id}/borrar(id=${a.id.value})}, hx-target='#card-' + ${a.id.value}"
                            hx-swap="outerHTML swap:0.3s"
                            hx-confirm="¿Eliminar este animal del sistema?">
                        <i data-lucide="trash-2" style="width:16px;"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(animales)}"
         style="text-align:center;padding:5rem;color:var(--text-muted); grid-column:1/-1;">
         <i data-lucide="dog" style="width:64px; height:64px; margin-bottom:1.5rem; opacity:0.3; display:block; margin: 0 auto;"></i>
         <p th:text="#{animal.list.empty}">No hay compañeros peludos esperando por ahora.</p>
    </div>

</div>

</body>
</html>
