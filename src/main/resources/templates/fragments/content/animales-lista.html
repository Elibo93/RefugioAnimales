<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>

<div th:fragment="content">

    <div class="table-wrapper">

        <div class="actions-bar">
            <span class="user-name page">Animales</span>

            <div style="display:flex; gap:10px;">
                <a class="btn btn-secondary" th:href="@{/web/animales/pdf}" target="_blank">
                    Exportar PDF
                </a>

                <a class="btn btn-primary" th:href="@{/web/animales/nuevo}">
                    + Nuevo animal
                </a>
            </div>
        </div>

        <table id="tablaanimales">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Especie</th>
                    <th>Raza</th>
                    <th>Sexo</th>
                    <th>Chip</th>
                    <th>Estado</th>
                    <th>Notas</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="a : ${animales}" th:id="'row-' + ${a.id.value}">

                    <td th:text="${a.id.value}">1</td>

                    <td style="font-weight:600;color:var(--primary);"
                        th:text="${a.nombre}">
                        Luna
                    </td>

                    <td th:text="${a.especie}">Perro</td>

                    <td th:text="${a.raza}">Labrador</td>

                    <td th:text="${a.sexo}">Hembra</td>

                    <td th:text="${a.chipId}">CHIP001</td>

                    <td>
                        <span class="badge-soon"
                              style="background:#EFF6FF;color:var(--primary);font-weight:500;"
                              th:text="${a.estado}">
                            Disponible
                        </span>
                    </td>

                    <td th:text="${a.notas}" style="color:var(--text-muted);font-size:0.9rem;">
                        Muy tranquila
                    </td>

                    <td style="display:flex; gap:8px;">

                        <a class="btn-icon"
                           th:href="@{/web/animales/{id}/editar(id=${a.id.value})}">
                            Editar
                        </a>

                        <button class="btn-icon delete"
                                hx-post
                                th:hx-post="@{/web/animales/{id}/borrar(id=${a.id.value})}"
                                hx-target
                                th:hx-target="'#row-' + ${a.id.value}"
                                hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar animal?">

                            Borrar
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

        <div th:if="${#lists.isEmpty(animales)}"
             style="text-align:center;padding:3rem;color:var(--text-muted);">

            <p>No hay animales registrados.</p>

        </div>

    </div>

</div>

</body>
</html>
