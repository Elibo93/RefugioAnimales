<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="content">

    <div class="page-header" style="text-align:center;">
        <h1 class="page-title" th:text="${animal.id == null ? 'Crear animal' : 'Editar animal'}">Crear animal</h1>
        <p style="color:var(--text-muted); margin-top:0.5rem;" th:text="${animal.id == null ? 'Configure los detalles del nuevo animal' : 'Modifique los datos del animal'}">
            Configure los detalles del animal
        </p>
    </div>

    <div class="card" style="max-width:800px; margin:0 auto;">
        <form th:action="@{${animal.id == null ? '/web/animales/nuevo' : '/web/animales/' + animal.id.value + '/editar'}}" method="post" th:object="${animal}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" required>
                </div>

                <div class="form-group">
                    <label>Especie</label>
                    <input type="text" th:field="*{especie}" required>
                </div>

                <div class="form-group">
                    <label>Raza</label>
                    <input type="text" th:field="*{raza}">
                </div>

                <div class="form-group">
                    <label>Sexo</label>
                    <select th:field="*{sexo}">
                        <option value="Macho">Macho</option>
                        <option value="Hembra">Hembra</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Chip ID</label>
                    <input type="text" th:field="*{chipId}">
                </div>

                <div class="form-group">
                    <label>Estado</label>
                    <select th:field="*{estado}">
                        <option value="Disponible">Disponible</option>
                        <option value="Adoptado">Adoptado</option>
                        <option value="En tratamiento">En tratamiento</option>
                    </select>
                </div>

                <div class="form-group" style="grid-column:1/-1;">
                    <label>Notas</label>
                    <textarea th:field="*{notas}"></textarea>
                </div>

            </div>

            <div class="modal-actions" style="margin-top:2rem;">
                <a th:href="@{/web/animales}" class="btn btn-secondary">
                    Cancelar
                </a>

                <button type="submit" class="btn btn-primary">
                    Guardar animal
                </button>
            </div>

        </form>
    </div>

</div>
</body>
</html>
