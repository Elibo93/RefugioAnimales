<div id="modal-host" th:fragment="detalle">
    <div class="modal-glass-backdrop" onclick="document.getElementById('modal-host').innerHTML = ''">
        <div class="modal-glass-content glass-card" onclick="event.stopPropagation()">
            <!-- Close Button -->
            <button onclick="document.getElementById('modal-host').innerHTML = ''" 
                    style="position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,255,255,0.5); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
            </button>

            <!-- Gallery / Image -->
            <div class="modal-gallery">
                <img th:src="${animal.foto != null ? animal.foto : '/images/placeholder-animal.png'}" alt="Animal">
            </div>

            <!-- Content Area -->
            <div class="modal-body-detail">
                <header>
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                        <span class="status-badge" 
                              th:classappend="${animal.estado.toString() == 'DISPONIBLE' ? 'badge-available' : (animal.estado.toString() == 'RESERVADO' ? 'badge-reserved' : 'badge-treatment')}"
                              th:text="${animal.estado}">
                            Disponible
                        </span>
                        <span th:if="${animal.urgencia}" style="background: #FEE2E2; color: #DC2626; padding: 0.4rem 0.8rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700;">
                            🔥 Urgente
                        </span>
                    </div>
                    <h1 class="animal-name" th:text="${animal.nombre}" style="font-size: 3rem; margin-bottom: 0.5rem;">Rocky</h1>
                    <p style="color: var(--text-muted); font-size: 1.1rem; font-weight: 600;" th:text="${animal.raza + ' • ' + animal.edad + ' años'}">Labrador • 2 años</p>
                </header>

                <div class="quick-stats" style="background: rgba(255,255,255,0.3); padding: 1.5rem; border-radius: 20px;">
                    <div class="stat-item">
                        <i data-lucide="dog"></i>
                        <span th:text="${animal.especie}">Perro</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Especie</span>
                    </div>
                    <div class="stat-item">
                        <i data-lucide="weight"></i>
                        <span th:text="${animal.peso != null ? animal.peso + 'kg' : '-'}">12kg</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Peso</span>
                    </div>
                    <div class="stat-item">
                        <i data-lucide="zap"></i>
                        <span th:text="${animal.nivelEnergia != null ? animal.nivelEnergia + '/5' : '-'}">4/5</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Energía</span>
                    </div>
                    <div class="stat-item">
                        <i th:data-lucide="${animal.sexo.toString() == 'MACHO' ? 'mars' : 'venus'}"></i>
                        <span th:text="${animal.sexo}">Macho</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Género</span>
                    </div>
                </div>

                <div class="description-section">
                    <h4 style="margin-bottom: 1rem;">Sobre <span th:text="${animal.nombre}"></span></h4>
                    <p style="line-height: 1.6; color: var(--text-main); font-size: 1.05rem;" th:text="${animal.descripcion}">
                        Descripción detallada del animal...
                    </p>
                </div>

                <div style="margin-top: auto; display: flex; gap: 1rem;">
                    <!-- Botón de Adopción (Lógica de Seguridad) -->
                    <div style="flex: 1;">
                        <!-- No Auth -->
                        <div sec:authorize="!isAuthenticated()">
                            <a th:href="@{/web/solicitudes/nueva(animalId=${animal.id.value})}" class="btn btn-primary" style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;">
                                <i data-lucide="heart"></i>
                                <span th:text="#{animal.button.adopt}">¡Adopta!</span>
                            </a>
                        </div>
                        <!-- Public Role -->
                        <div sec:authorize="hasRole('ROLE_PUBLICO')">
                            <button class="btn btn-primary" style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;"
                                    th:attr="hx-get=@{/web/adoptantes/modal-convertir(animalId=${animal.id.value})}"
                                    hx-target="#modal-host" hx-swap="outerHTML">
                                <i data-lucide="heart"></i>
                                <span th:text="#{animal.button.adopt}">¡Adopta!</span>
                            </button>
                        </div>
                        <!-- Adoptante Role -->
                        <div sec:authorize="hasRole('ROLE_ADOPTANTE')">
                            <a th:href="@{/web/solicitudes/nueva(animalId=${animal.id.value})}" class="btn btn-primary" style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;">
                                <i data-lucide="heart"></i>
                                <span th:text="#{animal.button.adopt}">¡Adopta!</span>
                            </a>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('modal-host').innerHTML = ''" style="height: 56px; border-radius: 16px;">
                        Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</div>
