<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="content">
    <div class="page-header" style="text-align:center;">
        <h1 class="page-title" th:text="${historial.id == null ? #messages.msg('historial.form.title') : #messages.msg('historial.modal.edit.title')}">Nuevo historial médico</h1>
    </div>
    <div class="card" style="max-width:800px; margin:0 auto;">
        <form th:action="@{${historial.id == null ? '/web/historiales/nuevo' : '/web/historiales/' + historial.id.value + '/editar'}}" method="post" th:object="${historial}">
            <div class="form-grid">
                <div class="form-group">
                    <label th:text="#{historial.field.animal}">Animal</label>
                    <select name="animalId" required>
                        <option value="" th:text="#{form.select.workshop}">Seleccione un animal...</option>
                        <option th:each="a : ${animales}" th:value="${a.id.value}" th:text="${a.nombre}" 
                                th:selected="${historial.animalId != null and a.id.value == historial.animalId.value}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label th:text="#{historial.field.veterinario}">Veterinario</label>
                    <input type="text" name="veterinario" th:value="${historial.veterinario}" required>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{historial.field.descripcion}">Descripción / Motivo</label>
                    <textarea name="descripcion" th:text="${historial.descripcion}" required></textarea>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{historial.field.tratamiento}">Tratamiento</label>
                    <textarea name="tratamiento" th:text="${historial.tratamiento}"></textarea>
                </div>
            </div>
            <div class="modal-actions" style="margin-top:2rem;">
                <a th:href="@{/web/historiales}" class="btn btn-secondary" th:text="#{generic.btn.cancel}">Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar historial</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
