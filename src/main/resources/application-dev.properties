# =====================================================
# PERFIL DE DESARROLLO (application-dev.properties)
# Usa H2 en memoria - no necesitas tener MySQL corriendo
# =====================================================

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:refugiodev;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración JPA - H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Consola H2 (accesible en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf - desactivar caché para ver cambios en templates al instante
spring.thymeleaf.cache=false

# Logging de SQL para debugging
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
