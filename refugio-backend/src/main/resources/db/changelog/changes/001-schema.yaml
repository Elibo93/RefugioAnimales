databaseChangeLog:
  - changeSet:
      id: 001-create-perfiles-legales
      author: refugio
      changes:
        - createTable:
            tableName: perfiles_legales
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: usuario_id, type: INT, constraints: { nullable: false, unique: true } }
              - column: { name: nombre, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: apellido, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: dni, type: VARCHAR(20), constraints: { nullable: false, unique: true } }
              - column: { name: telefono, type: VARCHAR(20), constraints: { nullable: false } }
              - column: { name: direccion, type: VARCHAR(255) }
              - column: { name: fecha_nacimiento, type: VARCHAR(50) }

  - changeSet:
      id: 002-create-animales
      author: refugio
      changes:
        - createTable:
            tableName: animales
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: nombre, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: especie, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: especie_personalizada, type: VARCHAR(255) }
              - column: { name: raza, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: sexo, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: chip_id, type: VARCHAR(255), constraints: { nullable: false, unique: true, uniqueConstraintName: uq_animales_chip_id } }
              - column: { name: estado, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: edad, type: INT }
              - column: { name: tamano, type: VARCHAR(50) }
              - column: { name: descripcion, type: VARCHAR(1000) }
              - column: { name: foto, type: LONGTEXT }
              - column: { name: fecha_ingreso, type: DATETIME, constraints: { nullable: false } }
              - column: { name: peso, type: DOUBLE }
              - column: { name: nivel_energia, type: INT }
              - column: { name: urgencia, type: BIT, defaultValueBoolean: false }
              - column: { name: visitas, type: INT, defaultValueNumeric: 0, constraints: { nullable: false } }

  - changeSet:
      id: 003-create-adoptantes-voluntarios
      author: refugio
      changes:
        - createTable:
            tableName: adoptantes
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: estado_validacion, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: fecha_registro, type: DATETIME, constraints: { nullable: false } }
              - column: { name: usuario_id, type: INT, constraints: { nullable: false, unique: true } }
        - createTable:
            tableName: voluntarios
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: disponibilidad, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: usuario_id, type: INT, constraints: { nullable: false, unique: true } }
              - column: { name: especialidad, type: VARCHAR(100) }
              - column: { name: created_at, type: DATETIME, constraints: { nullable: false } }

  - changeSet:
      id: 004-create-operaciones-y-tareas
      author: refugio
      changes:
        - createTable:
            tableName: donaciones
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: usuario_id, type: INT, constraints: { nullable: false } }
              - column: { name: tipo, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: cantidad, type: DOUBLE, constraints: { nullable: false } }
              - column: { name: fecha, type: DATETIME, constraints: { nullable: false } }
              - column: { name: descripcion, type: VARCHAR(500) }
              - column: { name: frecuencia, type: VARCHAR(20), defaultValue: UNICA }
              - column: { name: proxima_fecha_pago, type: DATETIME }
              - column: { name: objetivo_id, type: INT }
        - createTable:
            tableName: historial_medicos
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: id_animal, type: INT, constraints: { nullable: false } }
              - column: { name: fecha, type: DATETIME, constraints: { nullable: false } }
              - column: { name: descripcion, type: VARCHAR(1000), constraints: { nullable: false } }
              - column: { name: tratamiento, type: VARCHAR(1000) }
              - column: { name: veterinario, type: VARCHAR(255) }
        - createTable:
            tableName: tareas
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: descripcion, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: fecha, type: DATETIME, constraints: { nullable: false } }
              - column: { name: estado, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: fecha_limite, type: DATETIME }
              - column: { name: instrucciones, type: VARCHAR(1000) }
        - createTable:
            tableName: voluntarios_tareas
            columns:
              - column: { name: tarea_id, type: INT, constraints: { nullable: false, primaryKey: true } }
              - column: { name: voluntario_id, type: INT, constraints: { nullable: false, primaryKey: true } }

  - changeSet:
      id: 005-create-solicitudes-adopciones
      author: refugio
      changes:
        - createTable:
            tableName: solicitudes_adopcion
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: animal_id, type: INT, constraints: { nullable: false } }
              - column: { name: adoptante_id, type: INT, constraints: { nullable: false } }
              - column: { name: fecha, type: DATETIME, constraints: { nullable: false } }
              - column: { name: estado, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: comentario, type: VARCHAR(1000) }
        - createTable:
            tableName: adopciones
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: adoptante_id, type: INT, constraints: { nullable: false } }
              - column: { name: animal_id, type: INT, constraints: { nullable: false, unique: true } }
              - column: { name: fecha_adopcion, type: DATETIME, constraints: { nullable: false } }
              - column: { name: estado, type: VARCHAR(50), constraints: { nullable: false } }
              - column: { name: contrato, type: VARCHAR(500) }
              - column: { name: solicitud_adopcion_id, type: INT }

  - changeSet:
      id: 006-add-fks
      author: refugio
      changes:
        - addForeignKeyConstraint: { baseTableName: historial_medicos, baseColumnNames: id_animal, referencedTableName: animales, referencedColumnNames: id, constraintName: fk_historial_animal, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: solicitudes_adopcion, baseColumnNames: animal_id, referencedTableName: animales, referencedColumnNames: id, constraintName: fk_solicitudes_animal, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: solicitudes_adopcion, baseColumnNames: adoptante_id, referencedTableName: adoptantes, referencedColumnNames: id, constraintName: fk_solicitudes_adoptante, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: adopciones, baseColumnNames: adoptante_id, referencedTableName: adoptantes, referencedColumnNames: id, constraintName: fk_adopciones_adoptante, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: adopciones, baseColumnNames: animal_id, referencedTableName: animales, referencedColumnNames: id, constraintName: fk_adopciones_animal, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: adopciones, baseColumnNames: solicitud_adopcion_id, referencedTableName: solicitudes_adopcion, referencedColumnNames: id, constraintName: fk_adopciones_solicitud, onDelete: SET NULL }
        - addForeignKeyConstraint: { baseTableName: voluntarios_tareas, baseColumnNames: tarea_id, referencedTableName: tareas, referencedColumnNames: id, constraintName: fk_vt_tarea, onDelete: CASCADE }
        - addForeignKeyConstraint: { baseTableName: voluntarios_tareas, baseColumnNames: voluntario_id, referencedTableName: voluntarios, referencedColumnNames: id, constraintName: fk_vt_voluntario, onDelete: CASCADE }

  - changeSet:
      id: 007-create-objetivos-donacion
      author: refugio
      changes:
        - createTable:
            tableName: objetivos_donacion
            columns:
              - column: { name: id, type: INT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: titulo, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: descripcion, type: TEXT }
              - column:
                  name: monto_objetivo
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: monto_recaudado
                  type: DOUBLE
                  defaultValueNumeric: 0.0
              - column: { name: prioridad, type: VARCHAR(20), defaultValue: "MEDIA" }
              - column: { name: estado, type: VARCHAR(20), defaultValue: "ACTIVO" }
              - column: { name: fecha_inicio, type: DATETIME, defaultValueComputed: "now()" }
              - column: { name: fecha_limite, type: DATETIME }
              - column: { name: icono, type: VARCHAR(50) }
  - changeSet:
      id: 008-add-fk-donaciones-objetivo
      author: refugio
      changes:
        - addForeignKeyConstraint:
            baseTableName: donaciones
            baseColumnNames: objetivo_id
            referencedTableName: objetivos_donacion
            referencedColumnNames: id
            constraintName: fk_donaciones_objetivo
