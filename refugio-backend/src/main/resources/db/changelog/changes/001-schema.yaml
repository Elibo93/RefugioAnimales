- changeSet:
    id: 006-add-fks
    author: refugio
    changes:
    - addForeignKeyConstraint:
        baseTableName: historial_medicos
        baseColumnNames: id_animal
        referencedTableName: animales
        referencedColumnNames: id
        constraintName: fk_historial_animal
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: solicitudes_adopcion
        baseColumnNames: animal_id
        referencedTableName: animales
        referencedColumnNames: id
        constraintName: fk_solicitudes_animal
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: solicitudes_adopcion
        baseColumnNames: adoptante_id
        referencedTableName: adoptantes
        referencedColumnNames: id
        constraintName: fk_solicitudes_adoptante
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: adopciones
        baseColumnNames: adoptante_id
        referencedTableName: adoptantes
        referencedColumnNames: id
        constraintName: fk_adopciones_adoptante
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: adopciones
        baseColumnNames: animal_id
        referencedTableName: animales
        referencedColumnNames: id
        constraintName: fk_adopciones_animal
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: adopciones
        baseColumnNames: solicitud_adopcion_id
        referencedTableName: solicitudes_adopcion
        referencedColumnNames: id
        constraintName: fk_adopciones_solicitud
        onDelete: SET NULL
    - addForeignKeyConstraint:
        baseTableName: voluntarios_tareas
        baseColumnNames: tarea_id
        referencedTableName: tareas
        referencedColumnNames: id
        constraintName: fk_vt_tarea
        onDelete: CASCADE
    - addForeignKeyConstraint:
        baseTableName: voluntarios_tareas
        baseColumnNames: voluntario_id
        referencedTableName: voluntarios
        referencedColumnNames: id
        constraintName: fk_vt_voluntario
        onDelete: CASCADE
