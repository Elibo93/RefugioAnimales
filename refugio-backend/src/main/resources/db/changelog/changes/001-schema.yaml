        - column:
            name: raza
            type: VARCHAR(255)
            constraints:
              nullable: false
        - column:
            name: sexo
            type: VARCHAR(50)
            constraints:
              nullable: false
        - column:
            name: chip_id
            type: VARCHAR(255)
            constraints:
              nullable: false
              unique: true
              uniqueConstraintName: uq_animales_chip_id
        - column:
            name: estado
            type: VARCHAR(50)
            constraints:
              nullable: false
        - column:
            name: edad
            type: INT
        - column:
            name: tamano
            type: VARCHAR(50)
        - column:
            name: descripcion
            type: VARCHAR(1000)
        - column:
