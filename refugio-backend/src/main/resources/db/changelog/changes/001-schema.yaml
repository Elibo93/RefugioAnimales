databaseChangeLog:
- changeSet:
    id: 001-create-perfiles-legales
    author: refugio
    changes:
    - createTable:
        tableName: perfiles_legales
        columns:
        - column:
            name: id
            type: INT
            autoIncrement: true
            constraints:
              primaryKey: true
              nullable: false
        - column:
            name: usuario_id
            type: INT
            constraints:
              nullable: false
              unique: true
        - column:
            name: nombre
            type: VARCHAR(255)
            constraints:
              nullable: false
        - column:
            name: apellido
            type: VARCHAR(255)
            constraints:
              nullable: false
        - column:
            name: dni
            type: VARCHAR(20)
            constraints:
              nullable: false
              unique: true
        - column:
            name: telefono
            type: VARCHAR(20)
            constraints:
              nullable: false
        - column:
            name: direccion
            type: VARCHAR(255)
        - column:
            name: fecha_nacimiento
            type: VARCHAR(50)
