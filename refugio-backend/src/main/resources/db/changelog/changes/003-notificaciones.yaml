databaseChangeLog:
  - changeSet:
      id: 009-create-notificaciones
      author: refugio
      changes:
        - createTable:
            tableName: notificaciones
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: usuario_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: titulo
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: mensaje
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: fecha
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: leida
                  type: BIT
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: VARCHAR(50)
              - column:
                  name: enlace
                  type: VARCHAR(255)
