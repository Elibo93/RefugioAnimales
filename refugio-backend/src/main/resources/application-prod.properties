# =====================================================
# PERFIL DE PRODUCCIÓN (application-prod.properties)
# Los valores sensibles se inyectan como variables de entorno
# (ver docker-compose.yml)
# =====================================================

# Base de datos MySQL - los valores los sobreescribe docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/refugio_db?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - en producción NUNCA usar update/create-drop
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf - activar caché en producción para mejor rendimiento
spring.thymeleaf.cache=true

# Logging reducido en producción
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
