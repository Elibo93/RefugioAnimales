# ============================================================
# liquibase.properties
# Configuración del plugin liquibase-maven-plugin
# Uso: mvn liquibase:diff, mvn liquibase:status, mvn liquibase:validate
# ============================================================

# Conexión a la base de datos actual (target)
url=jdbc:mysql://localhost:3306/refugio_db?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8
username=root
password=root
driver=com.mysql.cj.jdbc.Driver

# Changelog maestro
changeLogFile=src/main/resources/db/changelog/db.changelog-master.yaml

# Referencia: entidades JPA (para mvn liquibase:diff)
# Compara el estado actual de la BD con el modelo JPA para generar cambios automáticamente
referenceUrl=hibernate:spring:es.refugio?dialect=org.hibernate.dialect.MySQL8Dialect&hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Donde se guarda el diff generado (puedes cambiar la versión manualmente)
outputChangeLogFile=src/main/resources/db/changelog/changes/generated-diff.yaml
