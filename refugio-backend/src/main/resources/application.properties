# Aplicación
spring.application.name=REFUGIO-BACKEND

# Perfil activo - comentar para usar MySQL local, 'dev' para H2, 'prod' para producción en Docker
# spring.profiles.active=dev

# Configuración general de la aplicación
api.version=1.0
server.error.include-message=always
server.port=8081

# CRÍTICO: usar los headers X-Forwarded-* del API Gateway para construir URLs de redirección
# Sin esto, Spring Security redirige a la IP interna del backend (192.168.0.202:8081)
# en lugar de al Gateway (localhost:8443), rompiendo la sesión.
server.forward-headers-strategy=native

# Eureka — el backend se registra para que el Gateway lo descubra por nombre
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Deshabilitar el verificador de compatibilidad de Spring Cloud
# (Spring Boot 3.5.x es funcional con Spring Cloud 2024.0.x aunque el verifier protesta)
spring.cloud.compatibility-verifier.enabled=false

# --- CAMBIOS PARA LA BASE DE DATOS COMPARTIDA EN LA NUBE ---
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT_BACKEND}/${DB_NAME_BACKEND}?useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# -----------------------------------------------------------

# Configuración JPA/Hibernate - validate valida que el esquema sea correcto
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Inicialización de datos — desactivado: Flyway/Liquibase gestiona esquema y datos
spring.sql.init.mode=never

# Charset del servidor
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# --- FRONTEND / VIEWS (Thymeleaf) ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging general
logging.level.org.springframework=INFO
logging.level.es.refugio.refugio=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=backend.log

# SSL — desactivado: el backend corre en HTTP puro (puerto 8081).
# El certificado SSL está en el API Gateway, que es el único punto de entrada externo.

# Swagger / OpenAPI - Accesible en http://localhost:8081/api-docs
springdoc.swagger-ui.path=/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.tags-sorter=alpha
# Limitar el escaneo de Swagger solo al paquete de REST controllers
springdoc.packages-to-scan=es.refugio.refugio.infraestructure.web.rest,es.refugio.auth.infrastructure.inbound

# Liquibase — gestiona el esquema y los datos de prueba
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml


# Configuración Multipart (Subida de archivos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Claves JWT compartidas para decodificar (Variables de entorno con Fallback local)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
