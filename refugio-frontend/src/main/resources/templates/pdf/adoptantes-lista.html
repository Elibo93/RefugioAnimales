<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{pdf/pdf-layout :: pdf-head-landscape(#{pdf.adoptante.header})}"></th:block>
    <style>
        table { font-size: 8.2px; }
        th { font-size: 7.8px; padding: 5px 6px; }
        td { padding: 5px 6px; }
    </style>
</head>
<body>
    <div class="watermark" th:text="#{generic.auto.adoptify}"></div>
    <div class="header-container">
        <div class="logo-container">
            <span class="logo-text">[[#{html.auto.adoptify}]]<span class="logo-dot">.</span></span>
        </div>
        <div class="meta-container">
            <div class="doc-title" th:text="#{pdf.adoptante.header}">Listado [[#{html.auto.de}]] Adoptantes</div>
            <div class="doc-date" th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy HH:mm')}">19/05/2026 09:00</div>
        </div>
        <div class="clear"></div>
    </div>

    <h1 th:text="#{pdf.adoptante.header}">Listado [[#{html.auto.de}]] Adoptantes</h1>
    <table>
        <thead>
            <tr>
                <th style="width: 3%;" th:text="#{pdf.column.id}">ID</th>
                <th style="width: 8%;" th:text="#{adoptante.field.usuarioId}">ID Usuario</th>
                <th style="width: 10%;" th:text="#{pdf.column.username}">Username</th>
                <th style="width: 12%;" th:text="#{pdf.column.email}">[[#{generic.auto.email}]]</th>
                <th style="width: 10%;" th:text="#{adoptante.table.header.name}">Nombre</th>
                <th style="width: 10%;" th:text="#{adoptante.table.header.surname}">Apellido</th>
                <th style="width: 8%;" th:text="#{pdf.column.dni}">DNI</th>
                <th style="width: 8%;" th:text="#{pdf.column.phone}">Teléfono</th>
                <th style="width: 13%;" th:text="#{pdf.column.address}">Dirección</th>
                <th style="width: 7%;" th:text="#{pdf.column.birthdate}">F. Nacimiento</th>
                <th style="width: 5%;" th:text="#{pdf.column.status}">[[#{generic.auto.status}]]</th>
                <th style="width: 6%;" th:text="#{pdf.column.registration}">F. Registro</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${adoptantes}" th:with="u=${usuariosMap != null ? usuariosMap['' + a.usuarioId] : null}, p=${perfilesMap != null ? perfilesMap['' + a.usuarioId] : null}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.usuarioId}"></td>
                <td th:text="${u != null ? u.username : '-'}"></td>
                <td th:text="${u != null ? u.email : '-'}"></td>
                <td th:text="${p != null ? p.nombre : '-'}"></td>
                <td th:text="${p != null ? p.apellido : ''}"></td>
                <td th:text="${p != null ? p.dni : '-'}"></td>
                <td th:text="${p != null ? p.telefono : '-'}"></td>
                <td th:text="${p != null ? p.direccion : '-'}"></td>
                <td th:text="${p != null ? p.fechaNacimiento : '-'}"></td>
                <td>
                    <span class="badge" 
                          th:classappend="${a.estadoValidacion == 'APROBADO' ? 'badge-success' : (a.estadoValidacion == 'RECHAZADO' ? 'badge-danger' : 'badge-warning')}" 
                          th:text="${a.estadoValidacion}"></span>
                </td>
                <td th:text="${a.fechaRegistro != null} ? ${#temporals.format(a.fechaRegistro, 'dd/MM/yyyy HH:mm')} : '-'"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
