<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Listado de Adoptantes</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            color: #333;
        }

        h1 {
            color: #4f46e5;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 12px;
        }

        th {
            background-color: #f3f4f6;
            color: #000;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ccc;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>

<body>
    <h1>Listado de Adoptantes</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>DNI</th>
                <th>Dirección</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${adoptantes}" th:with="u=${usuariosMap != null ? usuariosMap['' + a.usuarioId] : null}, p=${perfilesMap != null ? perfilesMap['' + a.usuarioId] : null}">
                <td th:text="${a.id}"></td>
                <td th:text="${p != null ? p.nombre : (u != null ? u.username : 'Usuario ' + a.usuarioId)}"></td>
                <td th:text="${p != null ? p.apellido : ''}"></td>
                <td th:text="${p != null ? p.dni : '-'}"></td>
                <td th:text="${p != null ? p.direccion : '-'}"></td>
                <td th:text="${a.estadoValidacion}"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
