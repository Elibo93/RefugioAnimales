<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title th:text="#{pdf.adopciones.title}">Listado de adopciones</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            color: #333;
        }

        h1 {
            color: #4f46e5;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 12px;
        }

        th {
            background-color: #f3f4f6;
            color: #000;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ccc;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>

<body>
    <h1 th:text="#{pdf.adopciones.header}">Listado de adopciones</h1>
    <table>
        <thead>
            <tr>
                <th th:text="#{pdf.column.id}">ID</th>
                <th th:text="#{pdf.column.personaId}">persona</th>
                <th th:text="#{pdf.column.animalId}">animal</th>
                <th th:text="#{pdf.column.date}">Fecha</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="i : ${adopciones}">
                <td th:text="${i.id}"></td>
                <td>
                    <span th:text="${adoptanteNombres != null ? adoptanteNombres.get(i.adoptanteId.toString()) : 'Adoptante #' + i.adoptanteId}">
                    </span>
                </td>
                <td>
                    <span th:text="${animalesMap != null ? animalesMap.get(i.animalId.toString()) : 'Animal #' + i.animalId}">
                    </span>
                </td>
                <td th:text="${i.fechaAdopcion != null} ? ${#temporals.format(i.fechaAdopcion, 'dd/MM/yyyy')} : '-'"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
