<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Listado de donaciones</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        h1 { color: #4f46e5; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th { background-color: #f3f4f6; color: #000; padding: 10px; text-align: left; border-bottom: 2px solid #ccc; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>
    <h1>Listado oficial de donaciones</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Donante (ID)</th>
                <th>Tipo</th>
                <th>Cantidad</th>
                <th>Fecha</th>
                <th>Descripción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="d : ${donaciones}">
                <td th:text="${d.id.value}"></td>
                <td th:text="${d.usuarioId.value}"></td>
                <td th:text="${d.tipo}"></td>
                <td th:text="${d.cantidad}"></td>
                <td th:text="${#temporals.format(d.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${d.descripcion}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
