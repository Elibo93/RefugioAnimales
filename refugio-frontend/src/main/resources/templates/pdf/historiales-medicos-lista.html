<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Historiales Médicos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        h1 { color: #4f46e5; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 11px; }
        th { background-color: #f3f4f6; color: #000; padding: 10px; text-align: left; border-bottom: 2px solid #ccc; }
        td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: top; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>
    <h1>Listado de Historiales Médicos</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Animal (ID)</th>
                <th>Fecha</th>
                <th>Veterinario</th>
                <th>Descripción</th>
                <th>Tratamiento</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${historiales}">
                <td th:text="${h.id.value}"></td>
                <td th:text="${h.animalId.value}"></td>
                <td th:text="${#temporals.format(h.fecha, 'dd/MM/yyyy')}"></td>
                <td th:text="${h.veterinario}"></td>
                <td th:text="${h.descripcion}"></td>
                <td th:text="${h.tratamiento}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
