<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Listado de Tareas</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        h1 { color: #4f46e5; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th { background-color: #f3f4f6; color: #000; padding: 10px; text-align: left; border-bottom: 2px solid #ccc; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>
    <h1>Listado oficial de Tareas</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Voluntarios (IDs)</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${tareas}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.descripcion}"></td>
                <td th:text="${t.estado}"></td>
                <td th:text="${#temporals.format(t.fecha, 'dd/MM/yyyy')}"></td>
                <td>
                    <span th:each="v, iterStat : ${t.voluntarioIds}" th:text="${v} + ${iterStat.last ? '' : ', '}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
