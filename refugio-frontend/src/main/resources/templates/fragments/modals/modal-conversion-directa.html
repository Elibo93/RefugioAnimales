<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="modal" class="modal-overlay" id="modal-host"
        onclick="if(event.target == this) this.innerHTML = ''">
        <div class="modal" onclick="event.stopPropagation()">

            <div style="text-align:center; margin-bottom: 2rem;">
                <div
                    style="background: var(--primary-light); color: var(--primary); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                    <i data-lucide="heart" style="width: 32px; height: 32px; fill: currentColor;"></i>
                </div>
                <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem;">
                    ¡Casi listo para adoptar a <span th:text="${animal.get('nombre')}">Rocky</span>!
                </h2>
                <p style="color: var(--text-muted); font-size: 0.95rem;">
                    Necesitamos completar tu perfil antes de procesar la solicitud.
                </p>
            </div>

            <!-- Mensaje de Error -->
            <div th:if="${errorMessage}" class="alert alert-danger"
                style="margin-bottom: 1.5rem; padding: 1rem; border-radius: 12px; border: 1px solid #fee2e2; background: #fef2f2; color: #991b1b; display: flex; align-items: center; gap: 0.75rem;">
                <i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i>
                <span th:text="${errorMessage}">Ocurrió un error al procesar la solicitud.</span>
            </div>

            <form th:attr="hx-post=@{/web/adoptantes/convertir-y-solicitar}" hx-ext="json-enc" hx-target="#modal-host"
                hx-swap="outerHTML">

                <input type="hidden" name="animalId" th:value="${animal.get('id').get('value')}">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" name="nombre" th:value="${usuario.get('nombre')}" required>
                    </div>

                    <div class="form-group">
                        <label>Apellidos</label>
                        <input type="text" name="apellido" th:value="${usuario.get('apellido')}" required>
                    </div>

                    <div class="form-group">
                        <label>DNI / NIE</label>
                        <input type="text" name="dni" placeholder="Ej: 12345678X" required>
                    </div>

                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" required>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Dirección completa</label>
                        <input type="text" name="direccion" placeholder="Calle, número, piso, ciudad" required>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>¿Por qué quieres adoptarlo? (Opcional)</label>
                        <textarea name="comentario"
                            placeholder="Cuéntanos un poco sobre ti y por qué has elegido a este peludo..."
                            style="width: 100%; min-height: 80px; padding: 0.75rem; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.5); font-family: inherit;"></textarea>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary"
                        onclick="document.getElementById('modal-host').innerHTML = ''">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Confirmar y Solicitar
                    </button>
                </div>
            </form>

        </div>
    </div>

</body>

</html>
