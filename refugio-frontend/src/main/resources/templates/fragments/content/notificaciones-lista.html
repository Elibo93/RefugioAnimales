<div th:fragment="content">
    <div class="notif-header">
        <h1 class="notif-title">Tu Buzón</h1>
        <p class="notif-subtitle">Mantente al día con las novedades de tus solicitudes y tareas.</p>
    </div>

    <div class="notifications-container">
        <!-- Estado vacío -->
        <div th:if="${#lists.isEmpty(notificaciones)}" class="notif-empty-state">
            <div class="notif-empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
            </div>
            <h3 class="notif-empty-title">No tienes notificaciones</h3>
            <p class="notif-empty-text">Te avisaremos cuando haya novedades importantes para ti.</p>
        </div>

        <!-- Lista de notificaciones -->
        <div th:each="notif : ${notificaciones}" 
             th:id="'notif-' + ${notif.id}"
             th:class="${notif.leida} ? 'notif-card notif-read' : 'notif-card notif-unread'"
             th:attr="hx-post=${!notif.leida} ? @{/web/notificaciones/{id}/leer(id=${notif.id})} : null"
             hx-trigger="click" hx-swap="none"
             th:data-enlace="${notif.enlace}"
             onclick="const enlace = this.getAttribute('data-enlace'); 
                      this.classList.add('notif-read'); 
                      this.classList.remove('notif-unread'); 
                      const notifDot = this.querySelector('.notif-status-dot'); 
                      if(notifDot) notifDot.remove();
                      if(enlace && enlace !== 'null' && enlace !== '') {
                          window.location.href = enlace;
                      }"
             style="cursor: pointer;">
            
            <!-- Indicador visual de no leída (punto) -->
            <div th:if="${!notif.leida}" class="notif-status-dot"></div>

            <!-- Contenedor del Icono -->
            <div class="notif-icon-container">
                <!-- SVG Tarea -->
                <svg th:if="${notif.tipo == 'TAREA'}" class="icon-tarea" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
                <!-- SVG Adopción -->
                <svg th:if="${notif.tipo == 'ADOPCION'}" class="icon-adopcion" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                <!-- SVG General -->
                <svg th:if="${notif.tipo != 'TAREA' and notif.tipo != 'ADOPCION'}" class="icon-general" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </div>

            <!-- Cuerpo de la notificación -->
            <div class="notif-body">
                <div class="notif-info-row">
                    <h4 class="notif-card-title" th:text="${notif.titulo}">Título</h4>
                    <span class="notif-date" th:text="${notif.fecha}">Fecha</span>
                </div>
                <p class="notif-message" th:text="${notif.mensaje}">Mensaje</p>

                <!-- Botones de Acción -->
                <div class="notif-actions">
                    <button th:if="${!notif.leida}" 
                            th:attr="hx-post=@{/web/notificaciones/{id}/leer(id=${notif.id})}"
                            hx-trigger="click" hx-swap="none"
                            onclick="event.stopPropagation(); const card = this.closest('.notif-card'); card.classList.add('notif-read'); card.classList.remove('notif-unread'); const d = card.querySelector('.notif-status-dot'); if(d) d.remove(); setTimeout(() => this.remove(), 100);"
                            class="btn-mark-read">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Marcar como leída
                    </button>

                    <button th:attr="hx-delete=@{/web/notificaciones/{id}(id=${notif.id})}"
                            hx-trigger="click" hx-target="closest .notif-card" hx-swap="delete"
                            onclick="event.stopPropagation();"
                            class="btn-delete-notif">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        Eliminar
                    </button>
                    
                    <span th:if="${notif.enlace != null}" class="btn-mark-read" style="margin-left: auto;">
                        Ver detalle →
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
