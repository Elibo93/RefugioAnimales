<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="content">
        <div class="content-header" style="margin-bottom: 2rem;">
            <div class="header-info">
                <h1 style="font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #0f172a 0%, #334155 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Tu Buzón
                </h1>
                <p style="color: #64748b; font-size: 1.1rem; margin-top: 0.5rem; font-weight: 500;">
                    Mantente al día con las novedades de tus solicitudes y tareas.
                </p>
            </div>
        </div>

        <div class="notifications-container" style="max-width: 800px; margin: 0 auto;">
            <div th:if="${#lists.isEmpty(notificaciones)}" 
                 style="text-align: center; padding: 4rem 2rem; background: white; border-radius: 24px; border: 2px dashed #e2e8f0;">
                <div style="background: #f1f5f9; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i data-lucide="bell-off" style="width: 32px; color: #94a3b8;"></i>
                </div>
                <h3 style="font-weight: 700; color: #1e293b; margin-bottom: 0.5rem;">No tienes notificaciones</h3>
                <p style="color: #64748b;">Te avisaremos cuando haya novedades importantes para ti.</p>
            </div>

            <div th:each="notif : ${notificaciones}" 
                 th:id="'notif-' + ${notif.id}"
                 th:classappend="${notif.leida ? 'notif-read' : 'notif-unread'}"
                 style="background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; transition: all 0.3s ease; display: flex; gap: 1.25rem; align-items: flex-start; position: relative;">
                
                <!-- Icono según tipo -->
                <div class="notif-icon" th:switch="${notif.tipo}"
                     style="width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <i th:case="'ADOPCION'" data-lucide="heart" style="color: #e11d48;"></i>
                    <i th:case="'TAREA'" data-lucide="clipboard-check" style="color: #0891b2;"></i>
                    <i th:case="*" data-lucide="bell" style="color: #64748b;"></i>
                </div>

                <div class="notif-content" style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem;">
                        <h4 style="margin: 0; font-weight: 700; color: #1e293b; font-size: 1.1rem;" th:text="${notif.titulo}">Título</h4>
                        <span style="font-size: 0.8rem; color: #94a3b8; font-weight: 500;" 
                              th:text="${#temporals.format(notif.fecha, 'dd MMM, HH:mm')}">Fecha</span>
                    </div>
                    <p style="color: #475569; margin: 0; line-height: 1.5;" th:text="${notif.mensaje}">Mensaje</p>
                    
                    <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: center;">
                        <a th:if="${notif.enlace != null}" th:href="${notif.enlace}" 
                           class="btn-notif-action" style="font-size: 0.85rem; font-weight: 700; color: #2563eb; text-decoration: none; display: flex; align-items: center; gap: 0.4rem;">
                            Ver más <i data-lucide="arrow-right" style="width: 14px;"></i>
                        </a>
                        
                        <button th:if="${!notif.leida}" 
                                th:attr="hx-post=@{/web/notificaciones/{id}/leer(id=${notif.id})}"
                                hx-swap="outerHTML"
                                th:hx-target="'#notif-' + ${notif.id}"
                                style="background: none; border: none; font-size: 0.85rem; color: #94a3b8; cursor: pointer; font-weight: 600; padding: 0; transition: color 0.2s;">
                            Marcar como leída
                        </button>
                    </div>
                </div>

                <div th:if="${!notif.leida}" class="unread-dot" 
                     style="width: 10px; height: 10px; background: #2563eb; border-radius: 50%; position: absolute; top: 1.5rem; right: 1rem;"></div>
            </div>
        </div>

        <style>
            .notif-unread {
                border-left: 4px solid #2563eb !important;
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.05);
            }
            .notif-read {
                opacity: 0.7;
                background: #f8fafc !important;
            }
            .notif-icon {
                background: #f1f5f9;
            }
            .notif-unread .notif-icon {
                background: #eff6ff;
            }
            .btn-notif-action:hover {
                text-decoration: underline !important;
            }
        </style>
        
        <script>
            if (window.lucide) {
                lucide.createIcons();
            }
        </script>
    </div>
</body>
</html>
