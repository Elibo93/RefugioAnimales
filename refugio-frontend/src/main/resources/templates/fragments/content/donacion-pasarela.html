<!-- Vista de Pasarela de Pago: Formulario seguro para procesar la transacción económica de una donación -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
        <!-- Contenedor principal original -->
        <div class="pasarela-container" style="max-width: 950px; margin: 2rem auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 2.5rem; padding: 1rem;">
            
            <!-- Panel Izquierdo: Formulario -->
            <div class="glass-panel" style="padding: 2.5rem; border-radius: 24px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 2rem;">
                    <div style="background: var(--primary-light); color: var(--primary); padding: 10px; border-radius: 12px;">
                        <i data-lucide="shield-check" style="width: 26px; height: 26px;"></i>
                    </div>
                    <div>
                        <h2 style="margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--text-main);" th:text="#{donacion.auto.pago.seguro}"></h2>
                        <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);" th:text="#{donacion.auto.transaccion.cifrada.y.protegida}"></p>
                    </div>
                </div>

                <form th:action="@{/web/donaciones/confirmar}" method="POST" id="payment-form">
                    <input type="hidden" name="usuarioId" th:value="${donacion['usuarioId']}">
                    <input type="hidden" name="tipo" th:value="${donacion['tipo']}">
                    <input type="hidden" name="cantidad" th:value="${donacion['cantidad']}">
                    <input type="hidden" name="frecuencia" th:value="${donacion['frecuencia']}">
                    <input type="hidden" name="descripcion" th:value="${donacion['descripcion']}">
                    <input type="hidden" name="objetivoId" th:value="${donacion['objetivoId']}">

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.titular.de.la.tarjeta}"></label>
                        <div style="position: relative;">
                            <i data-lucide="user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px;"></i>
                            <input type="text" placeholder="Nombre completo" required
                                style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.6);">
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.numero.de.tarjeta}"></label>
                        <div style="position: relative;">
                            <i data-lucide="credit-card" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px;"></i>
                            <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required
                                style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.6);">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2.5rem;">
                        <div>
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.caducidad}"></label>
                            <input type="text" placeholder="MM / AA" maxlength="5" required
                                style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.6);">
                        </div>
                        <div>
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.cvc}"></label>
                            <div style="position: relative;">
                                <input type="text" placeholder="123" maxlength="3" required
                                    style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.6);">
                                <i data-lucide="help-circle" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px;"></i>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.15rem; font-size: 1.1rem; border-radius: 14px; display: flex; justify-content: center; align-items: center; gap: 10px;">
                        <i data-lucide="lock" style="width: 20px;"></i>
                        <span th:text="#{donacion.auto.total.a.pagar} + ' ' + ${#numbers.formatDecimal(donacion['cantidad'], 1, 'POINT', 2, 'COMMA')} + ' €'"></span>
                    </button>
                    
                    <a th:href="@{/web/donaciones}" style="display: block; text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; text-decoration: none;" th:text="#{donacion.auto.cancelar.y.volver}"></a>
                </form>
            </div>

            <!-- Panel Derecho: Resumen con navegación segura -->
            <div class="glass-panel" style="padding: 2.5rem; border-radius: 24px; display: flex; flex-direction: column;">
                <h3 style="margin-top: 0; margin-bottom: 2rem; font-size: 1.3rem; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 10px;">
                    <i data-lucide="receipt" style="color: var(--primary);"></i>
                    [[#{html.auto.resumen.de.la.donaci.n}]]
                </h3>
                
                <div style="flex-grow: 1;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <span style="color: var(--text-muted);" th:text="#{donacion.auto.tipo.de.ayuda}"></span>
                        <span style="font-weight: 700; color: var(--text-main);" th:text="${donacion['tipo']}">DINERO</span>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <span style="color: var(--text-muted);" th:text="#{donacion.auto.frecuencia}"></span>
                        <div style="text-align: right;">
                            <span style="font-weight: 700; color: var(--text-main);" th:text="${donacion['frecuencia'] == 'MENSUAL' ? 'Mensual' : 'Pago único'}">Única</span>
                            <small th:if="${donacion['frecuencia'] == 'MENSUAL'}" style="display: block; color: var(--primary); font-size: 0.75rem; font-weight: 600;" th:text="#{donacion.auto.se.renovara.automaticamente}"></small>
                        </div>
                    </div>
                    
                    <!-- Próximo pago con protección contra nulos -->
                    <div th:if="${donacion['proximaFechaPago'] != null}" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding: 1rem; background: var(--primary-light); border-radius: 16px; border: 1px solid rgba(34,197,94,0.1);">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="calendar" style="width: 18px; color: var(--primary);"></i>
                            <span style="color: var(--primary); font-weight: 600; font-size: 0.9rem;" th:text="#{donacion.auto.proximo.cobro}"></span>
                        </div>
                        <span style="font-weight: 800; color: var(--primary);" th:text="${donacion['proximaFechaPago']}">01/01/2024</span>
                    </div>

                    <div style="margin-bottom: 2rem;">
                        <span style="display: block; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em;" th:text="#{generic.auto.comentario}"></span>
                        <p style="font-style: italic; color: var(--text-main); font-size: 0.9rem; margin: 0; line-height: 1.4;" th:text="${!donacion['descripcion'].isEmpty() ? donacion['descripcion'] : 'Sin comentario adicional.'}">
                            "Sin comentario adicional."
                        </p>
                    </div>
                </div>

                <div style="margin-top: auto;">
                    <div style="background: #1e293b; color: white; padding: 1.5rem; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-lg);">
                        <span style="font-weight: 500; font-size: 0.9rem; opacity: 0.9;" th:text="#{donacion.auto.total.a.pagar}"></span>
                        <span style="font-size: 1.8rem; font-weight: 900;" th:text="${#numbers.formatDecimal(donacion['cantidad'], 1, 'POINT', 2, 'COMMA')} + ' €'"></span>
                    </div>

                    <div style="margin-top: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                        <div style="display: flex; gap: 20px; align-items: center;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Visa_2021.svg" alt="Visa" style="height: 14px; width: auto;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard" style="height: 22px; width: auto;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" style="height: 18px; width: auto;">
                        </div>
                        <p style="font-size: 0.7rem; color: var(--text-muted); text-align: center; line-height: 1.4; margin: 0;">
                            <i data-lucide="lock" style="width: 10px; margin-right: 2px;"></i>
                            [[#{html.auto.transacci.n.segura.y.protegida}]]
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            // Forzar carga de iconos Lucide
            if (typeof lucide !== 'undefined') { lucide.createIcons(); }
            const paymentForm = document.getElementById('payment-form');
            if (paymentForm) {
                paymentForm.addEventListener('submit', function(e) {
                    const btn = this.querySelector('button');
                    btn.disabled = true;
                    btn.innerHTML = '<span>' + /*[[#{donacion.auto.procesando.pago}]]*/ 'Procesando...' + '</span>';
                });
            }
        </script>
    </div>
</body>

</html>
