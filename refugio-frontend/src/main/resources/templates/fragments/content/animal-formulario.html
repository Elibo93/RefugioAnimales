<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title"
                th:text="${animal.get('id') == null ? #messages.msg('workshop.form.title') : #messages.msg('workshop.modal.edit.title')}">
                Crear animal</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;"
                th:text="${animal.get('id') == null ? #messages.msg('animal.form.subtitle.create') : #messages.msg('animal.form.subtitle.edit')}">
                Configure los detalles del animal
            </p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form
                th:action="${animal.get('id') == null ? '/web/animales/nuevo' : '/web/animales/' + animal.get('id') + '/editar'}"
                method="post">

                <div class="form-grid">

                    <div class="form-group" th:classappend="${animal.get('id') != null ? 'readonly-group' : ''}">
                        <label th:text="#{workshop.field.name}">Nombre</label>
                        <input type="text" name="nombre" th:value="${animal.get('nombre')}" required th:readonly="${animal.get('id') != null}">
                    </div>

                    <div class="form-group" th:classappend="${animal.get('id') != null ? 'readonly-group' : ''}">
                        <label th:text="#{animal.field.species}">Especie</label>
                        <select name="especie" id="especieSelect" required
                            onchange="toggleEspeciePersonalizada()" th:disabled="${animal.get('id') != null}">
                            <option value="">Seleccione especie</option>
                            <option th:each="e : ${especies}" th:value="${e}"
                                th:text="${#strings.capitalize(e.toLowerCase())}"
                                th:selected="${animal.get('especie') == e}"></option>
                        </select>
                        <input type="hidden" th:if="${animal.get('id') != null}" name="especie" th:value="${animal.get('especie')}">
                    </div>

                    <div class="form-group" id="especiePersonalizadaGroup"
                        th:style="${animal.get('especie') != null && animal.get('especie').toString() == 'OTRO' ? 'display:block' : 'display:none'}"
                        th:classappend="${animal.get('id') != null ? 'readonly-group' : ''}">
                        <label>¿Qué especie es?</label>
                        <input type="text" name="especiePersonalizada" th:value="${animal.get('especiePersonalizada')}" id="especiePersonalizadaInput"
                            placeholder="Ej: Hámster, Conejo..." th:readonly="${animal.get('id') != null}">
                    </div>


                    <div class="form-group" th:classappend="${animal.get('id') != null ? 'readonly-group' : ''}">
                        <label th:text="#{animal.field.breed}">Raza</label>
                        <input type="text" name="raza" th:value="${animal.get('raza')}" th:readonly="${animal.get('id') != null}">
                    </div>

                    <div class="form-group" th:classappend="${animal.get('id') != null ? 'readonly-group' : ''}">
                        <label th:text="#{animal.field.sex}">Sexo</label>
                        <select name="sexo" th:disabled="${animal.get('id') != null}">
                            <option th:each="s : ${sexos}" th:value="${s}"
                                th:text="${#strings.capitalize(s.toLowerCase())}"
                                th:selected="${animal.get('sexo') == s}"></option>
                        </select>
                        <input type="hidden" th:if="${animal.get('id') != null}" name="sexo" th:value="${animal.get('sexo')}">
                    </div>

                    <div class="form-group" th:classappend="${animal.get('id') != null ? 'readonly-group' : ''}">
                        <label th:text="#{animal.field.chip}">Chip ID</label>
                        <input type="text" name="chipId" th:value="${animal.get('chipId')}" th:readonly="${animal.get('id') != null}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{animal.field.status}">Estado</label>
                        <select name="estado">
                            <option th:each="e : ${estados}" th:value="${e}"
                                th:text="${#strings.capitalize(e.toLowerCase().replace('_', ' '))}"
                                th:selected="${animal.get('estado') == e}">Estado
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label th:text="#{animal.field.age}">Edad</label>
                        <input type="number" name="edad" th:value="${animal.get('edad')}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{animal.field.size}">Tamaño</label>
                        <select name="tamano">
                            <option th:each="t : ${tamanos}" th:value="${t}"
                                th:text="${#strings.capitalize(t.toLowerCase())}"
                                th:selected="${animal.get('tamano') == t}">Tamaño</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" step="0.1" name="peso" th:value="${animal.get('peso')}">
                    </div>

                    <div class="form-group">
                        <label>Nivel de Energía (1-5)</label>
                        <select name="nivelEnergia">
                            <option value="1" th:selected="${animal.get('nivelEnergia') == 1}">1 - Muy Bajo</option>
                            <option value="2" th:selected="${animal.get('nivelEnergia') == 2}">2 - Bajo</option>
                            <option value="3" th:selected="${animal.get('nivelEnergia') == 3}">3 - Medio</option>
                            <option value="4" th:selected="${animal.get('nivelEnergia') == 4}">4 - Alto</option>
                            <option value="5" th:selected="${animal.get('nivelEnergia') == 5}">5 - Muy Alto</option>
                        </select>
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 10px; padding-top: 1.5rem;">
                        <input type="checkbox" name="urgencia" th:checked="${animal.get('urgencia')}" style="width: auto;">
                        <label style="margin: 0;">¿Es adopción urgente? 🔥</label>
                    </div>

                    <div class="form-group" style="grid-column:1/-1;">
                        <label>Fotografía del Animal</label>
                        <div th:if="${animal.get('foto') != null && !animal.get('foto').isEmpty()}"
                            style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
                            <img th:src="${animal.get('foto')}" alt="Miniatura"
                                style="width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid var(--primary-color);">
                            <div>
                                <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Imagen actual</p>
                                <input type="hidden" name="foto" th:value="${animal.get('foto')}">
                            </div>
                        </div>
                        <input type="file" id="fotoFileInput" accept="image/*"
                            style="padding: 0.5rem; background: rgba(0,0,0,0.02); border: 2px dashed var(--border-color); border-radius: 12px; width: 100%;"
                            onchange="previewImage(this)">
                        
                        <div id="imagePreviewContainer" style="margin-top: 1rem; display: none;">
                            <img id="imagePreview" src="#" alt="Vista previa" 
                                 style="width: 120px; height: 120px; object-fit: cover; border-radius: 12px; border: 2px solid var(--accent-color);">
                            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem;">Nueva imagen seleccionada</p>
                        </div>
                        
                        <!-- Campo oculto para la versión redimensionada -->
                        <input type="hidden" name="foto" id="resizedFotoInput">

                        
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Formatos aceptados:
                            JPG, PNG. Máximo 5MB.</p>
                    </div>


                    <div class="form-group" style="grid-column:1/-1;">
                        <label th:text="#{animal.field.description}">Descripción</label>
                        <textarea name="descripcion" th:text="${animal.get('descripcion')}"></textarea>
                    </div>


                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/animales}" class="btn btn-secondary" th:text="#{generic.btn.cancel}">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">
                        Guardar animal
                    </button>
                </div>

            </form>
        </div>

    </div>
</body>

</html>
