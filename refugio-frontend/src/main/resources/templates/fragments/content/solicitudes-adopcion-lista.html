1<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{solicitud.list.title}">Solicitudes de Adopción</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/solicitudes/pdf}" target="_blank"
                        th:text="#{generic.link.export.pdf}">
                        Exportar PDF
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/solicitudes/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva solicitud</span>
                    </a>
                </div>
            </div>            <!-- LISTA PREMIUM DE SOLICITUDES -->
            <div class="premium-list-container" style="margin-top: 1.5rem;">
                <div class="list-header" style="background: transparent; padding: 0 1.5rem 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="flex: 0.5; text-align: center;">ID</div>
                    <div style="flex: 3;">Animal y Solicitante</div>
                    <div style="flex: 1.2; text-align: center;">Estado</div>
                    <div style="flex: 2.5;">Comentario</div>
                    <div style="flex: 1.2; text-align: center;">Fecha</div>
                    <div style="flex: 2; text-align: center;">Acciones</div>
                </div>

                <div class="list-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div th:each="s : ${solicitudes}" class="premium-row-card" th:id="'row-' + ${s.get('id')}">
                        <div class="row-cell" style="flex: 0.5; justify-content: center; font-weight: 700; color: var(--text-muted);" th:text="${s.get('id')}">1</div>

                        <div class="row-cell" style="flex: 3;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="task-icon-box" style="background: #f1f5f9;">
                                    <i data-lucide="file-text" style="width: 18px; color: #64748b;"></i>
                                </div>
                                <div style="display: flex; flex-direction: column;">
                                    <a th:href="@{/web/animales/{id}(id=${s.get('animalId')})}" 
                                       style="font-weight: 800; color: var(--secondary); text-decoration: none;"
                                       th:with="a=${s.get('animalId') != null and animalesMap != null ? animalesMap['' + s.get('animalId')] : null}"
                                       th:text="${a != null ? a.get('nombre') : 'Animal'}">Rocky</a>
                                    <a th:href="@{/web/personas/{id}(id=${adoptanteUsuarioIds != null ? adoptanteUsuarioIds['' + s.get('adoptanteId')] : '0'})}" 
                                       style="font-size: 0.85rem; color: var(--text-main); font-weight: 600; text-decoration: none;"
                                       th:with="n=${s.get('adoptanteId') != null and adoptanteNombres != null ? adoptanteNombres['' + s.get('adoptanteId')] : null}"
                                       th:text="${'por ' + (n != null ? n : 'Anónimo')}">por Juan</a>
                                </div>
                            </div>
                        </div>

                        <div class="row-cell" style="flex: 1.2; justify-content: center;">
                            <span class="badge-premium"
                                th:classappend="${s.get('estado') != null ? (s.get('estado').toString() == 'APROBADA' ? 'success' : (s.get('estado').toString() == 'RECHAZADA' ? 'danger' : 'warning')) : 'warning'}"
                                th:text="${s.get('estado') != null ? #strings.capitalize(#strings.toLowerCase(#strings.replace(s.get('estado'), '_', ' '))) : 'Pendiente'}">PENDIENTE</span>
                        </div>

                        <div class="row-cell" style="flex: 2.5; color: var(--text-muted); font-size: 0.9rem; font-style: italic; border-left: 2px solid #f1f5f9; padding-left: 1rem;" 
                             th:text="${s.get('comentario') != null and s.get('comentario') != '' ? s.get('comentario') : 'Sin comentarios'}">Razón...</div>

                        <div class="row-cell" style="flex: 1.2; justify-content: center; font-size: 0.85rem; color: var(--text-muted); font-weight: 500;"
                             th:text="${s.get('fecha') != null ? s.get('fecha').toString().substring(0, 10) : '-'}">01/01/24</div>

                        <div class="row-cell" style="flex: 2; justify-content: center; gap: 8px;">
                            <a th:if="${solicitudToAdopcionMap != null and solicitudToAdopcionMap.containsKey(s.get('id').toString())}" 
                               class="btn-icon" 
                               th:href="@{/web/adopciones/{id}/contrato(id=${solicitudToAdopcionMap.get(s.get('id').toString())})}" 
                               title="Descargar Contrato" 
                               target="_blank" 
                               style="color: #2563eb;">
                                <i data-lucide="file-signature" style="width: 16px;"></i>
                            </a>
                            <a class="btn-icon" th:href="@{/web/solicitudes/{id}/detalle(id=${s.get('id')})}" title="Ver Detalle">
                                <i data-lucide="eye" style="width: 16px;"></i>
                            </a>
                            <button class="btn-icon delete" th:hx-post="@{/web/solicitudes/{id}/borrar(id=${s.get('id')})}" th:hx-target="'#row-' + ${s.get('id')}" hx-swap="outerHTML swap:0.3s" hx-confirm="¿Eliminar?">
                                <i data-lucide="trash-2" style="width: 16px;"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(solicitudes)}" style="text-align:center; padding:5rem; background:white; border-radius:24px; border:1px solid var(--border); margin-top: 1rem;">
                    <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; color: var(--text-muted); opacity: 0.3;"></i>
                    <p style="color: var(--text-muted); font-weight: 600;" th:text="#{solicitud.list.empty}">No hay solicitudes registradas.</p>
                </div>
            </div> </div>
        </div>
    </div>
</body>

</html>
