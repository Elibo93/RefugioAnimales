<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{solicitud.list.title}">Solicitudes de Adopción</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/solicitudes/pdf}" target="_blank"
                        th:text="#{generic.link.export.pdf}">
                        Exportar PDF
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/solicitudes/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva solicitud</span>
                    </a>
                </div>
            </div>
            <table id="tablasolicitudes">
                <thead>
                    <tr>
                        <th th:text="#{persona.table.header.id}">ID</th>
                        <th th:text="#{solicitud.table.header.animal}">Animal</th>
                        <th th:text="#{solicitud.table.header.adoptante}">Solicitante</th>
                        <th th:text="#{solicitud.table.header.estado}">Estado</th>
                        <th th:text="#{enrollment.table.header.date}">Fecha</th>
                        <th th:text="#{workshop.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${solicitudes}" th:id="'row-' + ${s.get('id')}">
                        <td th:text="${s.get('id')}">1</td>
                        <td th:text="${s.get('animalId')}">Animal</td>
                        <td th:text="${s.get('adoptanteId')}">Adoptante</td>
                        <td>
                            <span class="badge-soon"
                                th:classappend="${s.get('estado') != null ? (s.get('estado').toString() == 'APROBADA' ? 'success' : (s.get('estado').toString() == 'RECHAZADA' ? 'danger' : 'warning')) : 'warning'}"
                                th:text="${s.get('estado')}">PENDIENTE</span>
                        </td>
                        <td th:text="${s.get('fecha') != null ? s.get('fecha').toString().replace('T', ' ').substring(0, (s.get('fecha').toString().length() > 10 ? 10 : s.get('fecha').toString().length())) : '-'}">01/01/2024</td>
                        <td style="display:flex; gap:8px;">
                            <a class="btn-icon" th:href="@{/web/solicitudes/{id}/editar(id=${s.get('id')})}">
                                <i data-lucide="edit-2" style="width:16px;"></i>
                            </a>
                            <button class="btn-icon delete"
                                th:hx-post="@{/web/solicitudes/{id}/borrar(id=${s.get('id')})}"
                                th:hx-target="'#row-' + ${s.get('id')}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar solicitud?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(solicitudes)}" style="text-align:center;padding:3rem;color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{solicitud.list.empty}">No hay solicitudes registradas.</p>
            </div>
        </div>
    </div>
</body>

</html>
