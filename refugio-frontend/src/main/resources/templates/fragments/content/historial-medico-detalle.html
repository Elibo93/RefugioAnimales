<!-- Vista de Informe Clínico Completo: Visualización detallada y profesional de un registro médico -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="content">
        <!-- BARRA DE NAVEGACIÓN SUPERIOR -->
        <div class="actions-bar" style="margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div>
                    <span class="user-name page" style="display: block;" th:text="#{historial.auto.informe.clinico}"></span>
                    <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;" 
                          th:text="'Registro #' + ${historial.id} + ' • ' + ${historial.fecha != null ? historial.fecha.toString().substring(0,10) : '-'}">
                        Registro #123 • 2024-05-16
                    </span>
                </div>
            </div>
            
            <div style="display: flex; gap: 12px;">
                <a th:href="@{/web/historiales/pdf}" target="_blank" class="btn btn-secondary">
                    <i data-lucide="printer" style="width: 18px;"></i>
                    <span th:text="#{historial.auto.imprimir.informe}"></span>
                </a>
                <a th:hx-get="@{/web/historiales/{id}/editar(id=${historial.id})}" hx-target="#contenido-dinamico" hx-push-url="true" class="btn btn-primary">
                    <i data-lucide="edit-3" style="width: 18px;"></i>
                    <span th:text="#{historial.auto.editar.registro}"></span>
                </a>
            </div>
        </div>

        <div class="clinical-report-grid" style="display: grid; grid-template-columns: 320px 1fr; gap: 2rem; align-items: start;">
            
            <!-- COLUMNA IZQUIERDA: FICHA DEL ANIMAL -->
            <div class="animal-patient-card" style="background: white; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm);">
                <div class="patient-photo" style="height: 240px; position: relative;">
                    <img th:src="${animal != null and animal.foto != null and !animal.foto.isEmpty() ? animal.foto : '/img/placeholder-animal.png'}"
                          style="width: 100%; height: 100%; object-fit: cover;" alt="Paciente">
                    <div style="position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(transparent, rgba(0,0,0,0.7));">
                        <a th:if="${animal != null}" 
                           th:hx-get="@{/web/animales/{id}(id=${animal.id})}"
                           hx-target="#contenido-dinamico" hx-push-url="true" hx-swap="innerHTML show:window:top"
                           style="color: white; font-weight: 800; font-size: 1.4rem; text-decoration: none; cursor: pointer; display: block; transition: transform 0.2s;"
                           onmouseover="this.style.transform='translateX(5px)'" onmouseout="this.style.transform='translateX(0)'"
                           th:text="${animal.nombre}">Nombre</a>
                        <span th:if="${animal == null}" style="color: white; font-weight: 800; font-size: 1.4rem;" th:text="#{historial.auto.paciente}"></span>
                    </div>
                </div>
                
                <div style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="patient-data-row" style="display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.8rem;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;" th:text="#{generic.auto.especie}"></span>
                        <span style="font-weight: 700; color: var(--primary);" th:text="${animal != null ? animal.especie : '-'}">Perro</span>
                    </div>
                    <div class="patient-data-row" style="display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.8rem;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;" th:text="#{historial.auto.raza}"></span>
                        <span style="font-weight: 600;" th:text="${animal != null ? animal.raza : '-'}">Mestizo</span>
                    </div>
                    <div class="patient-data-row" style="display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.8rem;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;" th:text="#{generic.auto.sexo}"></span>
                        <span style="font-weight: 600;" th:text="${animal != null ? animal.sexo : '-'}">Macho</span>
                    </div>
                    <div class="patient-data-row" style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase;" th:text="#{historial.auto.id.chip}"></span>
                        <span style="font-family: monospace; font-weight: 700; color: #64748b;" th:text="${animal != null ? animal.chipId : '-'}">CHIP12345</span>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: CUERPO DEL INFORME -->
            <div class="report-main-content" style="display: flex; flex-direction: column; gap: 1.5rem;">
                
                <!-- BLOQUE: VETERINARIO -->
                <div class="report-section" style="background: white; padding: 2rem; border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                        <div style="width: 48px; height: 48px; background: #e0f2fe; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #0284c7;">
                            <i data-lucide="user-check" style="width: 24px;"></i>
                        </div>
                        <div>
                            <span style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;" th:text="#{historial.auto.especialista.responsable}"></span>
                            <h3 style="margin: 0; font-size: 1.2rem; font-weight: 800; color: var(--text-main);" th:text="${historial.veterinario}">Dra. María García</h3>
                        </div>
                    </div>

                    <!-- BLOQUE: DIAGNÓSTICO -->
                    <div style="margin-top: 2rem;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;">
                            <i data-lucide="activity" style="width: 18px; color: #ec4899;"></i>
                            <h4 style="margin: 0; font-size: 0.9rem; font-weight: 800; color: #831843; text-transform: uppercase;" th:text="#{historial.auto.diagnostico.y.observaciones}"></h4>
                        </div>
                        <div style="background: #fdf2f8; padding: 1.5rem; border-radius: 18px; border-left: 5px solid #ec4899;">
                            <p style="margin: 0; font-size: 1rem; line-height: 1.6; color: #831843; white-space: pre-wrap;" th:text="${historial.descripcion}">
                                Descripción detallada del diagnóstico...
                            </p>
                        </div>
                    </div>

                    <!-- BLOQUE: TRATAMIENTO -->
                    <div style="margin-top: 2rem;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;">
                            <i data-lucide="pill" style="width: 18px; color: #22c55e;"></i>
                            <h4 style="margin: 0; font-size: 0.9rem; font-weight: 800; color: #14532d; text-transform: uppercase;" th:text="#{historial.auto.protocolo.de.tratamiento}"></h4>
                        </div>
                        <div style="background: #f0fdf4; padding: 1.5rem; border-radius: 18px; border-left: 5px solid #22c55e;">
                            <p style="margin: 0; font-size: 1rem; line-height: 1.6; color: #14532d; white-space: pre-wrap;" th:text="${historial.tratamiento}">
                                Instrucciones del tratamiento...
                            </p>
                        </div>
                    </div>
                </div>

                <!-- NOTA DE AUTENTICIDAD -->
                <div style="padding: 1.5rem; background: #f8fafc; border-radius: 18px; border: 1px dashed var(--border); display: flex; align-items: center; gap: 1rem;">
                    <i data-lucide="shield-check" style="width: 20px; color: var(--text-muted);"></i>
                    <p style="margin: 0; font-size: 0.8rem; color: var(--text-muted); font-weight: 500;" th:text="#{historial.auto.este.informe.clinico.es.parte.del.expedi}"></p>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
