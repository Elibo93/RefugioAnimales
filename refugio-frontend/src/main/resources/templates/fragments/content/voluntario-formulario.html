<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title"
                th:text="${voluntario.get('id') == null ? #messages.msg('voluntario.form.title') : #messages.msg('voluntario.modal.edit.title')}">
                Registrar voluntario</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;"
                th:text="${voluntario.get('id') == null ? #messages.msg('voluntario.form.subtitle.create') : #messages.msg('voluntario.form.subtitle.edit')}">
                Añada un nuevo voluntario al equipo</p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form id="volunteerForm"
                th:action="${voluntario.get('id') == null ? '/web/voluntarios/nuevo' : '/web/voluntarios/' + voluntario.get('id') + '/editar'}"
                method="post">

                <!-- Si es Admin, permite elegir usuario -->
                <div th:if="${isAdmin and voluntario.get('id') == null}" class="form-group"
                    style="margin-bottom:1.5rem;">
                    <label>ID de Usuario (Persona)</label>
                    <input type="number" name="idUsuario" required placeholder="Ingrese ID del usuario"
                        th:value="${param.idUsuario}">
                    <p style="font-size:0.85rem; color:var(--text-muted);">El usuario debe existir previamente en el sistema.</p>
                </div>

                <!-- Campos para usuarios NO registrados (Invitados) -->
                <div th:if="${!isAuthenticated}"
                    style="margin-bottom: 2rem; border-bottom: 1px dashed var(--border-color); padding-bottom: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; color: var(--color-adopt);">Tus datos personales</h3>
                    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label th:text="#{voluntario.field.name}">Nombre</label>
                            <input type="text" name="nombre" required placeholder="Tu nombre completo">
                        </div>
                        <div class="form-group">
                            <label th:text="#{voluntario.field.email}">Email</label>
                            <input type="email" name="email" required placeholder="tu@email.com">
                        </div>
                    </div>
                </div>

                <!-- Campos comunes -->
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label th:text="#{voluntario.field.phone}">Teléfono</label>
                        <input type="text" name="telefono" placeholder="Opcional" th:value="${voluntario.get('telefono')}">
                    </div>
                    <div class="form-group">
                        <label th:text="#{voluntario.field.specialty}">Área de interés</label>
                        <div class="select-wrapper">
                            <select name="rolInteres" required style="width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border-color);">
                                <option value="" th:text="#{form.select.voluntario}">Selecciona una opción...</option>
                                <option value="PASEO">Paseador de perros</option>
                                <option value="LIMPIEZA">Limpieza de instalaciones</option>
                                <option value="ADMINISTRATIVO">Apoyo administrativo</option>
                                <option value="REDES">Redes sociales y fotos</option>
                                <option value="EVENTOS">Organización de eventos</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Campo de disponibilidad -->
                <div class="form-group">
                    <label>Tu Disponibilidad y Motivación</label>
                    <textarea name="disponibilidad" required 
                        placeholder="Ej: Fines de semana por la mañana, pasear perros..."
                        style="width: 100%; min-height: 120px; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color);"
                        th:text="${voluntario.get('disponibilidad')}"></textarea>
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/home}" class="btn btn-secondary" style="justify-content:center;"
                        th:text="#{generic.btn.cancel}">Cancelar</a>
                    <button type="submit" class="btn btn-primary" id="btn-submit" style="justify-content:center;">
                        <i data-lucide="check-circle"></i>
                        <span id="btn-text" th:text="#{generic.btn.create}">Unirte como voluntario</span>
                    </button>
                </div>
            </form>
        </div>

        <script>
            document.getElementById('volunteerForm').addEventListener('submit', function() {
                const btn = document.getElementById('btn-submit');
                const btnText = document.getElementById('btn-text');
                btn.disabled = true;
                btnText.textContent = "[[#{generic.btn.saving}]]";
            });
        </script>
    </div>
</body>

</html>
