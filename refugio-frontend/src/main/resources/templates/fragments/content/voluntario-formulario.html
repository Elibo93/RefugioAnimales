<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title"
                th:text="${voluntario.id == null ? #messages.msg('professor.form.title') : #messages.msg('professor.modal.edit.title')}">
                Registrar voluntario</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;"
                th:text="${voluntario.id == null ? #messages.msg('voluntario.form.subtitle.create') : #messages.msg('voluntario.form.subtitle.edit')}">
                Añada un nuevo voluntario al equipo</p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form
                th:action="${voluntario.id == null ? '/web/voluntarios/nuevo' : '/web/voluntarios/' + voluntario.id + '/editar'}"
                method="post">

                <!-- Si es Admin, permite elegir usuario (o simplemente muestra el ID si se pasó por parámetro) -->
                <div th:if="${isAdmin and voluntario.id == null}" class="form-group"
                    style="margin-bottom:1.5rem;">
                    <label>ID de Usuario (Persona)</label>
                    <input type="number" name="idUsuario" required placeholder="Ingrese ID del usuario"
                        th:value="${param.idUsuario}">
                    <p style="font-size:0.85rem; color:var(--text-muted);">El usuario debe existir previamente en el
                        sistema.</p>
                </div>

                <!-- Campos para usuarios NO registrados (Invitados) -->
                <div th:if="${!isAuthenticated}"
                    style="margin-bottom: 2rem; border-bottom: 1px dashed var(--border-color); padding-bottom: 2rem;">
                    <h3 style="margin-bottom: 1.5rem; color: var(--color-adopt);">Para empezar, necesitamos tus datos
                        básicos</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" name="nombre" required placeholder="Tu nombre completo">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required placeholder="tu@email.com">
                        </div>
                        <div class="form-group">
                            <label>Contraseña para tu cuenta</label>
                            <input type="password" name="contrasena" required placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-top:1rem;">Al unirte, se creará una
                        cuenta para que puedas gestionar tus actividades.</p>
                </div>

                <!-- Campo de disponibilidad (Para todos) -->
                <div class="form-group">
                    <label>Tu Disponibilidad y Motivación</label>
                    <textarea name="disponibilidad" required th:value="${voluntario.disponibilidad}"
                        placeholder="Ej: Fines de semana por la mañana, pasear perros..."
                        style="width: 100%; min-height: 120px; padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color);"></textarea>
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/home}" class="btn btn-secondary" style="justify-content:center;"
                        th:text="#{generic.btn.cancel}">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="justify-content:center;"
                        th:text="#{generic.btn.save}">Unirse al equipo</button>
                </div>
            </form>
        </div>


    </div>
</body>

</html>
