<div th:fragment="content"
    style="max-width: 400px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 20px;" th:text="#{auth.login.title}">Iniciar Sesión</h2>

    <div th:if="${param.error}"
        style="background-color: #fee2e2; color: #dc2626; padding: 10px; border-radius: 4px; margin-bottom: 15px;"
        th:text="#{auth.login.error}">
        Email o contraseña incorrectos.
    </div>
    <div th:if="${param.logout}"
        style="background-color: #e0f2fe; color: #0284c7; padding: 10px; border-radius: 4px; margin-bottom: 15px;"
        th:text="#{auth.login.logout}">
        Sesión cerrada correctamente.
    </div>
    <div th:if="${param.registroExitoso}"
        style="background-color: #dcfce7; color: #16a34a; padding: 10px; border-radius: 4px; margin-bottom: 15px;"
        th:text="#{auth.login.success.register}">
        Registro completado. Ahora puedes iniciar sesión.
    </div>

    <form th:action="@{/login-post}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
        <!-- Capturar el parámetro 'redirect' si existe -->
        <input type="hidden" name="redirect" th:value="${param.redirect}" th:if="${param.redirect != null}">

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600;" th:text="#{auth.login.email}">Email:</label>
            <input type="email" name="username" required
                style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;" />
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600;" th:text="#{auth.login.password}">Contraseña:</label>
            <input type="password" name="password" required
                style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;" />
        </div>
        <button type="submit"
            style="background-color: #4f46e5; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase;"
            th:text="#{auth.login.btn.enter}">Entrar</button>
    </form>

    <div style="text-align: center; margin-top: 15px;">
        <a th:href="@{/registro}" style="color: #4f46e5; text-decoration: none;"
            th:text="#{auth.login.link.register}">¿No tienes cuenta? Regístrate aquí</a>
    </div>
</div>
