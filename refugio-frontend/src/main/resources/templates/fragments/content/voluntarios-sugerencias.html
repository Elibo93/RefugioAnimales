<!-- Vista de Sugerencias de Voluntario (HTMX): Fragmento dinámico para el autocompletado de voluntarios en la asignación de tareas -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="suggestions">
        <ul th:if="${not #lists.isEmpty(voluntariosEncontrados)}" 
            class="autocomplete-list"
            style="list-style: none; padding: 5px; margin: 5px 0 0; border: 1px solid var(--border); border-radius: 12px; background: white; width: 100%; box-shadow: var(--shadow-lg); max-height: 250px; overflow-y: auto; position: absolute; z-index: 1000;">
            <li th:each="v : ${voluntariosEncontrados}" 
                class="suggestion-item"
                style="padding: 10px 15px; cursor: pointer; border-radius: 8px; transition: all 0.2s; margin-bottom: 2px;"
                onmouseover="this.style.background='var(--primary-light)'; this.style.color='var(--primary)'"
                onmouseout="this.style.background='transparent'; this.style.color='inherit'"
                th:attr="onclick=|selectVolunteer('${v.id}', '${v.nombre} ${v.apellido}')|">
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong th:text="${v.nombre + ' ' + v.apellido}" style="display: block; font-size: 0.95rem;"></strong>
                        <small th:text="${v.email != '' ? v.email : '@' + v.username}" style="color: var(--text-muted); font-size: 0.8rem;"></small>
                    </div>
                    <div style="background: var(--bg-main); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted);">
                        VOLUNTARIO
                    </div>
                </div>
            </li>
        </ul>
        <div th:if="${#lists.isEmpty(voluntariosEncontrados)}" 
             style="padding: 15px; border: 1px solid var(--border); border-radius: 12px; background: white; color: var(--text-muted); font-size: 0.85rem; box-shadow: var(--shadow-lg); margin-top: 5px; text-align: center; position: absolute; width: 100%; z-index: 1000;">
            No se encontraron voluntarios
        </div>
    </div>
</body>
</html>
