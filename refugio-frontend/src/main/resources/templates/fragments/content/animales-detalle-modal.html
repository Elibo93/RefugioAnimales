<div id="modal-host" th:fragment="detalle">
    <div class="modal-glass-backdrop" onclick="closeModal()">
        <div class="modal-glass-content glass-card" onclick="event.stopPropagation()">
            <!-- Botón de Cierre -->
            <button onclick="closeModal()"
                style="position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,255,255,0.5); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="x" style="width: 20px; height: 20px;"></i>
            </button>

            <!-- Galería / Imagen -->
            <div class="modal-gallery">
                <img th:src="${animal.get('foto') != null ? animal.get('foto') : '/images/placeholder-animal.png'}" alt="Animal">
            </div>

            <!-- Área de Contenido -->
            <div class="modal-body-detail">
                <header>
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                        <span class="animal-status-badge"
                            th:classappend="${animal.get('estado') != null ? 
                                (#strings.toUpperCase(animal.get('estado').toString()) == 'DISPONIBLE' ? 'badge-available' : 
                                (#strings.toUpperCase(animal.get('estado').toString()) == 'RESERVADO' ? 'badge-reserved' : 
                                (#strings.toUpperCase(animal.get('estado').toString()) == 'ADOPTADO' ? 'badge-adopted' : 'badge-treatment'))) : 'badge-available'}"
                            th:text="${animal.get('estado') != null ? #strings.replace(animal.get('estado'), '_', ' ') : ''}">
                            Disponible
                        </span>
                        <span th:if="${animal.get('urgencia')}"
                            style="background: #FEE2E2; color: #DC2626; padding: 0.4rem 0.8rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700;">
                            🔥 Urgente
                        </span>
                    </div>
                    <h1 class="animal-name" th:text="${animal.get('nombre')}" style="font-size: 3rem; margin-bottom: 0.5rem;">
                        Rocky</h1>
                    <p style="color: var(--text-muted); font-size: 1.1rem; font-weight: 600;"
                        th:text="${animal.get('raza') + ' • ' + animal.get('edad') + ' años'}">Labrador • 2 años</p>
                </header>

                <div class="quick-stats"
                    style="background: rgba(255,255,255,0.3); padding: 1.5rem; border-radius: 20px;">
                    <div class="stat-item">
                        <i data-lucide="dog"></i>
                        <span
                            th:text="${(animal.get('especie') != null and animal.get('especie').toString() == 'OTRO') ? animal.get('especiePersonalizada') : animal.get('especie')}">Perro</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Especie</span>
                    </div>
                    <div class="stat-item">
                        <i data-lucide="weight"></i>
                        <span th:text="${animal.get('peso') != null ? animal.get('peso') + 'kg' : '-'}">12kg</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Peso</span>
                    </div>
                    <div class="stat-item">
                        <i data-lucide="zap"></i>
                        <span th:text="${animal.get('nivelEnergia') != null ? animal.get('nivelEnergia') + '/5' : '-'}">4/5</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Energía</span>
                    </div>
                    <div class="stat-item">
                        <i th:data-lucide="${animal.get('sexo') != null ? (animal.get('sexo').toString() == 'MACHO' ? 'mars' : 'venus') : 'circle'}"></i>
                        <span th:text="${animal.get('sexo')}">Macho</span>
                        <span style="font-size: 0.65rem; opacity: 0.7;">Género</span>
                    </div>
                </div>

                <div class="description-section">
                    <h4 style="margin-bottom: 1rem;">Sobre <span th:text="${animal.get('nombre')}"></span></h4>
                    <p style="line-height: 1.6; color: var(--text-main); font-size: 1.05rem;"
                        th:text="${animal.get('descripcion')}">
                        Descripción detallada del animal...
                    </p>
                </div>

                <div style="margin-top: auto; display: flex; gap: 1rem;">
                    <!-- Botón de Adopción (Sólo si DISPONIBLE) -->
                    <div style="flex: 1;" th:if="${animal.get('estado') != null and #strings.toUpperCase(animal.get('estado').toString()) == 'DISPONIBLE'}">
                        
                        <!-- 1. Usuario No Autenticado -->
                        <div th:if="${!isAuthenticated}">
                            <a th:href="@{/web/solicitudes/publico/opciones(animalId=${animal.get('id')})}" 
                               class="btn btn-primary"
                               style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;">
                                <i data-lucide="heart"></i>
                                <span th:text="#{animal.button.adopt}">¡Adopta!</span>
                            </a>
                        </div>

                        <!-- 2. Usuario Autenticado (No Admin) -->
                        <div th:if="${isAuthenticated and !isAdmin}" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                            
                            <!-- Caso A: Ya es Adoptante -> Adopción Directa (Va al nuevo formulario sin JS) -->
                            <div sec:authorize="hasRole('ROLE_ADOPTANTE')">
                                <a th:href="@{/web/solicitudes/publico/directa/formulario(animalId=${animal.get('id')})}" 
                                   class="btn btn-primary"
                                   style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;">
                                    <i data-lucide="heart-handshake"></i>
                                    <span>Solicitar Adopción</span>
                                </a>
                            </div>

                            <!-- Caso B: Usuario Registrado pero NO Adoptante -> Ir a Conversión -->
                            <div sec:authorize="!hasRole('ROLE_ADOPTANTE')">
                                <a th:href="@{/web/solicitudes/publico/convertir(animalId=${animal.get('id')})}" 
                                   class="btn btn-primary"
                                   style="width: 100%; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;">
                                    <i data-lucide="heart"></i>
                                    <span>¡Quiero Adoptar!</span>
                                </a>
                            </div>
                        </div>

                        <!-- 3. Administrador -->
                        <div th:if="${isAdmin}" style="display: flex; gap: 1rem; width: 100%;">
                            <a th:href="@{/web/animales/{id}/editar(id=${animal.get('id')})}" class="btn btn-secondary"
                                style="flex: 1; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px; background: rgba(0,0,0,0.05);">
                                <i data-lucide="edit"></i>
                                <span>Editar Ficha</span>
                            </a>
                            <a th:href="@{/web/solicitudes/nueva(animalId=${animal.get('id')})}" class="btn btn-primary"
                                style="flex: 1; justify-content: center; height: 56px; font-size: 1.1rem; border-radius: 16px;">
                                <i data-lucide="heart"></i>
                                <span th:text="#{animal.button.adopt}">¡Adopta!</span>
                            </a>
                        </div>
                    </div>



                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal()"
                        style="height: 56px; border-radius: 16px;">
                        Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</div>
