<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="page-header" style="text-align:center;">
            <h1 class="page-title"
                th:text="${solicitud.get('id') == null ? #messages.msg('solicitud.form.title') : #messages.msg('solicitud.modal.edit.title')}">
                Nueva solicitud</h1>
        </div>
        <div class="card" style="max-width:800px; margin:0 auto;">
            <form
                th:action="${solicitud.get('id') == null ? '/web/solicitudes/nueva' : '/web/solicitudes/' + solicitud.get('id') + '/editar'}"
                method="post" th:object="${solicitud}">
                <div class="form-grid">
                    <div class="form-group">
                        <label th:text="#{solicitud.field.animal}">Animal</label>
                        <select name="animalId" required>
                            <option value="" th:text="#{form.select.workshop}">Seleccione un animal...</option>
                            <option th:each="a : ${animales}"
                                th:if="${a.get('estado') != null and (a.get('estado').toString() == 'DISPONIBLE' or a.get('estado').toString() == 'EN_TRATAMIENTO' or (solicitud.get('animalId') != null and a.get('id') == solicitud.get('animalId')))}"
                                th:value="${a.get('id')}" th:text="${a.get('nombre')}"
                                th:selected="${solicitud.get('animalId') != null and a.get('id') == solicitud.get('animalId')}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label th:text="#{solicitud.field.adoptante}">Solicitante</label>
                        <select name="adoptanteId" required>
                            <option value="" th:text="#{form.select.student}">Seleccione una persona...</option>
                            <option th:each="ad : ${adoptantes}" th:value="${ad.get('id')}"
                                th:text="${ad.get('nombre') + ' ' + ad.get('apellido')}"
                                th:selected="${solicitud.get('adoptanteId') != null and ad.get('id') == solicitud.get('adoptanteId')}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group" sec:authorize="hasRole('ADMIN')">
                        <label th:text="#{solicitud.field.estado}">Estado</label>
                        <select name="estado" required>
                            <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"
                                th:selected="${e == solicitud.get('estado')}"></option>
                        </select>
                    </div>
                    <input type="hidden" name="estado"
                        th:value="${solicitud.get('estado') != null ? solicitud.get('estado') : 'PENDIENTE'}"
                        sec:authorize="!hasRole('ADMIN')">
                    <div class="form-group" style="grid-column:1/-1;">
                        <label th:text="#{solicitud.field.comentario}">Comentario</label>
                        <textarea name="comentario" th:text="${solicitud.get('comentario')}"></textarea>
                    </div>
                </div>
                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/solicitudes}" class="btn btn-secondary"
                        th:text="#{generic.btn.cancel}">Cancelar</a>
                    <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar
                        solicitud</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
