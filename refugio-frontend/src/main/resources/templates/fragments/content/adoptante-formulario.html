<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title">Registrar Adoptante</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;">Cree manualmente un perfil de adoptante</p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form id="adoptanteForm" th:action="@{/web/adoptantes/nuevo}" method="post">

                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label>ID de Usuario</label>
                    <input type="number" name="usuarioId" required placeholder="Ingrese ID del usuario" th:value="${param.usuarioId}">
                    <p style="font-size:0.85rem; color:var(--text-muted);">El usuario debe existir previamente en el sistema.</p>
                </div>

                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label>DNI</label>
                        <input type="text" name="dni" required placeholder="12345678A">
                    </div>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" name="direccion" required placeholder="Calle Ejemplo, Portal 2, Piso 4C, 28001 Madrid">
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/adoptantes}" class="btn btn-secondary" style="justify-content:center;">Cancelar</a>
                    <button type="submit" class="btn btn-primary" id="btn-submit" style="justify-content:center;">
                        <i data-lucide="check-circle"></i>
                        <span id="btn-text">Registrar Adoptante</span>
                    </button>
                </div>
            </form>
        </div>

        <script>
            document.getElementById('adoptanteForm').addEventListener('submit', function() {
                const btn = document.getElementById('btn-submit');
                const btnText = document.getElementById('btn-text');
                btn.disabled = true;
                btnText.textContent = "Registrando...";
            });
        </script>
    </div>
</body>

</html>
