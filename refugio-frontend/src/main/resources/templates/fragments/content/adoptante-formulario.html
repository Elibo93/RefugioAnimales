<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center; margin-bottom: 2rem;">
            <h1 class="page-title" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div class="premium-modal-icon-wrapper" style="margin: 0; width: 48px; height: 48px; background: #e0f2fe; color: #0369a1;">
                    <i data-lucide="home"></i>
                </div>
                <span th:text="${adoptante.get('id') == null ? #messages.msg('adoptante.form.title') : #messages.msg('adoptante.modal.edit.title')}">Registrar Adoptante</span>
            </h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;" 
               th:text="${adoptante.get('id') == null ? #messages.msg('adoptante.form.subtitle.create') : #messages.msg('adoptante.form.subtitle.edit')}">
                Cree manualmente un perfil de adoptante
            </p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form id="adoptanteForm" 
                  th:action="${adoptante.get('id') == null ? '/web/adoptantes/nuevo' : '/web/adoptantes/' + adoptante.get('id') + '/editar'}" 
                  method="post">

                <input type="hidden" name="usuarioId" th:value="${adoptante.get('usuarioId')}">

                <!-- Datos del Usuario (Solo lectura en edición) -->
                <div th:if="${adoptante.get('id') != null}" class="form-group" style="margin-bottom: 2rem; padding: 1.5rem; background: rgba(var(--primary-rgb), 0.05); border-radius: 16px; display: flex; align-items: center; gap: 1rem;">
                    <div style="background: var(--primary); color: white; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="user"></i>
                    </div>
                    <div>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">Adoptante</p>
                        <h3 style="margin: 0; font-weight: 800; color: var(--text-main);" th:text="${nombreCompleto}">Nombre del Adoptante</h3>
                    </div>
                </div>

                <div th:if="${adoptante.get('id') == null}" class="form-group" style="margin-bottom:1.5rem; position: relative;">
                    <label>Introduzca un usuario</label>
                    <div style="position: relative;">
                        <input type="text" id="user-search" 
                                name="q"
                                class="form-control"
                                placeholder="Nombre, apellido, ID, teléfono o correo..." 
                                autocomplete="off"
                                hx-get="/web/personas/buscar?context=adoptante"
                                hx-trigger="keyup changed delay:500ms"
                                hx-target="#user-suggestions">
                        <input type="hidden" name="usuarioId" id="usuarioId-input" required th:value="${param.usuarioId}">
                    </div>
                    <div id="user-suggestions" style="position: absolute; width: 100%; top: 100%; left: 0; z-index: 100;"></div>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-top: 0.5rem;">El usuario debe existir previamente en el sistema.</p>
                </div>

                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label>DNI / NIE</label>
                        <input type="text" name="dni" required placeholder="12345678A"
                               th:value="${adoptante.get('dni')}"
                               th:readonly="${adoptante.get('id') != null}"
                               th:style="${adoptante.get('id') != null ? 'background: rgba(0,0,0,0.02); cursor: not-allowed;' : ''}"
                               pattern="([0-9]{8}[A-Z])|([XYZ][0-9]{7}[A-Z])" 
                               title="Debe ser un DNI (12345678A) o NIE (X1234567G) válido">
                    </div>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fechaNacimiento" required
                               th:value="${adoptante.get('fechaNacimiento')}"
                               th:readonly="${adoptante.get('id') != null}"
                               th:style="${adoptante.get('id') != null ? 'background: rgba(0,0,0,0.02); cursor: not-allowed;' : ''}"
                               th:max="${#calendars.format(#calendars.create(#calendars.year(#calendars.createNow()) - 18, #calendars.month(#calendars.createNow()), #calendars.day(#calendars.createNow())), 'yyyy-MM-dd')}">
                        <p th:if="${adoptante.get('id') == null}" style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem;">Debe ser mayor de 18 años.</p>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Dirección</label>
                    <input type="text" name="direccion" required placeholder="Calle Ejemplo, Portal 2, Piso 4C, 28001 Madrid"
                           th:value="${adoptante.get('direccion')}">
                </div>

                <div th:if="${isAdmin and adoptante.get('id') != null}" class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Estado de Validación</label>
                    <select name="estadoValidacion" class="form-control">
                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}" th:selected="${e == adoptante.get('estadoValidacion')}"></option>
                    </select>
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/adoptantes}" class="btn btn-secondary" style="justify-content:center;">Cancelar</a>
                    <button type="submit" class="btn btn-primary" id="btn-submit" style="justify-content:center;">
                        <i data-lucide="check-circle"></i>
                        <span id="btn-text" th:text="${adoptante.get('id') == null ? #messages.msg('generic.btn.create') : #messages.msg('generic.btn.save')}">Registrar Adoptante</span>
                    </button>
                </div>
            </form>
        </div>

    </div>
</body>

</html>
