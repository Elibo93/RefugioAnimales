<!-- Vista de Login: Pantalla de acceso seguro al sistema de gestión del refugio -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content" class="fade-in-up" style="max-width: 450px; margin: 60px auto; position: relative;">
    
    <!-- CARD PREMIUM -->
    <div class="glass-card" style="background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 1px solid var(--border);">
        
        <!-- HEADER DEGRADADO -->
        <div style="height: 120px; background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); position: relative; display: flex; align-items: center; justify-content: center;">
            <div style="position: absolute; right: -20px; top: -20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
            <div style="width: 60px; height: 60px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg);">
                <i data-lucide="shield-check" style="width: 32px; color: var(--primary);"></i>
            </div>
        </div>

        <div style="padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: -0.02em;" th:text="#{auth.login.title}">Bienvenido</h2>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 8px;" th:text="#{auth.auto.accede.a.tu.cuenta.de.refugio}"></p>
            </div>

            <!-- ALERTAS DE ERROR/ÉXITO -->
            <div th:if="${param.error}" class="fade-in"
                style="background-color: #fff1f2; color: #e11d48; padding: 14px; border-radius: 16px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; text-align: center; border: 1px solid #fda4af;">
                <i data-lucide="alert-circle" style="width: 18px; vertical-align: middle; margin-right: 6px;"></i>
                <span th:text="#{auth.login.error}">Email o contraseña incorrectos.</span>
            </div>
            
            <div th:if="${param.logout}" class="fade-in"
                style="background-color: #f0f9ff; color: #0369a1; padding: 14px; border-radius: 16px; margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; text-align: center; border: 1px solid #bae6fd;">
                <i data-lucide="info" style="width: 18px; vertical-align: middle; margin-right: 6px;"></i>
                <span th:text="#{auth.login.logout}">Sesión cerrada correctamente.</span>
            </div>

            <form th:action="@{/login-post}" method="post" style="display: flex; flex-direction: column; gap: 20px;">
                <input type="hidden" name="redirect" th:value="${param.redirect}" th:if="${param.redirect != null}">

                <div class="form-group">
                    <label style="display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;" th:text="#{auth.login.email}">[[#{generic.auto.email}]]</label>
                    <div style="position: relative;">
                        <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted); opacity: 0.5;"></i>
                        <input type="email" name="username" required
                            style="width: 100%; height: 52px; border-radius: 14px; border: 2px solid var(--border); padding: 0 20px 0 48px; font-size: 1rem; transition: all 0.2s; outline: none;"
                            placeholder="ejemplo@correo.com" />
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;" th:text="#{auth.login.password}">Contraseña</label>
                    <div style="position: relative;">
                        <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted); opacity: 0.5;"></i>
                        <input type="password" name="password" id="loginPassword" required
                            style="width: 100%; height: 52px; border-radius: 14px; border: 2px solid var(--border); padding: 0 48px 0 48px; font-size: 1rem; transition: all 0.2s; outline: none;"
                            placeholder="••••••••" />
                        <button type="button" onclick="togglePasswordVisibility('loginPassword', this)" 
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 8px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="eye" style="width: 18px;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="height: 56px; border-radius: 16px; font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 10px; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); display: flex; align-items: center; justify-content: center; width: 100%; border: none;"
                    th:text="#{auth.login.btn.enter}">Entrar al Sistema</button>
            </form>

            <!-- DIVISOR "O" -->
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin: 24px 0; color: var(--text-muted); font-size: 0.85rem; font-weight: 700; text-transform: uppercase;">
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
                <span th:text="#{auth.auto.o.accede.con}"></span>
                <div style="flex: 1; height: 1px; background: var(--border);"></div>
            </div>

            <!-- BOTÓN DE GOOGLE -->
            <a th:href="@{/oauth2/authorization/google}" class="btn" 
               style="height: 52px; border-radius: 16px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 12px; text-decoration: none; color: var(--text-main); font-weight: 700; background: white; transition: all 0.2s;"
               onmouseover="this.style.background='#f9fafb'; this.style.borderColor='var(--text-muted)';"
               onmouseout="this.style.background='white'; this.style.borderColor='var(--border)';">
                <!-- SVG de Google Oficial -->
                <svg viewBox="0 0 24 24" width="20" height="20" style="display: inline-block;">
                    <path fill="#EA4335" d="M12 5.04c1.62 0 3.08.56 4.22 1.65l3.15-3.15C17.45 1.74 14.93 1 12 1 7.37 1 3.4 3.66 1.48 7.57l3.86 3C6.26 7.57 8.91 5.04 12 5.04z"/>
                    <path fill="#4285F4" d="M23.45 12.3c0-.82-.07-1.61-.21-2.38H12v4.51h6.42c-.28 1.47-1.11 2.71-2.36 3.56l3.67 2.84c2.14-1.98 3.37-4.89 3.37-8.53z"/>
                    <path fill="#FBBC05" d="M5.34 14.15A7.16 7.16 0 0 1 5 12c0-.75.13-1.47.34-2.15L1.48 6.85A11.97 11.97 0 0 0 0 12c0 1.83.41 3.57 1.14 5.15l4.2-3z"/>
                    <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.67-2.84c-1.11.75-2.53 1.19-4.29 1.19-3.09 0-5.74-2.53-6.66-5.53l-3.86 3C3.4 20.34 7.37 23 12 23z"/>
                </svg>
                <span th:text="#{auth.auto.google}"></span>
            </a>

            <div style="text-align: center; margin-top: 35px; font-size: 0.95rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); padding-top: 25px;">
                <span th:text="#{auth.auto.aun.no.eres.parte}"></span>
                <a th:href="@{/registro}" style="color: var(--primary); text-decoration: none; font-weight: 700;"
                    th:text="#{auth.login.link.register}">Crea una cuenta aquí</a>
            </div>
        </div>
    </div>



</div>
</body>

</html>
