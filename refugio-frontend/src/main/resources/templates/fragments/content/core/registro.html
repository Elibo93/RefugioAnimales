<!-- Vista de Registro: Formulario de alta para nuevos simpatizantes de la comunidad del refugio -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content" class="fade-in-up" style="max-width: 500px; margin: 50px auto; position: relative;">
    
    <!-- CARD PREMIUM -->
    <div class="glass-card" style="background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 1px solid var(--border);">
        
        <!-- HEADER DEGRADADO AMIGABLE -->
        <div style="height: 140px; background: linear-gradient(135deg, #10b981 0%, var(--primary) 100%); position: relative; display: flex; align-items: center; justify-content: center;">
            <div style="position: absolute; left: -20px; bottom: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
            <div style="text-align: center; color: white; z-index: 1;">
                <div style="width: 50px; height: 50px; background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">
                    <i data-lucide="heart-handshake" style="width: 28px; color: white;"></i>
                </div>
                <h2 style="margin: 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;" th:text="#{generic.auto.unete.a.nuestra.familia}"></h2>
            </div>
        </div>

        <div style="padding: 40px;">
            <div th:if="${param.error}" class="fade-in"
                style="background-color: #fff1f2; color: #e11d48; padding: 14px; border-radius: 16px; margin-bottom: 25px; font-size: 0.9rem; font-weight: 600; text-align: center; border: 1px solid #fda4af;">
                <i data-lucide="x-circle" style="width: 18px; vertical-align: middle; margin-right: 6px;"></i>
                <span th:text="${param.error}">[[#{html.auto.error}]] en el registro</span>
            </div>

            <form th:action="@{/registro}" method="post" style="display: flex; flex-direction: column; gap: 22px;">
                
                <!-- USUARIO -->
                <div class="form-group">
                    <label style="display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;" th:text="#{generic.auto.nombre.de.usuario}"></label>
                    <div style="position: relative;">
                        <i data-lucide="user" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted); opacity: 0.5;"></i>
                        <input type="text" name="username" required placeholder="Ej: valiente_refugio"
                            style="width: 100%; height: 52px; border-radius: 14px; border: 2px solid var(--border); padding: 0 20px 0 48px; font-size: 1rem; transition: all 0.2s; outline: none; background: var(--bg-body);" />
                    </div>
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label style="display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;" th:text="#{auth.login.email}">[[#{generic.auto.email}]]</label>
                    <div style="position: relative;">
                        <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted); opacity: 0.5;"></i>
                        <input type="email" name="email" required placeholder="tu@email.com"
                            style="width: 100%; height: 52px; border-radius: 14px; border: 2px solid var(--border); padding: 0 20px 0 48px; font-size: 1rem; transition: all 0.2s; outline: none; background: var(--bg-body);" />
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label style="display: block; font-size: 0.8rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; margin-left: 4px;" th:text="#{auth.login.password}">Contraseña</label>
                    <div style="position: relative;">
                        <i data-lucide="lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted); opacity: 0.5;"></i>
                        <input type="password" name="password" id="registerPassword" required placeholder="••••••••"
                            style="width: 100%; height: 52px; border-radius: 14px; border: 2px solid var(--border); padding: 0 48px 0 48px; font-size: 1rem; transition: all 0.2s; outline: none; background: var(--bg-body);" />
                        <button type="button" onclick="togglePasswordVisibility('registerPassword', this)" 
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 8px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="eye" style="width: 18px;"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="height: 60px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 10px; background: linear-gradient(135deg, var(--primary) 0%, #4338ca 100%); border: none; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); display: flex; align-items: center; justify-content: center; width: 100%;"
                    th:text="#{auth.register.btn.submit}">Comenzar mi aventura</button>
            </form>

            <div style="text-align: center; margin-top: 35px; font-size: 0.95rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); padding-top: 25px;">
                <span th:text="#{generic.auto.ya.eres.de.los.nuestros}"></span>
                <a th:href="@{/login}" style="color: var(--primary); text-decoration: none; font-weight: 700;"
                    th:text="#{auth.register.link.login}">Inicia sesión</a>
            </div>
        </div>
    </div>

    <style>
        .fade-in-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input:focus {
            border-color: var(--primary) !important;
            background: white !important;
            box-shadow: 0 0 0 4px var(--primary-light) !important;
        }
    </style>
</div>
</body>

</html>
