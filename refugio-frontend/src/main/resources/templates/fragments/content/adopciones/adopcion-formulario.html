<!-- Vista de Formulario de Adopción: Permite registrar formalmente la unión de un animal con su adoptante -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
    <!-- HEADER PREMIUM -->
    <div class="page-header" style="text-align:center; margin-bottom: 3rem; animation: fadeInDown 0.5s ease-out;">
        <div class="premium-modal-icon-wrapper"
            style="margin: 0 auto 1.5rem; width: 64px; height: 64px; background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); color: #0369a1; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(3, 105, 161, 0.1);">
            <i data-lucide="award" style="width: 32px; height: 32px;"></i>
        </div>
        <h1 class="page-title"
            style="font-size: 2.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.75rem;">
            <span
                th:text="${adopcion.id == null ? #messages.msg('adopcion.form.title') : #messages.msg('adopcion.edit.title')}">Registrar
                Adopción</span>
        </h1>
        <p style="color:var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;"
            th:text="${adopcion.id == null ? #messages.msg('adopcion.form.subtitle.create') : #messages.msg('adopcion.form.subtitle.edit')}">
            Formalice la unión entre un animal y su nueva familia
        </p>
    </div>

    <div style="max-width: 800px; margin: 0 auto; padding-bottom: 5rem;">
        <div class="card"
            style="padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border); background: white; box-shadow: var(--shadow-xl);">
            <form id="adopcionForm"
                th:action="${adopcion.id == null ? '/web/adopciones/nueva' : '/web/adopciones/' + adopcion.id + '/editar'}"
                method="post">

                <!-- SECCIÓN 1: ANIMAL -->
                <div class="form-section" style="margin-bottom: 2.5rem;">
                    <h2
                        style="font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="paw-print" style="width: 18px;"></i>
                        [[#{html.auto.animal.adoptado}]]
                    </h2>

                    <div th:if="${adopcion.id == null}" style="position: relative;">
                        <label
                            style="display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; font-weight: 700; color: var(--text-main);">
                            <i data-lucide="search" style="width: 18px; color: var(--primary);"></i>
                            [[#{html.auto.buscar.animal}]]
                        </label>
                        <div style="position: relative;">
                            <input type="text" id="animal-search" name="animal_q" class="form-control"
                                placeholder="Nombre del animal..." autocomplete="off" hx-get="/web/animales/buscar"
                                hx-trigger="keyup changed delay:300ms, focus" hx-target="#animal-suggestions"
                                style="width: 100%; height: 54px; padding-left: 1.25rem; border-radius: 14px; border: 2px solid #e2e8f0; transition: all 0.3s;">
                            <input type="hidden" name="idAnimal" id="animalId-input" required
                                th:value="${adopcion.animalId}">
                        </div>
                        <div id="animal-suggestions"
                            style="position: absolute; width: 100%; top: 100%; left: 0; z-index: 100;"></div>
                    </div>
                    
                    <input th:if="${adopcion.id != null}" type="hidden" name="idAnimal" required
                           th:value="${adopcion.animalId}">

                    <div id="selected-animal-card"
                        th:style="${adopcion.id != null ? 'display: flex;' : 'display: none;'} + ' margin-top: 2rem; padding: 1.25rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; align-items: center; gap: 1.25rem; box-shadow: var(--shadow-sm);'">
                        <div
                            style="width: 52px; height: 52px; border-radius: 12px; overflow: hidden; background: white; border: 1px solid #e2e8f0; flex-shrink: 0;">
                            <img id="selected-animal-img" th:src="${animalData != null ? animalData.foto : ''}"
                                style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div style="flex: 1;">
                            <strong id="selected-animal-name"
                                th:text="${animalData != null ? animalData.nombre : ''}"
                                style="display: block; font-size: 1.1rem; color: var(--text-main);"></strong>
                            <span id="selected-animal-species"
                                th:text="${animalData != null ? #messages.msg('enum.Especie.' + animalData.especie) : ''}"
                                style="font-size: 0.85rem; color: #64748b;"></span>
                        </div>
                        <button type="button" onclick="clearAnimalSelection()" th:if="${adopcion.id == null}"
                            style="background: #fee2e2; border: none; color: #ef4444; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <i data-lucide="x" style="width: 18px;"></i>
                        </button>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 2rem 0;">

                <!-- SECCIÓN 2: ADOPTANTE -->
                <div class="form-section" style="margin-bottom: 2.5rem;">
                    <h2
                        style="font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="user" style="width: 18px;"></i>
                        [[#{html.auto.persona.adoptante}]]
                    </h2>

                    <div th:if="${adopcion.id == null}" style="position: relative;">
                        <label
                            style="display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; font-weight: 700; color: var(--text-main);">
                            <i data-lucide="search" style="width: 18px; color: var(--primary);"></i>
                            [[#{html.auto.buscar.adoptante}]]
                        </label>
                        <div style="position: relative;">
                            <input type="text" id="user-search" name="q" class="form-control"
                                placeholder="Nombre, email o DNI..." autocomplete="off"
                                hx-get="/web/personas/buscar?context=adopcion"
                                hx-trigger="keyup changed delay:300ms, focus" hx-target="#user-suggestions"
                                style="width: 100%; height: 54px; padding-left: 1.25rem; border-radius: 14px; border: 2px solid #e2e8f0; transition: all 0.3s;">
                            <input type="hidden" name="idPersona" id="usuarioId-input" required
                                th:value="${adopcion.adoptanteId}">
                        </div>
                        <div id="user-suggestions"
                            style="position: absolute; width: 100%; top: 100%; left: 0; z-index: 100;"></div>
                    </div>
                    
                    <input th:if="${adopcion.id != null}" type="hidden" name="idPersona" required
                           th:value="${adopcion.adoptanteId}">

                    <!-- Card de Previsualización Adoptante -->
                    <div id="selected-user-card"
                        th:style="${adopcion.id != null ? 'display: flex;' : 'display: none;'} + ' margin-top: 1.5rem; padding: 1.25rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; align-items: center; gap: 1.25rem; box-shadow: var(--shadow-sm);'">
                        <div
                            style="width: 52px; height: 52px; border-radius: 50%; background: white; color: var(--primary); display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; flex-shrink: 0;">
                            <i data-lucide="user" style="width: 24px;"></i>
                        </div>
                        <div style="flex: 1;">
                            <strong id="selected-user-name" th:text="${nombreAdoptante}"
                                style="display: block; font-size: 1.1rem; color: var(--text-main);"></strong>
                            <span style="font-size: 0.85rem; color: #64748b;" th:text="#{adopcion.auto.adoptante.validado}"></span>
                        </div>
                        <button type="button" onclick="clearUserSelection()" th:if="${adopcion.id == null}"
                            style="background: #fee2e2; border: none; color: #ef4444; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <i data-lucide="x" style="width: 18px;"></i>
                        </button>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 2rem 0;">

                <!-- SECCIÓN 3: FORMALIZACIÓN -->
                <div class="form-section">
                    <h2
                        style="font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;">
                        <i data-lucide="calendar" style="width: 18px;"></i>
                        [[#{html.auto.detalles.de.la.adopci.n}]]
                    </h2>

                    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label
                                style="display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; font-weight: 600;">
                                <i data-lucide="activity" style="width: 16px; color: var(--success);"></i>
                                [[#{html.auto.estado.del.tr.mite}]]
                            </label>
                            <select name="estado" class="form-control" required
                                style="border-radius: 12px; height: 48px; border: 2px solid #e2e8f0; font-weight: 500; color: var(--text-main);">
                                <option th:each="opt : ${estadosAdopcion}" 
                                        th:value="${opt.value}" 
                                        th:text="${opt.label}"
                                        th:selected="${adopcion.estado == opt.value}">[[#{generic.auto.status}]]</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label
                                style="display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; font-weight: 600;">
                                <i data-lucide="calendar-check" style="width: 16px; color: #6366f1;"></i>
                                [[#{html.auto.fecha.de.firma}]]
                            </label>
                            <input type="date" name="fechaAdopcion" class="form-control" required
                                th:value="${adopcion.fechaAdopcion != null ? #temporals.format(adopcion.fechaAdopcion, 'yyyy-MM-dd') : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                                style="border-radius: 12px; height: 48px; border: 2px solid #e2e8f0;">
                        </div>
                    </div>
                </div>

                <!-- ACCIONES -->
                <div class="form-actions">
                    <button type="button" class="btn-form-cancel" onclick="window.history.back()">
                        <i data-lucide="x" style="width: 18px;"></i>
                        <span th:text="#{generic.auto.cancelar}"></span>
                    </button>
                    <button type="submit" class="btn-form-submit">
                        <i data-lucide="save" style="width: 20px;"></i>
                        [[#{html.auto.confirmar.adopci.n}]]
                    </button>
                </div>
            </form>
        </div>
    </div>

    </div>
</body>

</html>
