<!-- Vista de Listado de Adopciones: Historial de adopciones completadas y gestión de contratos -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">

        <div class="table-wrapper admin-table-wrapper">
            <!-- BARRA DE ACCIONES SUPERIOR -->
            <div class="actions-bar admin-actions-bar">
                
                <!-- 1. TÍTULO E ICONO -->
                <div class="admin-title-container">
                    <div class="admin-title-icon-box">
                        <i data-lucide="home" style="width: 24px;"></i>
                    </div>
                    <div>
                        <h1 class="admin-title-text" th:text="#{adopcion.list.title}">Adopciones</h1>
                        <p class="admin-title-desc" th:text="#{adopcion.auto.gestiona.historial}">Historial y gestión de adopciones</p>
                    </div>
                </div>

                <!-- 2. FILTROS Y BÚSQUEDA (Centrados) -->
                <div class="admin-filters-container">
                    <!-- Barra de Búsqueda Reactiva -->
                    <div class="admin-search-wrapper">
                        <i data-lucide="search"
                            class="admin-search-icon"></i>
                        <input type="text" name="q" th:value="${q}" placeholder="Buscar por animal, adoptante..."
                            class="form-control admin-search-input"
                             th:hx-get="@{/web/adopciones}" hx-trigger="keyup delay:800ms, search" 
                            hx-vals='{"page": 1}'
                            hx-target="#adopcion-results"
                            hx-select="#adopcion-results"
                            hx-swap="outerHTML">
                    </div>
                </div>

                <!-- 3. ACCIONES Y EXPORTACIÓN -->
                <div class="admin-actions-group">
                    <a th:href="@{/web/adopciones/pdf}" target="_blank" title="Exportar listado a PDF" class="admin-export-btn" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/pdf.png" alt="PDF" class="admin-export-img">
                    </a>
                    <a th:href="@{/web/adopciones/excel}" target="_blank" title="Exportar listado a Excel" class="admin-export-btn" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/excel.png" alt="Excel" class="admin-export-img">
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/adopciones/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva</span>
                    </a>
                </div>
            </div>

            <!-- LISTA PREMIUM DE ADOPCIONES -->
            <div id="adopcion-results" class="premium-list-container">
                <div class="list-header admin-list-header">
                    <div style="flex: 0.5; text-align: center;" th:text="#{generic.auto.id}"></div>
                    <div style="flex: 2;" th:text="#{generic.auto.adoptante}"></div>
                    <div style="flex: 2;" th:text="#{generic.auto.animal}"></div>
                    <div style="flex: 1.5; text-align: center;" th:text="#{generic.auto.estado}"></div>
                    <div style="flex: 1.5; text-align: center;" th:text="#{adopcion.auto.fecha.firma}"></div>
                    <div style="flex: 1.2; text-align: center;" th:text="#{generic.auto.acciones}"></div>
                </div>

                <div class="list-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div th:each="i : ${adopciones}" class="premium-row-card" th:id="'row-' + ${i.id}">
                        <div class="row-cell"
                            style="flex: 0.5; justify-content: center; font-weight: 700; color: var(--text-muted);"
                            th:text="${i.id}">1</div>

                        <div class="row-cell" style="flex: 2;">
                            <div style="display: flex; align-items: center; gap: 12px;"
                                th:with="usuarioId=${adoptanteUsuarioIds != null ? adoptanteUsuarioIds['' + i.adoptanteId] : null}, 
                                          perfilObj=${perfilesMap != null and usuarioId != null ? perfilesMap['' + usuarioId] : null},
                                          usuarioObj=${usuariosMap != null and usuarioId != null ? usuariosMap['' + usuarioId] : null}">
                                <div class="task-icon-box" style="background: #dcfce7;">
                                    <i data-lucide="user" style="width: 18px; color: #22c55e;"></i>
                                </div>
                                <a th:href="@{/web/personas/{id}(id=${usuarioId != null ? usuarioId : '0'})}"
                                    style="font-weight: 800; color: var(--text-main); text-decoration: none;"
                                    th:text="${perfilObj != null and perfilObj.nombre != null ? (perfilObj.nombre + ' ' + (perfilObj.apellido ?: '')) : 
                                            (usuarioObj != null ? usuarioObj.username : 'Adoptante #' + i.adoptanteId)}">Juan Pérez</a>
                            </div>
                        </div>

                        <div class="row-cell" style="flex: 2;">
                            <div style="display: flex; align-items: center; gap: 12px;" th:with="animalObj=${animalesMap != null ? animalesMap['' + i.animalId] : null}">
                                <div style="width: 40px; height: 40px; border-radius: 10px; overflow: hidden; background: #f1f5f9; flex-shrink: 0; border: 1px solid #e2e8f0;">
                                    <img th:src="${animalObj != null and animalObj.foto != null and animalObj.foto != '' ? animalObj.foto : '/images/placeholder-animal.png'}"
                                         style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                                <a th:href="@{/web/animales/{id}(id=${i.animalId})}"
                                    style="font-weight: 800; color: var(--secondary); text-decoration: none;"
                                    th:text="${animalObj != null ? animalObj.nombre : 'Animal'}">Rocky</a>
                            </div>
                        </div>

                        <div class="row-cell" style="flex: 1.5; justify-content: center;">
                            <span class="badge-premium"
                                  th:classappend="${i.estado == 'COMPLETADA' ? 'success' : 
                                                  (i.estado == 'CANCELADA' ? 'danger' : 
                                                  (i.estado == 'PENDIENTE_FIRMA' ? 'primary' : 
                                                  (i.estado == 'EN_PERIODO_ADAPTACION' ? 'warning' : 'info')))}"
                                  th:text="${i.estado != null ? #messages.msg('enum.EstadoAdopcion.' + i.estado) : #messages.msg('enum.EstadoAdopcion.EN_PERIODO_ADAPTACION')}">Completada</span>
                        </div>

                        <div class="row-cell"
                            style="flex: 1.5; justify-content: center; font-weight: 600; color: var(--text-muted);"
                            th:text="${i.fechaAdopcion != null ? i.fechaAdopcion : '-'}">01/01/2023</div>

                        <div class="row-cell" style="flex: 1.2; justify-content: center; gap: 8px;">
                            <a class="btn-icon" th:href="@{/web/adopciones/{id}/contrato(id=${i.id})}"
                                title="Descargar Contrato" target="_blank" style="color: #4a90e2;">
                                <i data-lucide="file-signature" style="width: 16px;"></i>
                            </a>
                            <a class="btn-icon" th:href="@{/web/adopciones/{id}/editar(id=${i.id})}"
                                title="Editar">
                                <i data-lucide="edit-2" style="width: 16px;"></i>
                            </a>
                            <button class="btn-icon delete"
                                th:hx-post="@{/web/adopciones/{id}/borrar(id=${i.id})}"
                                th:hx-target="'#row-' + ${i.id}" hx-swap="outerHTML swap:0.3s"
                                th:hx-confirm="#{confirm.adopcion.eliminar}">
                                <i data-lucide="trash-2" style="width: 16px;"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Paginación -->
                <div th:replace="~{fragments/pagination :: controls(pagination=${pagination}, url='/web/adopciones', target='#adopcion-results')}"></div>

                <div th:if="${#lists.isEmpty(adopciones)}"
                    style="text-align:center; padding:5rem; background:white; border-radius:24px; border:1px solid var(--border); margin-top: 1rem;">
                    <i data-lucide="heart-off"
                        style="width:48px; height:48px; margin-bottom:1rem; color: var(--text-muted); opacity: 0.3;"></i>
                    <p style="color: var(--text-muted); font-weight: 600;" th:text="#{adopcion.list.empty}">No hay
                        adopciones registradas.</p>
                </div>
            </div>
        </div>

</div>
</body>

</html>
