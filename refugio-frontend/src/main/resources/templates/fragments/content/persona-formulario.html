<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center;">
            <h1 class="page-title"
                th:text="${persona.get('id') == null ? #messages.msg('persona.form.title') : #messages.msg('persona.modal.edit.title')}">
                Crear persona</h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;" th:text="#{persona.form.subtitle}">Complete la
                información para registrar una nueva persona</p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form
                th:action="${persona.get('id') == null ? '/web/personas/nuevo' : '/web/personas/' + persona.get('id') + '/editar'}"
                th:object="${persona}" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label th:text="#{persona.field.name}">Nombre</label>
                        <input type="text" th:field="*{nombre}" required
                            th:attr="placeholder=#{persona.placeholder.name}" th:readonly="${persona.get('id') != null}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{persona.field.surname}">Apellidos</label>
                        <input type="text" th:field="*{apellido}" required
                            th:attr="placeholder=#{persona.placeholder.surname}" th:readonly="${persona.get('id') != null}">
                    </div>

                    <div class="form-group">
                        <label th:text="#{persona.field.email}">Email</label>
                        <input type="email" th:field="*{email}" th:attr="placeholder=#{persona.placeholder.email}">
                    </div>

                    <div class="form-group" th:with="pid=${persona.get('id')}" th:if="${pid == null}">
                        <label>Contraseña</label>
                        <input type="password" name="contrasena" required placeholder="Escriba su contraseña">
                    </div>

                    <div class="form-group">
                        <label th:text="#{persona.field.phone}">Teléfono</label>
                        <input type="text" th:field="*{telefono}" th:attr="placeholder=#{persona.placeholder.phone}">
                    </div>
                </div>

                <div class="modal-actions" style="margin-top:2rem;">
                    <a th:href="@{/web/personas}" class="btn btn-secondary" style="justify-content:center;"
                        th:text="#{generic.btn.cancel}">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="justify-content:center;"
                        th:text="#{generic.btn.save}">Guardar</button>
                </div>
            </form>
        </div>


    </div>
</body>

</html>
