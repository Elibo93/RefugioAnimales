<!-- Vista de Mis Animales Adoptados (Vacío): Pantalla que se muestra cuando el usuario no tiene adopciones registradas -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
    <div class="empty-state-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem;">
        <div class="empty-state-icon" style="margin-bottom: 2rem; color: var(--primary); opacity: 0.2;">
            <i data-lucide="heart-off" style="width: 120px; height: 120px;"></i>
        </div>
        <h2 class="empty-state-title" style="font-weight: 800; color: var(--text-main); margin-bottom: 1rem; max-width: 600px; font-size: 1.5rem;" th:text="${mensajeVacio}">
            Vaya, parece que aún no te has hecho con ninguno de nuestros amiguitos
        </h2>
        <p class="empty-state-subtitle" style="color: var(--text-muted); margin-bottom: 2.5rem; max-width: 500px;">
            ¡No te preocupes! Tenemos muchos amiguitos esperando encontrar un hogar cálido y lleno de amor como el tuyo.
        </p>
        <a th:href="@{/web/animales}" class="btn btn-primary" style="padding: 1rem 2.5rem; font-size: 1.1rem; border-radius: 50px; box-shadow: 0 10px 20px rgba(var(--primary-rgb), 0.2);">
            <i data-lucide="paw-print"></i>
            <span>Adopta ahora</span>
        </a>
    </div>

</div>
</body>

</html>
