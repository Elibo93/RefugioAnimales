<!-- Vista de Éxito de Solicitud (Modal): Confirmación visual tras el envío correcto de una petición de adopción -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="success-modal" class="modal-overlay" id="modal-host" onclick="this.innerHTML=''">
    <div class="modal" onclick="event.stopPropagation()" style="text-align:center; max-width: 450px; padding: 3rem 2rem;">
        
        <div style="background: #DCFCE7; color: #15803D; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
            <i data-lucide="check-circle" style="width: 48px; height: 48px;"></i>
        </div>

        <h2 style="font-size: 1.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem;" th:text="#{solicitud.auto.solicitud.enviada.1}"></h2>
        
        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem;" th:text="#{solicitud.auto.hemos.registrado.tu.solicitud.de.adopcio}"></p>

        <button class="btn btn-primary" style="width: 100%; padding: 1rem;" onclick="window.location.reload()" th:text="#{solicitud.auto.entendido}"></button>

    </div>
</div>
</body>

</html>
