<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{historial.list.title}">Historiales Médicos</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/historiales/pdf}" target="_blank"
                        th:text="#{generic.link.export.pdf}">
                        Exportar PDF
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/historiales/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo historial</span>
                    </a>
                </div>
            </div>
            <table id="tablahistoriales">
                <thead>
                    <tr>
                        <th th:text="#{persona.table.header.id}">ID</th>
                        <th th:text="#{historial.table.header.animal}">Animal</th>
                        <th th:text="#{historial.table.header.fecha}">Fecha</th>
                        <th th:text="#{historial.table.header.veterinario}">Veterinario</th>
                        <th th:text="#{workshop.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${historiales}" th:id="'row-' + ${h.get('id')}">
                        <td th:text="${h.get('id')}">1</td>
                        <td style="font-weight:600;color:var(--primary);"
                            th:with="a=${h.get('animalId') != null and animalesMap != null ? animalesMap[h.get('animalId')] : null}"
                            th:text="${a != null ? a.get('nombre') : 'Desconocido'}">Animal</td>
                        <td
                            th:text="${h.get('fecha') != null ? h.get('fecha').toString().replace('T', ' ').substring(0, (h.get('fecha').toString().length() > 10 ? 10 : h.get('fecha').toString().length())) : '-'}">
                            01/01/2024</td>
                        <td th:text="${h.get('veterinario')}">Dr. Smith</td>
                        <td class="actions-cell">
                            <!-- Botón de Ver Detalle -->
                            <button class="btn-icon" 
                                    th:hx-get="@{/web/historiales/{id}/detalle(id=${h.get('id')})}"
                                    hx-target="#modal-host"
                                    title="Ver Detalles">
                                <i data-lucide="eye"></i>
                            </button>
                            
                            <a class="btn-icon" th:href="@{/web/historiales/{id}/editar(id=${h.get('id')})}" title="Editar">
                                <i data-lucide="edit-2"></i>
                            </a>
                            <button class="btn-icon delete"
                                th:hx-post="@{/web/historiales/{id}/borrar(id=${h.get('id')})}"
                                th:hx-target="'#row-' + ${h.get('id')}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar historial médico?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(historiales)}" style="text-align:center;padding:3rem;color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{historial.list.empty}">No hay historiales registrados.</p>
            </div>
        </div>

    </div>
</body>

</html>
