<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{tarea.list.title}">Tareas</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/tareas/pdf}" target="_blank"
                        th:text="#{generic.link.export.pdf}">
                        Exportar PDF
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/tareas/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva tarea</span>
                    </a>
                </div>
            </div>
            <table id="tablatareas">
                <thead>
                    <tr>
                        <th th:text="#{persona.table.header.id}">ID</th>
                        <th th:text="#{tarea.table.header.descripcion}">Descripción</th>
                        <th>Asignado a</th>
                        <th th:text="#{tarea.table.header.estado}">Estado</th>
                        <th th:text="#{tarea.table.header.fecha}">Fecha</th>
                        <th th:text="#{workshop.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tareas}" th:id="'row-' + ${t.get('id')}">
                        <td th:text="${t.get('id')}">1</td>
                        <td style="font-weight:600;color:var(--primary);" th:text="${t.get('descripcion')}">Descripción
                        </td>

                        <!-- Iterate voluntarioIds and look up names -->
                        <td>
                            <div th:if="${t.get('voluntarioIds') != null and !t.get('voluntarioIds').isEmpty()}"
                                style="display:flex; flex-direction:column; gap:4px;">
                                <span th:each="vid : ${t.get('voluntarioIds')}"
                                    th:with="vidStr=${vid.toString()}, nombre=${voluntarioNombres != null ? voluntarioNombres[vidStr] : null}"
                                    th:text="${nombre != null ? nombre : 'Voluntario ' + vid}"
                                    style="background:var(--bg-secondary); padding:2px 8px; border-radius:12px; font-size:0.85rem; color:var(--text-main); display:inline-block; border: 1px solid var(--border-color); width: fit-content;">
                                </span>
                            </div>
                            <span th:if="${t.get('voluntarioIds') == null or t.get('voluntarioIds').isEmpty()}"
                                style="color:var(--text-muted); font-size: 0.85rem;">
                                Sin asignar
                            </span>
                        </td>

                        <td>
                            <span class="badge-soon"
                                th:classappend="${t.get('estado') != null ? (t.get('estado').toString() == 'COMPLETADA' ? 'success' : (t.get('estado').toString() == 'CANCELADA' ? 'danger' : 'warning')) : 'warning'}"
                                th:text="${t.get('estado')}">PENDIENTE</span>
                        </td>
                        <td
                            th:text="${t.get('fecha') != null ? t.get('fecha').toString().replace('T', ' ').substring(0, (t.get('fecha').toString().length() > 10 ? 10 : t.get('fecha').toString().length())) : '-'}">
                            01/01/2024</td>
                        <td style="display:flex; gap:8px;">
                            <a class="btn-icon" th:href="@{/web/tareas/{id}/editar(id=${t.get('id')})}">
                                <i data-lucide="edit-2" style="width:16px;"></i>
                            </a>
                            <button class="btn-icon delete" th:hx-post="@{/web/tareas/{id}/borrar(id=${t.get('id')})}"
                                th:hx-target="'#row-' + ${t.get('id')}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar tarea?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(tareas)}" style="text-align:center;padding:3rem;color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{tarea.list.empty}">No hay tareas registradas.</p>
            </div>
        </div>
    </div>
</body>

</html>
