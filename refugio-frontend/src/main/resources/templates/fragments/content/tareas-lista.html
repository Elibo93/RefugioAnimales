<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="table-wrapper">
            <div class="actions-bar" style="display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: nowrap;">
                <div style="display:flex; align-items:center; gap:20px; flex: 1;">
                    <span class="user-name page" style="white-space: nowrap; margin: 0;" th:text="#{tarea.list.title}">Tareas</span>

                    <!-- Filtros Reactivos -->
                    <div style="display: flex; align-items: center; gap: 12px; flex: 1; max-width: 700px;">
                        <!-- Selector de Prioridad -->
                        <div style="position: relative; min-width: 160px;">
                            <i data-lucide="zap" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-muted);"></i>
                            <select name="prioridad" 
                                    class="form-control"
                                    style="padding-left: 35px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); font-size: 0.9rem; cursor: pointer; width: 100%;"
                                    th:hx-get="@{/web/tareas}"
                                    hx-trigger="change"
                                    hx-target=".content-body"
                                    hx-swap="outerHTML"
                                    th:attr="hx-vals='{&quot;estado&quot;: &quot;' + ${selectedEstado} + '&quot;}'">
                                <option value="ALL" th:selected="${selectedPrioridad == 'ALL'}">Todas las prioridades</option>
                                <option value="ALTA" th:selected="${selectedPrioridad == 'ALTA'}">Alta prioridad</option>
                                <option value="MEDIA" th:selected="${selectedPrioridad == 'MEDIA'}">Media prioridad</option>
                                <option value="BAJA" th:selected="${selectedPrioridad == 'BAJA'}">Baja prioridad</option>
                            </select>
                        </div>

                        <!-- Selector de Estado -->
                        <div style="position: relative; min-width: 180px;">
                            <i data-lucide="activity" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-muted);"></i>
                            <select name="estado" 
                                    class="form-control"
                                    style="padding-left: 35px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); font-size: 0.9rem; cursor: pointer; width: 100%;"
                                    th:hx-get="@{/web/tareas}"
                                    hx-trigger="change"
                                    hx-target=".content-body"
                                    hx-swap="outerHTML"
                                    th:attr="hx-vals='{&quot;prioridad&quot;: &quot;' + ${selectedPrioridad} + '&quot;}'">
                                <option value="ALL" th:selected="${selectedEstado == 'ALL'}">Todos los estados</option>
                                <option value="PENDIENTE" th:selected="${selectedEstado == 'PENDIENTE'}">Pendientes</option>
                                <option value="EN_PROCESO" th:selected="${selectedEstado == 'EN_PROCESO'}">En proceso</option>
                                <option value="COMPLETADA" th:selected="${selectedEstado == 'COMPLETADA'}">Completadas</option>
                                <option value="CANCELADA" th:selected="${selectedEstado == 'CANCELADA'}">Canceladas</option>
                            </select>
                        </div>

                        <a th:href="@{/web/tareas}" 
                           hx-get="/web/tareas" 
                           hx-target="#contenido-dinamico"
                           hx-push-url="true"
                           class="btn-icon" 
                           title="Limpiar filtros"
                           style="background: var(--bg-main); border: 1px solid var(--border); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-muted);">
                            <i data-lucide="refresh-cw" style="width: 16px;"></i>
                        </a>
                    </div>
                </div>

                <div style="display:flex; gap:10px; flex-shrink: 0;">
                    <a class="btn btn-secondary" th:href="@{/web/tareas/pdf(prioridad=${selectedPrioridad}, estado=${selectedEstado})}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">PDF</span>
                    </a>
                    <a th:if="${isAdmin}" class="btn btn-primary" th:href="@{/web/tareas/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva tarea</span>
                    </a>
                </div>
            </div>

            <div class="content-body" th:fragment="content-body">
                <!-- LISTA PREMIUM PARA ADMINS -->
                <div th:if="${isAdmin}" class="premium-list-container" style="margin-top: 1.5rem;">
                    <!-- Encabezados -->
                    <div class="list-header" style="background: transparent; padding: 0 1.5rem 1rem; display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 40px; text-align: center;">#</div>
                        <div style="flex: 2;">Descripción</div>
                        <div style="flex: 1.5;">Asignado a</div>
                        <div style="flex: 1; text-align: center;">Estado</div>
                        <div style="flex: 1.2; text-align: center;">Prioridad / Fecha</div>
                        <div style="width: 100px; text-align: right;">Acción</div>
                    </div>

                    <div class="list-rows" style="display: flex; flex-direction: column; gap: 12px;">
                        <div th:each="t, iterStat : ${tareas}" th:id="'row-' + ${t.get('id')}" class="premium-row-card">
                            <!-- ID -->
                            <div class="row-cell" style="width: 40px; justify-content: center; font-weight: 700; color: var(--text-muted);"
                                th:text="${iterStat.count}">1</div>

                            <!-- Descripción -->
                            <div class="row-cell" style="flex: 2;">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div class="task-icon-box">
                                        <i data-lucide="clipboard-list" style="width: 18px; color: var(--primary);"></i>
                                    </div>
                                    <div>
                                        <span style="display: block; font-weight: 800; color: var(--text-main); font-size: 0.95rem;"
                                            th:text="${t.get('descripcion')}">Descripción</span>
                                        <span th:if="${t.get('instrucciones') != null and !t.get('instrucciones').isEmpty()}"
                                            style="font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
                                            <i data-lucide="info" style="width: 12px;"></i>
                                            <span th:text="${#strings.abbreviate(t.get('instrucciones'), 40)}"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <!-- Asignado a -->
                            <div class="row-cell" style="flex: 1.5;">
                                <div th:if="${t.get('voluntarioIds') != null and !t.get('voluntarioIds').isEmpty()}"
                                    style="display: flex; flex-direction: column; gap: 6px;">
                                    <div th:each="vid : ${t.get('voluntarioIds')}"
                                        th:with="vidStr=${vid.toString()}, nombre=${voluntarioNombres != null ? voluntarioNombres.get(vidStr) : null}, uid=${voluntarioUsuarioIds != null ? voluntarioUsuarioIds.get(vidStr) : '0'}"
                                        class="volunteer-mini-card">
                                        <div class="avatar-circle">
                                            <i data-lucide="user" style="width: 10px;"></i>
                                        </div>
                                        <a th:href="@{/web/personas/{id}(id=${uid})}"
                                            th:text="${nombre != null ? nombre : 'Voluntario ' + vid}"
                                            class="volunteer-link"></a>
                                    </div>
                                </div>
                                <span th:if="${t.get('voluntarioIds') == null or t.get('voluntarioIds').isEmpty()}"
                                    style="color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 6px;">
                                    <i data-lucide="user-minus" style="width: 14px; opacity: 0.5;"></i>
                                    Sin asignar
                                </span>
                            </div>

                            <!-- Estado -->
                            <div class="row-cell" style="flex: 1; justify-content: center;">
                                <span class="badge-premium"
                                    th:classappend="${t.get('estado') == 'COMPLETADA' ? 'success' : (t.get('estado') == 'CANCELADA' ? 'danger' : (t.get('estado') == 'EN_PROCESO' ? 'info' : 'warning'))}"
                                    th:text="${t.get('estado') != null ? #strings.capitalize(#strings.toLowerCase(#strings.replace(t.get('estado'), '_', ' '))) : 'Pendiente'}">
                                </span>
                            </div>

                            <!-- Prioridad / Fecha -->
                            <div class="row-cell" style="flex: 1.2; justify-content: center;">
                                <div style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
                                    <span th:if="${t.get('prioridad') == 'ALTA'}" class="priority-tag high">ALTA</span>
                                    <span th:if="${t.get('prioridad') == 'MEDIA'}" class="priority-tag medium">MEDIA</span>
                                    <span th:if="${t.get('prioridad') == 'BAJA'}" class="priority-tag low">BAJA</span>
                                    <div th:if="${t.get('fechaLimite') != null}"
                                        style="font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
                                        <i data-lucide="calendar" style="width: 12px;"></i>
                                        <span th:text="${t.get('fechaLimite').toString().substring(8,10) + '/' + t.get('fechaLimite').toString().substring(5,7)}"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- Acciones -->
                            <div class="row-cell" style="width: 100px; justify-content: flex-end; gap: 8px;">
                                <button class="btn-icon edit"
                                    th:hx-get="@{/web/tareas/{id}/editar(id=${t.get('id')})}"
                                    hx-target="#contenido-dinamico" hx-push-url="true">
                                    <i data-lucide="edit-2"></i>
                                </button>
                                <button class="btn-icon delete"
                                    th:hx-post="@{/web/tareas/{id}/borrar(id=${t.get('id')})}"
                                    th:hx-target="'#row-' + ${t.get('id')}" hx-swap="outerHTML swap:0.3s"
                                    hx-confirm="¿Deseas eliminar esta tarea?">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TABLA PARA VOLUNTARIOS -->
                <div th:if="${!isAdmin}" class="volunteer-tasks-view" style="margin-top: 1.5rem;">
                    <table id="tablatareas-voluntario">
                        <thead>
                            <tr>
                                <th style="width:40px;">#</th>
                                <th th:text="#{tarea.table.header.descripcion}">Descripción</th>
                                <th>Prioridad / Vencimiento</th>
                                <th style="text-align:center;">Estado</th>
                                <th style="text-align:right;">Guardar</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="t, iterStat : ${tareas}" th:id="'row-vol-' + ${t.get('id')}" class="task-row">
                                <td th:text="${iterStat.count}">1</td>
                                <td style="font-weight:600; color:var(--primary);">
                                    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                                        <span th:text="${t.get('descripcion')}"></span>
                                        <span th:if="${t.get('instrucciones') != null and !t.get('instrucciones').isEmpty()}"
                                            th:title="${t.get('instrucciones')}" style="cursor:help;">
                                            <i data-lucide="info" style="width:16px; color:var(--text-muted);"></i>
                                        </span>
                                    </div>
                                </td>
                                <td>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <i th:if="${t.get('prioridad') == 'ALTA'}" data-lucide="zap" style="color:var(--danger); width:16px;"></i>
                                        <i th:if="${t.get('prioridad') == 'MEDIA'}" data-lucide="activity" style="color:var(--warning); width:16px;"></i>
                                        <i th:if="${t.get('prioridad') == 'BAJA'}" data-lucide="arrow-down-circle" style="color:var(--success); width:16px;"></i>
                                        <span th:if="${t.get('fechaLimite') != null}" style="font-size:0.85rem;" 
                                              th:text="${t.get('fechaLimite').toString().substring(8,10) + '/' + t.get('fechaLimite').toString().substring(5,7)}"></span>
                                    </div>
                                </td>
                                <td>
                                    <div class="status-radio-group" style="display: flex; gap: 8px; justify-content: center;">
                                        <div class="radio-item" title="Pendiente">
                                            <input type="radio" name="estado" value="PENDIENTE" th:checked="${t.get('estado') == 'PENDIENTE'}" th:form="'form-tarea-' + ${t.get('id')}"
                                                   th:onchange="'document.getElementById(\'btn-save-' + ${t.get('id')} + '\').style.display = \'inline-block\''">
                                        </div>
                                        <div class="radio-item" title="En Proceso">
                                            <input type="radio" name="estado" value="EN_PROCESO" th:checked="${t.get('estado') == 'EN_PROCESO'}" th:form="'form-tarea-' + ${t.get('id')}"
                                                   th:onchange="'document.getElementById(\'btn-save-' + ${t.get('id')} + '\').style.display = \'inline-block\''">
                                        </div>
                                        <div class="radio-item" title="Completada">
                                            <input type="radio" name="estado" value="COMPLETADA" th:checked="${t.get('estado') == 'COMPLETADA'}" th:form="'form-tarea-' + ${t.get('id')}"
                                                   th:onchange="'document.getElementById(\'btn-save-' + ${t.get('id')} + '\').style.display = \'inline-block\''">
                                        </div>
                                    </div>
                                </td>
                                <td style="text-align:right;">
                                    <form th:id="'form-tarea-' + ${t.get('id')}" th:action="@{/web/tareas/{id}/editar(id=${t.get('id')})}" method="post" style="display:none;">
                                        <input type="hidden" name="descripcion" th:value="${t.get('descripcion')}">
                                        <input type="hidden" name="fechaLimite" th:value="${t.get('fechaLimite')}">
                                        <input type="hidden" name="instrucciones" th:value="${t.get('instrucciones')}">
                                        <th:block th:if="${t.get('voluntarioIds') != null}">
                                            <input th:each="vid : ${t.get('voluntarioIds')}" type="hidden" name="voluntarioIds" th:value="${vid}">
                                        </th:block>
                                    </form>
                                    <button type="submit" th:id="'btn-save-' + ${t.get('id')}" th:form="'form-tarea-' + ${t.get('id')}" class="btn btn-primary" style="display:none; font-size:0.7rem; padding:4px 8px; height:auto;">Guardar</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Mensaje si no hay resultados -->
                <div th:if="${#lists.isEmpty(tareas)}" 
                     style="background: white; padding: 4rem 2rem; border-radius: 16px; border: 1px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center; margin-top: 1rem;">
                    <div style="background: var(--bg-main); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="search-x" style="width: 32px; color: var(--text-muted);"></i>
                    </div>
                    <div>
                        <h3 style="margin: 0; color: var(--text-main); font-weight: 700;">No se encontraron tareas</h3>
                        <p style="margin: 5px 0 0; color: var(--text-muted); font-size: 0.9rem;">Prueba con otros filtros de prioridad o estado.</p>
                    </div>
                    <a th:href="@{/web/tareas}" 
                       hx-get="/web/tareas" 
                       hx-target=".content-body"
                       hx-swap="outerHTML"
                       class="btn-premium secondary" style="height: 40px; padding: 0 1.5rem;">
                        Ver todas las tareas
                    </a>
                </div>
            </div>
        </div>    </div>

    </div>
</body>

</html>
