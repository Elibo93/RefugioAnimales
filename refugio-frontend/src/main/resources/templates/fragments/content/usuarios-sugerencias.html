<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="suggestions">
        <ul th:if="${not #lists.isEmpty(usuariosEncontrados)}" 
            class="autocomplete-list"
            style="list-style: none; padding: 5px; margin: 5px 0 0; border: 1px solid var(--border); border-radius: 12px; background: white; width: 100%; box-shadow: var(--shadow-lg); max-height: 250px; overflow-y: auto;">
            <li th:each="u : ${usuariosEncontrados}" 
                class="suggestion-item"
                th:style="'padding: 10px 15px; cursor: ' + (${u.yaRegistrado} ? 'not-allowed' : 'pointer') + '; border-radius: 8px; transition: all 0.2s; margin-bottom: 2px; opacity: ' + (${u.yaRegistrado} ? '0.7' : '1') + ';'"
                th:onmouseover="${!u.yaRegistrado} ? 'this.style.background=\'var(--primary-light)\'; this.style.color=\'var(--primary)\'' : ''"
                th:onmouseout="${!u.yaRegistrado} ? 'this.style.background=\'transparent\'; this.style.color=\'inherit\'' : ''"
                th:attr="onclick=|selectUser('${u.id}', '${u.nombre} ${u.apellido}', ${u.yaRegistrado}, '${u.adoptanteId}')|">
                
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <strong th:text="${u.nombre + ' ' + u.apellido}" style="display: block; font-size: 0.95rem;"></strong>
                            <span th:if="${u.yaRegistrado}" 
                                  style="font-size: 0.65rem; background: var(--danger-bg); color: var(--danger); padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase;">
                                Ya registrado
                            </span>
                        </div>
                        <small th:text="${u.email}" style="color: var(--text-muted); font-size: 0.8rem;"></small>
                    </div>
                </div>
            </li>
        </ul>
        <div th:if="${#lists.isEmpty(usuariosEncontrados)}" 
             style="padding: 15px; border: 1px solid var(--border); border-radius: 12px; background: white; color: var(--text-muted); font-size: 0.85rem; box-shadow: var(--shadow-lg); margin-top: 5px; text-align: center;">
            No se encontraron usuarios
        </div>
    </div>
</body>
</html>
