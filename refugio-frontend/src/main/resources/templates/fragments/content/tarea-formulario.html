<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="content">
    <div class="page-header" style="text-align:center;">
        <h1 class="page-title" th:text="${tarea.get('id') == null ? #messages.msg('tarea.form.title') : #messages.msg('tarea.modal.edit.title')}">Nueva tarea</h1>
    </div>
    <div class="card" style="max-width:800px; margin:0 auto;">
        <form th:action="${tarea.get('id') == null ? '/web/tareas/nueva' : '/web/tareas/' + tarea.get('id') + '/editar'}" method="post">
            <div class="form-grid">
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{tarea.field.descripcion}">Descripción</label>
                    <input type="text" name="descripcion" th:value="${tarea.get('descripcion')}" required>
                </div>
                <div class="form-group">
                    <label th:text="#{tarea.field.estado}">Estado</label>
                    <select name="estado" required>
                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}" th:selected="${e == tarea.get('estado')}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label th:text="#{tarea.field.voluntarios}">Voluntarios asignados</label>
                    <select name="voluntarioIds" multiple style="height:100px;">
                        <option th:each="v : ${voluntarios}" th:value="${v.get('id').get('value')}" 
                                th:with="u=${usuariosMap[v.get('usuarioId').get('value')]}"
                                th:text="${u?.get('nombre') + ' ' + u?.get('apellido')}"
                                th:selected="${tarea.get('voluntarios') != null and tarea.get('voluntarios').contains(v.get('id').get('value'))}"></option>
                    </select>
                </div>
            </div>
            <div class="modal-actions" style="margin-top:2rem;">
                <a th:href="@{/web/tareas}" class="btn btn-secondary" th:text="#{generic.btn.cancel}">Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar tarea</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
