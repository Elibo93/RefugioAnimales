<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="page-header" style="text-align:center; margin-bottom: 2rem;">
            <h1 class="page-title" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div class="premium-modal-icon-wrapper" style="margin: 0; width: 48px; height: 48px; background: #f3f4f6; color: #4b5563;">
                    <i data-lucide="clipboard-list"></i>
                </div>
                <span th:text="${tarea.get('id') == null ? (voluntarioPreseleccionado != null ? 'Asignar tarea a ' + voluntarioPreseleccionado.get('nombre') : 'Crear tarea') : 'Editar tarea'}">
                    Crear tarea
                </span>
            </h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;">Configure los detalles y plazos de la tarea</p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form th:action="${tarea.get('id') == null ? '/web/tareas/nueva' : '/web/tareas/' + tarea.get('id') + '/editar'}"
                method="post">

                <div class="form-grid">
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Descripción de la tarea</label>
                        <input type="text" name="descripcion" th:value="${tarea.get('descripcion')}" 
                               placeholder="Ej: Limpieza profunda del sector B" required>
                    </div>

                    <div class="form-group">
                        <label>Estado</label>
                        <select name="estado" required>
                            <option th:each="e : ${estados}" th:value="${e}" 
                                th:text="${#strings.capitalize(e.toLowerCase().replace('_', ' '))}"
                                th:selected="${e == tarea.get('estado')}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Fecha y Hora Límite (Vencimiento)</label>
                        <input type="datetime-local" name="fechaLimite" th:value="${tarea.get('fechaLimite')}">
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Instrucciones detalladas</label>
                        <textarea name="instrucciones" rows="3" placeholder="Añade detalles, precauciones o información adicional sobre la tarea"
                                  th:text="${tarea.get('instrucciones')}"></textarea>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Voluntario asignado <span style="color:var(--text-muted); font-size:0.8rem; font-weight:400;">(opcional)</span></label>
                        
                        <!-- Buscador de Voluntarios -->
                        <div id="volunteer-search-container" style="position: relative;" th:styleappend="${tarea.get('voluntarioIds') != null and !tarea.get('voluntarioIds').isEmpty() ? 'display: none;' : ''}">
                            <div style="position: relative;">
                                <i data-lucide="search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted);"></i>
                                <input type="text" 
                                       id="volunteer-search-input"
                                       placeholder="Buscar voluntario por nombre, apellido o email..." 
                                       style="padding-left: 40px;"
                                       hx-get="/web/voluntarios/sugerencias"
                                       hx-trigger="keyup[target.value.length >= 2] delay:300ms, search"
                                       hx-target="#volunteer-suggestions"
                                       name="q">
                            </div>
                            <div id="volunteer-suggestions"></div>
                        </div>

                        <!-- Voluntario Seleccionado -->
                        <div id="selected-volunteer-tag" 
                             style="display: flex; align-items: center; justify-content: space-between; background: var(--bg-main); border: 1px solid var(--border); padding: 12px 16px; border-radius: 12px; margin-top: 5px;"
                             th:styleappend="${(tarea.get('voluntarioIds') == null or tarea.get('voluntarioIds').isEmpty()) and voluntarioPreseleccionado == null ? 'display: none;' : ''}">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="background: var(--primary-light); color: var(--primary); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                                    <i data-lucide="user" style="width: 18px;"></i>
                                </div>
                                <div>
                                    <span id="selected-volunteer-name" style="display: block; font-weight: 700; color: var(--text-main);"
                                          th:text="${voluntarioPreseleccionado != null ? (voluntarioPreseleccionado.get('nombre') + ' ' + (voluntarioPreseleccionado.get('apellido') ?: '')) : (tarea.get('voluntarioIds') != null and !tarea.get('voluntarioIds').isEmpty() ? (voluntarioNombres != null ? voluntarioNombres[tarea.get('voluntarioIds')[0].toString()] : 'Voluntario asignado') : '')}">
                                        Nombre del Voluntario
                                    </span>
                                    <small style="color: var(--text-muted); font-size: 0.75rem;">Voluntario asignado a esta tarea</small>
                                </div>
                            </div>
                            <button type="button" class="btn-icon delete" onclick="removeVolunteer()" style="width: 32px; height: 32px;">
                                <i data-lucide="x" style="width: 16px;"></i>
                            </button>
                        </div>

                        <!-- ID Oculto para el formulario -->
                        <input type="hidden" name="voluntarioIds" id="selected-volunteer-id" 
                               th:value="${voluntarioPreseleccionado != null ? voluntarioPreseleccionado.get('id') : (tarea.get('voluntarioIds') != null and !tarea.get('voluntarioIds').isEmpty() ? tarea.get('voluntarioIds')[0] : '')}">
                    </div>

                    <script th:inline="javascript">
                        function selectVolunteer(id, name) {
                            document.getElementById('selected-volunteer-id').value = id;
                            document.getElementById('selected-volunteer-name').innerText = name;
                            document.getElementById('volunteer-search-container').style.display = 'none';
                            document.getElementById('selected-volunteer-tag').style.display = 'flex';
                            document.getElementById('volunteer-suggestions').innerHTML = '';
                            document.getElementById('volunteer-search-input').value = '';
                        }

                        function removeVolunteer() {
                            document.getElementById('selected-volunteer-id').value = '';
                            document.getElementById('selected-volunteer-tag').style.display = 'none';
                            document.getElementById('volunteer-search-container').style.display = 'block';
                            setTimeout(() => {
                                document.getElementById('volunteer-search-input').focus();
                            }, 100);
                        }

                        // Cerrar sugerencias al hacer click fuera
                        document.addEventListener('click', function(e) {
                            const suggestions = document.getElementById('volunteer-suggestions');
                            const searchInput = document.getElementById('volunteer-search-input');
                            if (suggestions && !suggestions.contains(e.target) && e.target !== searchInput) {
                                suggestions.innerHTML = '';
                            }
                        });
                    </script>

                </div>

                <div class="modal-actions" style="margin-top: 3rem; display: flex; gap: 15px; justify-content: flex-end;">
                    <a th:href="${returnUrl}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="save" style="width: 18px;"></i>
                        <span th:text="${tarea.get('id') == null ? 'Crear Tarea' : 'Guardar Cambios'}">Crear Tarea</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
