<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div id="formulario-donacion" class="glass-panel"
            style="max-width:800px; margin:2rem auto; padding: 3rem; border-radius: 24px;">
            <div class="page-header" style="text-align:center; margin-bottom: 2.5rem;">
                <h2 style="font-size: 2.25rem; font-weight: 800; color: var(--text-main);"
                    th:if="${donacion == null or donacion.get('id') == null}"
                    th:text="#{donacion.form.title}">Registrar donación</h2>
                <h2 style="font-size: 2.25rem; font-weight: 800; color: var(--text-main);"
                    th:unless="${donacion == null or donacion.get('id') == null}"
                    th:text="#{donacion.modal.edit.title}">Editar donación</h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Tu generosidad hace posible nuestra labor
                    diaria</p>
            </div>

            <!-- Monthly / One-time Toggle -->
            <div class="view-toggle">
                <button type="button" class="toggle-btn active" onclick="setRecurrence('unica')">Donación única</button>
                <button type="button" class="toggle-btn" onclick="setRecurrence('mensual')">Donación mensual</button>
            </div>
            <form th:action="${formActionUrl}" method="post">
                <!-- Hidden field for Frequency -->
                <input type="hidden" name="frecuencia" id="frecuencia-input"
                    th:value="${donacion != null and donacion.get('frecuencia') != null ? donacion.get('frecuencia') : 'UNICA'}">

                <div class="form-grid">

                    <!-- 1. IDENTIFICACIÓN -->
                    <div class="form-group" style="grid-column: 1/-1;">
                        <label th:text="#{donacion.field.usuario}">Donante</label>

                        <div th:if="${currentUserId != null}" class="alert alert-success glass-panel"
                            style="padding: 1rem; border-radius: 12px; background: rgba(220, 252, 231, 0.5); color: #15803d; border: 1px solid #bbf7d0; display: flex; align-items: center; gap: 0.75rem;">
                            <i data-lucide="user" style="width: 24px; height: 24px;"></i>
                            <span style="font-weight: 600;" th:text="${currentUserName}">Nombre de Usuario</span>
                        </div>

                        <div th:unless="${currentUserId != null}" class="alert alert-info glass-panel"
                            style="padding: 1rem; border-radius: 12px; background: rgba(224, 242, 254, 0.5); color: #0369a1; border: 1px solid #bae6fd; display: flex; align-items: center; gap: 0.75rem;">
                            <i data-lucide="info" style="width: 24px; height: 24px;"></i>
                            <span style="font-weight: 600;">Donación Anónima</span>
                        </div>

                        <input type="hidden" name="usuarioId"
                            th:value="${currentUserId}">

                    </div>

                    <!-- 2. SELECTOR DE TIPO -->
                    <div class="form-group" style="grid-column: 1/-1;">
                        <label th:text="#{donacion.field.tipo}">¿En qué quieres ayudarnos?</label>
                        <div class="select-wrapper">
                            <select name="tipo" id="donation-type-select" required onchange="handleTypeChange()"
                                style="font-size: 1.1rem; padding: 1rem; border-radius: 15px; border: 2px solid var(--primary); width:100%;">
                                <option th:each="t : ${tipos}" th:value="${t}"
                                    th:text="${t}"
                                    th:selected="${(donacion == null or donacion.get('tipo') == null) ? t == 'DINERO' : t == donacion.get('tipo')}"></option>
                            </select>
                        </div>
                    </div>

                    <!-- 3. CONFIGURACIÓN DE DINERO (Solo se muestra para DINERO) -->
                    <div id="panel-dinero-extra" style="grid-column: 1/-1; display: none;">
                        <div class="view-toggle" style="margin-bottom: 2rem;">
                            <button type="button" id="btn-unica" class="toggle-btn active"
                                onclick="setRecurrence('unica')">Donación única</button>
                            <button type="button" id="btn-mensual" class="toggle-btn"
                                onclick="setRecurrence('mensual')">Donación mensual</button>
                        </div>

                        <div class="form-group">
                            <label>Selecciona una cantidad rápida</label>
                            <div class="amount-selector">
                                <button type="button" class="amount-btn" onclick="setAmount(10, this)">10€</button>
                                <button type="button" class="amount-btn" onclick="setAmount(30, this)">30€</button>
                                <button type="button" class="amount-btn" onclick="setAmount(50, this)">50€</button>
                                <button type="button" class="amount-btn" onclick="setAmount(100, this)">100€</button>
                                <button type="button" class="amount-btn" onclick="focusAmount(this)">Otra</button>
                            </div>
                        </div>
                    </div>

                    <!-- 4. CAMPOS UNIFICADOS (Cantidad y Descripción) -->
                    <div id="panel-unificado" class="dynamic-panel" style="grid-column: 1/-1; display: none;">
                        <div class="form-grid">
                            <div class="form-group" id="main-amount-container">
                                <label id="label-cantidad">Cantidad</label>
                                <div class="input-with-icon">
                                    <i id="icon-cantidad" data-lucide="euro" class="input-icon"></i>
                                    <input type="number" step="0.01" name="cantidad" id="input-cantidad"
                                        th:value="${donacion != null ? donacion.get('cantidad') : ''}" required placeholder="0.00">
                                </div>
                            </div>

                            <div class="form-group" style="grid-column: 1/-1;">
                                <label id="label-descripcion">Mensaje o detalles</label>
                                <textarea name="descripcion" id="input-descripcion" th:text="${donacion != null ? donacion.get('descripcion') : ''}"
                                    required style="height: 120px;"
                                    placeholder="Escribe un mensaje de apoyo..."></textarea>
                            </div>
                        </div>
                    </div>

                </div>

                <div id="form-actions" class="modal-actions" style="margin-top:2.5rem; display: none;">
                    <a th:href="@{/web/donaciones}" class="btn btn-secondary btn-lg"
                        th:text="#{generic.btn.cancel}">Volver</a>
                    <button type="submit" class="btn btn-primary btn-lg"
                        style="box-shadow: 0 10px 15px -3px rgba(21, 128, 61, 0.3);">
                        <i data-lucide="heart" style="width:20px;"></i>
                        <span id="submit-text">Confirmar Donación</span>
                    </button>
                </div>
            </form>
        </div>

        <style>
            .dynamic-panel {
                transition: all 0.4s ease;
                animation: fadeInScale 0.4s ease-out;
            }

            @keyframes fadeInScale {
                from {
                    opacity: 0;
                    transform: scale(0.98) translateY(10px);
                }

                to {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }

            .input-with-icon {
                position: relative;
            }

            .input-icon {
                position: absolute;
                left: 1.25rem;
                top: 50%;
                transform: translateY(-50%);
                color: var(--primary);
                width: 20px;
                transition: all 0.3s ease;
            }

            .input-with-icon input {
                padding-left: 3.5rem !important;
            }

            .input-with-icon input:focus+.input-icon {
                transform: translateY(-50%) scale(1.1);
            }

            .select-wrapper select:focus {
                border-color: var(--primary-dark);
                box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.1);
            }
        </style>

        <script>
            function handleTypeChange() {
                const type = document.getElementById('donation-type-select').value;
                const panelDineroExtra = document.getElementById('panel-dinero-extra');
                const panelUnificado = document.getElementById('panel-unificado');
                const actions = document.getElementById('form-actions');

                const labelCant = document.getElementById('label-cantidad');
                const iconCant = document.getElementById('icon-cantidad');
                const inputCant = document.getElementById('input-cantidad');

                const labelDesc = document.getElementById('label-descripcion');
                const inputDesc = document.getElementById('input-descripcion');

                panelDineroExtra.style.display = 'none';
                panelUnificado.style.display = 'block';
                actions.style.display = 'flex';

                // Reset step and required
                inputCant.step = "0.01";
                inputCant.required = true;
                inputDesc.required = (type !== 'DINERO'); // Descripción obligatoria para productos

                if (type === 'DINERO') {
                    panelDineroExtra.style.display = 'block';
                    labelCant.textContent = 'Importe de la donación (€)';
                    iconCant.setAttribute('data-lucide', 'euro');
                    inputCant.placeholder = '0.00';
                    labelDesc.textContent = 'Mensaje o dedicatoria (opcional)';
                    inputDesc.placeholder = 'Escribe un mensaje de apoyo...';
                } else {
                    if (type === 'COMIDA') {
                        labelCant.textContent = 'Peso aproximado (Kg)';
                        iconCant.setAttribute('data-lucide', 'package');
                        inputCant.placeholder = 'Ej: 15';
                        inputCant.step = "0.5";
                        labelDesc.textContent = 'Marca y tipo de alimento';
                        inputDesc.placeholder = 'Ej: Pienso para cachorros, latas húmedas...';
                    } else if (type === 'MEDICINAS') {
                        labelCant.textContent = 'Unidades / Cajas';
                        iconCant.setAttribute('data-lucide', 'pill');
                        inputCant.placeholder = 'Ej: 2';
                        inputCant.step = "1";
                        labelDesc.textContent = 'Nombre y uso del medicamento';
                        inputDesc.placeholder = 'Ej: Desparasitante, 3 cajas de Amoxicilina...';
                    } else { // OTRO
                        labelCant.textContent = 'Cantidad (opcional)';
                        iconCant.setAttribute('data-lucide', 'gift');
                        inputCant.placeholder = 'Ej: 1';
                        inputCant.step = "1";
                        labelDesc.textContent = 'Descripción del material';
                        inputDesc.placeholder = 'Ej: Mantas, correas, juguetes...';
                        inputCant.required = false;
                    }
                }
                if (window.lucide) lucide.createIcons();
            }

            function setAmount(val, btn) {
                document.getElementById('input-cantidad').value = val;
                updateButtons(btn);
            }

            function focusAmount(btn) {
                document.getElementById('input-cantidad').focus();
                updateButtons(btn);
            }

            function updateButtons(activeBtn) {
                document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
                if (activeBtn) activeBtn.classList.add('active');
            }

            function setRecurrence(type) {
                document.querySelectorAll('.view-toggle .toggle-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(type === 'mensual' ? 'btn-mensual' : 'btn-unica').classList.add('active');
                document.getElementById('frecuencia-input').value = type.toUpperCase();
                document.getElementById('submit-text').textContent = type === 'mensual' ? 'Confirmar Donación Mensual' : 'Confirmar Donación';
            }

            document.addEventListener('DOMContentLoaded', function() {
                // Always call handleTypeChange on load to show the form panels
                handleTypeChange();
            });
        </script>
    </div>
</body>

</html>
