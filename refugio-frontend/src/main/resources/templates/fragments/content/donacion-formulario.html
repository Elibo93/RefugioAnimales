<!-- Vista de Formulario de Donación: Interfaz para realizar aportaciones económicas o materiales al refugio -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
        <div id="formulario-donacion" class="glass-panel"
            style="max-width:800px; margin:2rem auto; padding: 3rem; border-radius: 24px;">

            <div class="page-header" style="text-align:center; margin-bottom: 2.5rem;">
                <div class="premium-modal-icon-wrapper"
                    style="margin: 0 auto 1.5rem; width: 64px; height: 64px; background: #fef3c7; color: #d97706; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
                    <i data-lucide="heart" style="width: 32px; height: 32px;"></i>
                </div>
                <h2 style="font-size: 2.25rem; font-weight: 800; color: var(--text-main);"
                    th:if="${donacion == null or donacion.id == null}" th:text="#{donacion.auto.registrar.donacion}"></h2>
                <h2 style="font-size: 2.25rem; font-weight: 800; color: var(--text-main);"
                    th:unless="${donacion == null or donacion.id == null}" th:text="#{donacion.auto.editar.donacion}"></h2>
                <p style="color: var(--text-muted); margin-top: 0.5rem;" th:text="#{donacion.auto.tu.generosidad.hace.posible.nuestra.labo}"></p>
            </div>

            <!-- Mensaje de Error -->
            <div th:if="${errorMessage}" class="alert alert-danger"
                style="margin-bottom: 2rem; padding: 1.25rem; border-radius: 20px; border: 1px solid #fee2e2; background: #fef2f2; color: #991b1b; display: flex; align-items: center; gap: 1rem;">
                <i data-lucide="alert-circle"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="${formActionUrl}" method="post">
                <input type="hidden" name="frecuencia" id="frecuencia-input"
                    th:value="${donacion != null and donacion.frecuencia != null ? donacion.frecuencia : 'UNICA'}">

                <div class="form-grid" style="display: flex; flex-direction: column; gap: 1.5rem;">

                    <!-- 1. IDENTIFICACIÓN -->
                    <div class="form-group">
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.donante}"></label>

                        <!-- Si es Admin, puede elegir usuario -->
                        <div th:if="${isAdmin}" class="select-wrapper">
                            <select name="usuarioId" required
                                style="width: 100%; padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; background: white;">
                                <option value="" disabled th:selected="${currentUserId == null}" th:text="#{donacion.auto.selecciona.un}"></option>
                                <option th:each="u : ${usuarios}" th:value="${u.id}"
                                    th:text="${u.username + ' (' + u.email + ')'}"
                                    th:selected="${u.id == currentUserId}"></option>
                            </select>
                        </div>

                        <!-- Si no es Admin, vemos su nombre o anónimo -->
                        <div th:unless="${isAdmin}">
                            <div th:if="${currentUserId != null}" class="alert alert-success"
                                style="padding: 1rem; border-radius: 12px; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: flex; align-items: center; gap: 10px;">
                                <i data-lucide="user" style="width: 20px;"></i>
                                <span style="font-weight: 600;" th:text="${currentUserName}">Nombre [[#{html.auto.de}]] Usuario</span>
                                <input type="hidden" name="usuarioId" th:value="${currentUserId}">
                            </div>
                            <div th:unless="${currentUserId != null}" class="alert alert-info"
                                style="padding: 1rem; border-radius: 12px; background: #f0f9ff; color: #075985; border: 1px solid #bae6fd; display: flex; align-items: center; gap: 10px;">
                                <i data-lucide="info" style="width: 20px;"></i>
                                <span style="font-weight: 600;" th:text="#{donacion.auto.donacion.anonima}"></span>
                                <input type="hidden" name="usuarioId" th:value="${currentUserId}">
                            </div>
                        </div>
                    </div>

                    <!-- 2. SELECTOR DE TIPO -->
                    <div class="form-group">
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.tipo}"></label>
                        <div class="select-wrapper">
                            <select name="tipo" id="donation-type-select" required onchange="handleTypeChange()"
                                style="width: 100%; padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; background: white;">
                                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"
                                    th:selected="${(donacion == null or donacion.tipo == null) ? t == 'DINERO' : t == donacion.tipo}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <!-- 3. SELECTOR DE OBJETIVO -->
                    <div id="panel-objetivo" class="form-group" style="display: none;">
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main); display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="target" style="width: 18px; color: var(--primary);"></i>
                            [[#{html.auto.a.qu.objetivo.destinas.tu}]]
                        </label>
                        <div class="select-wrapper" style="position: relative;">
                            <select name="objetivoId" id="objetivo-select"
                                style="width: 100%; padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; background: white; appearance: none;">
                                <option value="" th:text="#{donacion.auto.donacion.general.el.refugio.decidira.don}"></option>
                                <option th:each="obj : ${objetivos}" th:value="${obj.id}"
                                    th:text="${obj.titulo}"
                                    th:selected="${donacion != null and donacion.objetivoId == obj.id}">
                                </option>
                            </select>
                            <i data-lucide="chevron-down"
                                style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: #94a3b8;"></i>
                        </div>
                    </div>

                    <!-- 4. CONFIGURACIÓN DE DINERO -->
                    <div id="panel-dinero-extra" style="display: none;">
                        <div class="view-toggle"
                            style="display: flex; gap: 10px; background: #f1f5f9; padding: 5px; border-radius: 14px; margin-bottom: 1.5rem;">
                            <button type="button" id="btn-unica" class="toggle-btn"
                                style="flex: 1; padding: 0.8rem; border-radius: 10px; border: none; cursor: pointer; font-weight: 700;"
                                onclick="setRecurrence('unica')" th:text="#{donacion.auto.donacion.unica}"></button>
                            <button type="button" id="btn-mensual" class="toggle-btn"
                                style="flex: 1; padding: 0.8rem; border-radius: 10px; border: none; cursor: pointer; font-weight: 700;"
                                onclick="setRecurrence('mensual')" th:text="#{donacion.auto.donacion.mensual}"></button>
                        </div>

                        <div class="form-group">
                            <label
                                style="display: block; font-weight: 700; margin-bottom: 1rem; color: var(--text-main);" th:text="#{donacion.auto.selecciona.1}"></label>
                            <div class="amount-selector"
                                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 1rem;">
                                <button type="button" class="amount-btn"
                                    style="padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer;"
                                    onclick="setAmount(10, this)" th:text="#{donacion.auto.10}"></button>
                                <button type="button" class="amount-btn"
                                    style="padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer;"
                                    onclick="setAmount(30, this)" th:text="#{donacion.auto.30}"></button>
                                <button type="button" class="amount-btn"
                                    style="padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer;"
                                    onclick="setAmount(50, this)" th:text="#{donacion.auto.50}"></button>
                                <button type="button" class="amount-btn"
                                    style="padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer;"
                                    onclick="setAmount(100, this)" th:text="#{donacion.auto.100}"></button>
                                <button type="button" class="amount-btn"
                                    style="padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer;"
                                    onclick="focusAmount(this)" th:text="#{generic.auto.otra}"></button>
                            </div>
                        </div>
                    </div>

                    <!-- 5. CAMPOS UNIFICADOS -->
                    <div id="panel-unificado">
                        <div class="form-group" style="margin-top: 1.5rem;">
                            <label id="label-cantidad"
                                style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.importe}"></label>
                            <div class="input-with-icon" style="position: relative;">
                                <i id="icon-cantidad" data-lucide="euro"
                                    style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 20px;"></i>
                                <input type="number" step="0.01" name="cantidad" id="input-cantidad"
                                    th:value="${donacion != null ? donacion.cantidad : ''}" required
                                    placeholder="0.00"
                                    style="width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1.1rem;">
                            </div>
                        </div>

                        <div class="form-group" style="margin-top: 1.5rem;">
                            <label id="label-descripcion"
                                style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main);" th:text="#{donacion.auto.mensaje}"></label>
                            <textarea name="descripcion" id="input-descripcion"
                                th:text="${donacion != null ? donacion.descripcion : ''}"
                                style="width: 100%; height: 120px; padding: 1rem; border-radius: 12px; border: 2px solid #e2e8f0; font-family: inherit; font-size: 1rem;"
                                placeholder="Escribe un mensaje de apoyo..."></textarea>
                        </div>
                    </div>

                </div>

                <div id="form-actions" style="margin-top: 3rem;">
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; padding: 1.25rem; border-radius: 16px; background: #166534; color: white; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 15px -3px rgba(22, 101, 52, 0.2);">
                        <i data-lucide="heart" style="width: 24px; height: 24px; fill: white;"></i>
                        <span id="submit-text" th:text="#{donacion.auto.confirmar.donacion.ahora}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
