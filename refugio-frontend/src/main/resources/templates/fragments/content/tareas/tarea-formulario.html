<!-- Vista de Formulario de Tarea: Configuración de tareas operativas con asignación dinámica de voluntarios y estados -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
        <style>
            .volunteer-chips-container {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 10px;
            }
            .volunteer-chip {
                display: flex;
                align-items: center;
                gap: 8px;
                background: var(--bg-main);
                border: 1px solid var(--border);
                padding: 6px 12px;
                border-radius: 100px;
                font-size: 0.85rem;
                color: var(--text-main);
                transition: all 0.2s;
            }
            .volunteer-chip:hover {
                border-color: var(--primary);
                background: white;
            }
            .volunteer-chip .remove-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #f3f4f6;
                color: #9ca3af;
                border: none;
                cursor: pointer;
                padding: 0;
                transition: all 0.2s;
            }
            .volunteer-chip .remove-btn:hover {
                background: #fee2e2;
                color: #ef4444;
            }
            .btn-add-vol {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: white;
                border: 1px dashed var(--border);
                padding: 6px 14px;
                border-radius: 100px;
                font-size: 0.85rem;
                color: var(--text-muted);
                cursor: pointer;
                transition: all 0.2s;
                margin-top: 5px;
            }
            .btn-add-vol:hover {
                border-color: var(--primary);
                color: var(--primary);
                background: var(--primary-light);
            }
        </style>

        <div class="page-header" style="text-align:center; margin-bottom: 2rem;">
            <h1 class="page-title" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <div class="premium-modal-icon-wrapper" style="margin: 0; width: 48px; height: 48px; background: #f3f4f6; color: #4b5563;">
                    <i data-lucide="clipboard-list"></i>
                </div>
                <span th:text="${tarea.id == null ? #messages.msg('tarea.form.title') : #messages.msg('tarea.modal.edit.title')}">
                    Crear tarea
                </span>
            </h1>
            <p style="color:var(--text-muted); margin-top:0.5rem;" th:text="#{tarea.auto.configure.los.detalles.y.asigne.responsa}"></p>
        </div>

        <div class="card" style="max-width:800px; margin:0 auto;">
            <form th:action="${tarea.id == null ? '/web/tareas/nueva' : '/web/tareas/' + tarea.id + '/editar'}"
                method="post">

                <div class="form-grid">
                    
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label th:text="#{tarea.auto.descripcion.de.la.tarea}"></label>
                        <input type="text" name="descripcion" th:value="${tarea.descripcion}" 
                               th:placeholder="#{tarea.placeholder.descripcion}" required>
                    </div>

                    <div class="form-group">
                        <label th:text="#{generic.auto.estado}"></label>
                        <select name="estado" required>
                            <option th:each="e : ${estados}" th:value="${e}" 
                                th:text="#{enum.EstadoTarea.__${e}__}"
                                th:selected="${e == tarea.estado}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label th:text="#{tarea.auto.fecha.y.hora.limite.vencimiento}"></label>
                        <input type="datetime-local" name="fechaLimite" th:value="${tarea.fechaLimite != null ? #temporals.format(tarea.fechaLimite, 'yyyy-MM-dd''T''HH:mm') : ''}">
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label th:text="#{tarea.auto.instrucciones.detalladas}"></label>
                        <textarea name="instrucciones" rows="3" th:placeholder="#{tarea.placeholder.instrucciones}"
                                  th:text="${tarea.instrucciones}"></textarea>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label th:text="#{tarea.auto.personal.asignado}"></label>
                        
                        <div id="assigned-volunteers-container" class="volunteer-chips-container">
                            <!-- Chips se insertarán aquí por JS -->
                        </div>

                        <button type="button" id="btn-show-search" class="btn-add-vol" onclick="toggleSearch(true)">
                            <i data-lucide="plus" style="width: 14px;"></i>
                            [[#{html.auto.asignar.voluntario}]]
                        </button>

                        <div id="search-wrapper" style="display: none; position: relative; margin-top: 15px;">
                            <div style="position: relative;">
                                <i data-lucide="search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted);"></i>
                                <input type="text" 
                                       id="volunteer-search-input"
                                       th:placeholder="#{generic.placeholder.buscar.usuario}" 
                                       style="padding-left: 40px; border-radius: 12px;"
                                       hx-get="/web/voluntarios/sugerencias"
                                       hx-trigger="keyup[target.value.length >= 2] delay:300ms, search"
                                       hx-target="#volunteer-suggestions"
                                       name="q">
                                <button type="button" onclick="toggleSearch(false)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: none; color: var(--text-muted); cursor: pointer;">
                                    <i data-lucide="x" style="width: 16px;"></i>
                                </button>
                            </div>
                            <div id="volunteer-suggestions"></div>
                        </div>
                    </div>

                    <script th:inline="javascript">
                        (function() {
                            // Usamos el objeto window para evitar errores de redeclaración en recargas parciales HTMX
                            window.tareaAssignedIds = new Set();
                            const voluntarioNombres = /*[[${voluntarioNombres}]]*/ {};
                            const tareaVolIds = /*[[${tarea.voluntarioIds}]]*/ [];
                            const preselected = /*[[${voluntarioPreseleccionado}]]*/ null;

                            function initVolunteers() {
                                // 1. Cargar desde la tarea si existe
                                if (tareaVolIds && Array.isArray(tareaVolIds)) {
                                    tareaVolIds.forEach(vid => {
                                        if (!vid) return;
                                        const id = (typeof vid === 'object' && vid !== null) ? (vid.value || vid.id) : vid;
                                        if (id) {
                                            const name = (voluntarioNombres && voluntarioNombres[id.toString()]) 
                                                         ? voluntarioNombres[id.toString()] 
                                                         : ('Voluntario ' + id);
                                            window.addVolunteerChip(id, name);
                                        }
                                    });
                                }

                                // 2. Cargar preseleccionado si existe
                                if (preselected && preselected.id) {
                                    window.addVolunteerChip(preselected.id, preselected.nombre + ' ' + (preselected.apellido || ''));
                                }
                            }

                            window.toggleSearch = function(show) {
                                const wrapper = document.getElementById('search-wrapper');
                                const btn = document.getElementById('btn-show-search');
                                const input = document.getElementById('volunteer-search-input');
                                if (wrapper) wrapper.style.display = show ? 'block' : 'none';
                                if (btn) btn.style.display = show ? 'none' : 'inline-flex';
                                if (show && input) input.focus();
                            };

                            window.selectVolunteer = function(id, name) {
                                window.addVolunteerChip(id, name);
                                window.toggleSearch(false);
                                const sugg = document.getElementById('volunteer-suggestions');
                                const input = document.getElementById('volunteer-search-input');
                                if (sugg) sugg.innerHTML = '';
                                if (input) input.value = '';
                            };

                            window.addVolunteerChip = function(id, name) {
                                if (window.tareaAssignedIds.has(id)) return;
                                window.tareaAssignedIds.add(id);

                                const container = document.getElementById('assigned-volunteers-container');
                                if (!container) return;
                                const chip = document.createElement('div');
                                chip.className = 'volunteer-chip';
                                chip.id = `vol-chip-${id}`;
                                chip.innerHTML = `
                                    <i data-lucide="user" style="width: 14px; color: var(--primary);"></i>
                                    <span>${name}</span>
                                    <input type="hidden" name="voluntarioIds" value="${id}">
                                    <button type="button" class="remove-btn" onclick="removeVolunteer(${id})">
                                        <i data-lucide="x" style="width: 12px;"></i>
                                    </button>
                                `;
                                container.appendChild(chip);
                                if (window.lucide) lucide.createIcons();
                            };

                            window.removeVolunteer = function(id) {
                                window.tareaAssignedIds.delete(id);
                                const chip = document.getElementById(`vol-chip-${id}`);
                                if (chip) chip.remove();
                            };

                            // Limitar la fecha mínima de fechaLimite
                            function initDateLimits() {
                                const dateInput = document.querySelector('input[name="fechaLimite"]');
                                if (dateInput) {
                                    const now = new Date();
                                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                                    dateInput.min = now.toISOString().slice(0, 16);
                                }
                            }
                            
                            // Ejecutar inicializaciones directamente al cargar el script
                            initVolunteers();
                            initDateLimits();
                        })();
                    </script>

                </div>

                <div class="modal-actions" style="margin-top: 3rem; display: flex; gap: 15px; justify-content: flex-end;">
                    <button type="button" onclick="window.history.back()" class="btn btn-secondary" style="border: none; cursor: pointer;" th:text="#{generic.auto.cancelar}"></button>
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="save" style="width: 18px;"></i>
                        <span th:text="${tarea.id == null ? #messages.msg('tarea.auto.crear.tarea') : #messages.msg('generic.auto.guardar.cambios')}">Crear Tarea</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
