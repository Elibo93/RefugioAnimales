<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{voluntario.list.title}">voluntarios</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/voluntarios/pdf}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">Exportar PDF</span>
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/voluntarios/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo</span>
                    </a>
                </div>
            </div>

            <table id="tablavoluntarios">
                <thead>
                    <tr>
                        <th th:text="#{voluntario.table.header.id}">ID</th>
                        <th th:text="#{voluntario.table.header.name}">Nombre</th>
                        <th th:text="#{voluntario.table.header.surname}">Apellido</th>
                        <th th:text="#{voluntario.table.header.specialty}">Especialidad</th>
                        <th th:text="#{voluntario.table.header.disponibilidad}">Disponibilidad</th>
                        <th th:text="#{voluntario.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p_item : ${voluntarios}" th:id="'row-' + ${p_item.get('id')}"
                        th:with="u=${usuariosMap != null ? usuariosMap['' + p_item.get('usuarioId')] : null}, p=${perfilesMap != null ? perfilesMap['' + p_item.get('usuarioId')] : null}">

                        <td th:text="${p_item.get('id')}">1</td>
                        <td>
                            <a th:href="@{/web/voluntarios/{id}(id=${p_item.get('id')})}"
                                style="font-weight:600; color:var(--primary); text-decoration: none; display: block;"
                                th:text="${p != null ? p.get('nombre') : ''}">Juan</a>
                        </td>
                        <td>
                            <a th:href="@{/web/voluntarios/{id}(id=${p_item.get('id')})}"
                                style="color:var(--text-main); text-decoration: none; display: block;"
                                th:text="${p != null ? p.get('apellido') : ''}">Pérez</a>
                        </td>
                        <td>
                            <span class="badge" style="background:#E0F2FE; color:#0369A1; font-size:0.85rem;"
                                  th:text="${p_item.get('especialidad') != null ? #strings.capitalize(#strings.toLowerCase(#strings.replace(p_item.get('especialidad'), '_', ' '))) : 'General'}">Especialidad</span>
                        </td>
                        <td><span class="badge-soon" style="background:#F3E8FF; color:#9333EA;"
                                th:text="${p_item.get('disponibilidad')}">Tarde</span></td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <a class="btn-icon" th:href="@{/web/tareas/nueva(voluntarioId=${p_item.get('id')})}"
                                    title="Asignar Tarea">
                                    <i data-lucide="clipboard-list" style="width:16px; color:var(--secondary);"></i>
                                </a>
                                <a class="btn-icon" 
                                   th:hx-get="@{/web/voluntarios/{id}/editar(id=${p_item.get('id')})}"
                                   hx-target="#contenido-dinamico" 
                                   hx-push-url="true"
                                   title="Editar">
                                    <i data-lucide="edit-2" style="width:16px;"></i>
                                </a>
                                <button class="btn-icon delete"
                                    th:hx-post="@{/web/voluntarios/{id}/borrar(id=${p_item.get('id')})}"
                                    th:hx-target="'#row-' + ${p_item.get('id')}" hx-swap="outerHTML swap:0.3s"
                                    hx-confirm="¿Eliminar voluntario?">
                                    <i data-lucide="trash-2" style="width:16px;"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(voluntarios)}"
                style="text-align:center; padding:3rem; color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{voluntario.list.empty}">No hay voluntarios registrados.</p>
            </div>
        </div>
    </div>
</body>

</html>
