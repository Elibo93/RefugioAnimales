<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{voluntario.list.title}">voluntarios</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/voluntarios/pdf}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">Exportar PDF</span>
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/voluntarios/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo</span>
                    </a>
                </div>
            </div>

            <table id="tablavoluntarios">
                <thead>
                    <tr>
                        <th th:text="#{voluntario.table.header.id}">ID</th>
                        <th th:text="#{voluntario.table.header.name}">Nombre</th>
                        <th th:text="#{voluntario.table.header.surname}">Apellido</th>
                        <th th:text="#{voluntario.table.header.disponibilidad}">Disponibilidad</th>
                        <th th:text="#{voluntario.table.header.email}">Email</th>
                        <th th:text="#{voluntario.table.header.phone}">Tlf</th>
                        <th th:text="#{voluntario.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${voluntarios}" th:id="'row-' + ${p.get('id')}"
                        th:with="u=${usuariosMap != null ? usuariosMap['' + p.get('usuarioId')] : null}"
                        th:attr="data-id=${p.get('id')}, data-nombre=${u != null ? u.get('nombre') : ''}, data-apellido=${u != null ? u.get('apellido') : ''}, data-disp=${p.get('disponibilidad')}, data-email=${u != null ? u.get('email') : ''}, data-tlf=${u != null ? u.get('telefono') : ''}">

                        <td th:text="${p.get('id')}">1</td>
                        <td style="font-weight: 600; color: var(--text-main);"
                            th:text="${u != null ? u.get('nombre') : ''}">Juan</td>
                        <td th:text="${u != null ? u.get('apellido') : ''}">Pérez</td>
                        <td><span class="badge-soon" style="background:#F3E8FF; color:#9333EA;"
                                th:text="${p.get('disponibilidad')}">Tarde</span></td>
                        <td th:text="${u != null ? u.get('email') : ''}">juan@mail.com</td>
                        <td th:text="${u != null ? u.get('telefono') : ''}">600...</td>
                        <td style="display:flex; gap:8px;">
                            <button class="btn-icon trigger-modal"><i data-lucide="edit-2"
                                    style="width:16px;"></i></button>
                            <button class="btn-icon delete"
                                th:hx-post="@{/web/voluntarios/{id}/borrar(id=${p.get('id')})}"
                                th:hx-target="'#row-' + ${p.get('id')}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar voluntario?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(voluntarios)}"
                style="text-align:center; padding:3rem; color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{voluntario.list.empty}">No hay voluntarios registrados.</p>
            </div>
        </div>


        <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>
        <div id="editModal" class="modal" style="display:none;">
            <h3 th:text="#{voluntario.modal.edit.title}">Editar voluntario</h3>
            <form id="editForm" method="post" action="#">
                <input type="hidden" id="editId" name="id">

                <div class="form-grid" style="display:block;">
                    <div class="form-group">
                        <label th:text="#{voluntario.field.name}">Nombre</label>
                        <input type="text" id="editNombre" name="nombre" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{voluntario.field.surname}">Apellido</label>
                        <input type="text" id="editApellido" name="apellido" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{voluntario.table.header.disponibilidad}">Disponibilidad</label>
                        <input type="text" id="editEspecialidad" name="disponibilidad" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{voluntario.field.email}">Email</label>
                        <input type="email" id="editEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{voluntario.field.phone}">Teléfono</label>
                        <input type="text" id="editTlf" name="telefono">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btnCancel" class="btn btn-secondary"
                        th:text="#{generic.btn.cancel}">Cancelar</button>
                    <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar</button>
                </div>
            </form>
        </div>


        <script>
            const modal = document.getElementById('editModal');
            const overlay = document.getElementById('modalOverlay');
            const form = document.getElementById('editForm');

            // Abrir Modal
            document.querySelectorAll('.trigger-modal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tr = e.target.closest('tr');
                    const id = tr.dataset.id;

                    // Set form action dynamically
                    form.action = '/web/voluntarios/' + id + '/editar';

                    document.getElementById('editId').value = id;
                    document.getElementById('editNombre').value = tr.dataset.nombre;
                    document.getElementById('editApellido').value = tr.dataset.apellido;
                    document.getElementById('editEspecialidad').value = tr.dataset.disp;
                    document.getElementById('editEmail').value = tr.dataset.email;
                    document.getElementById('editTlf').value = tr.dataset.tlf;

                    modal.style.display = 'block'; overlay.style.display = 'block';
                });
            });

            // Cerrar
            const close = () => { modal.style.display = 'none'; overlay.style.display = 'none'; };
            document.getElementById('btnCancel').addEventListener('click', close);

        </script>
    </div>
</body>

</html>
