<!-- Vista de Formulario de Objetivo: Gestión de campañas de recaudación con metas específicas -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
    <!-- HEADER PREMIUM -->
    <div class="page-header" style="text-align:center; margin-bottom: 3rem; animation: fadeInDown 0.5s ease-out;">
        <div class="premium-modal-icon-wrapper" style="margin: 0 auto 1.5rem; width: 64px; height: 64px; background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%); color: #166534; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(22, 101, 52, 0.1);">
            <i data-lucide="target" style="width: 32px; height: 32px;"></i>
        </div>
        <h1 class="page-title" style="font-size: 2.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.75rem;">
            Nuevo Objetivo de Donación
        </h1>
        <p style="color:var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">
            Define una necesidad específica para motivar a los donantes y dar transparencia al refugio
        </p>
    </div>

    <div style="max-width: 800px; margin: 0 auto; padding-bottom: 5rem;">
        <div class="card" style="padding: 3rem; border-radius: 32px; border: 1px solid var(--border); background: white; box-shadow: var(--shadow-xl);">
            <form th:action="${formActionUrl}" method="post" style="display: flex; flex-direction: column; gap: 2rem;">
                
                <!-- SECCIÓN 1: IDENTIDAD -->
                <div class="form-section">
                    <h2 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 800;">
                        <i data-lucide="info" style="width: 20px;"></i>
                        Información del Objetivo
                    </h2>
                    
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.75rem; font-weight: 700; color: var(--text-main); font-size: 0.9rem;">Título del Objetivo</label>
                        <input type="text" name="titulo" required placeholder="Ej: Nueva área de juegos para perros" 
                               style="width: 100%; height: 54px; padding: 0 1.25rem; border-radius: 14px; border: 2px solid #e2e8f0; font-size: 1rem; transition: all 0.3s; outline: none;">
                    </div>

                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.75rem; font-weight: 700; color: var(--text-main); font-size: 0.9rem;">Descripción Detallada</label>
                        <textarea name="descripcion" required placeholder="Explica detalladamente para qué se usará el dinero y qué impacto tendrá..." 
                                  style="width: 100%; min-height: 120px; padding: 1.25rem; border-radius: 16px; border: 2px solid #e2e8f0; font-size: 1rem; outline: none; resize: vertical;"></textarea>
                    </div>
                </div>

                <!-- SECCIÓN 2: METAS Y PRIORIDADES -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.75rem; font-weight: 700; color: var(--text-main); font-size: 0.9rem;">Cantidad Meta (€)</label>
                        <div style="position: relative;">
                            <i data-lucide="euro" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: #94a3b8; width: 18px;"></i>
                            <input type="number" name="montoObjetivo" required step="0.01" placeholder="0.00"
                                   style="width: 100%; height: 54px; padding: 0 1.25rem 0 3rem; border-radius: 14px; border: 2px solid #e2e8f0; font-size: 1.1rem; font-weight: 600; outline: none;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.75rem; font-weight: 700; color: var(--text-main); font-size: 0.9rem;">Prioridad</label>
                        <select name="prioridad" style="width: 100%; height: 54px; padding: 0 1.25rem; border-radius: 14px; border: 2px solid #e2e8f0; font-size: 1rem; appearance: none; background: url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%20fill%3D%22none%22%20stroke%3D%22%2394a3b8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E') no-repeat right 1.25rem center/1.2rem; background-color: white;">
                            <option th:each="p : ${prioridades}" th:value="${p}" th:text="${#strings.capitalize(p.toLowerCase())}" th:selected="${p == 'MEDIA'}"></option>
                        </select>
                    </div>
                </div>

                <!-- SECCIÓN 3: ICONO -->
                <div class="form-group">
                    <label style="display: block; margin-bottom: 1rem; font-weight: 700; color: var(--text-main); font-size: 0.9rem;">Icono Representativo</label>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem;">
                        <!-- Icono Heart -->
                        <label class="icon-selector-card" style="cursor: pointer; position: relative;">
                            <input type="radio" name="icono" value="heart" checked style="position: absolute; opacity: 0;" onchange="updateIconSelection(this)">
                            <div class="icon-inner" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; border: 2px solid #e2e8f0; border-radius: 18px; transition: all 0.3s;">
                                <i data-lucide="heart" style="width: 28px; height: 28px; color: #64748b;"></i>
                                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase;">Salud</span>
                            </div>
                        </label>
                        <!-- Icono Home -->
                        <label class="icon-selector-card" style="cursor: pointer; position: relative;">
                            <input type="radio" name="icono" value="home" style="position: absolute; opacity: 0;" onchange="updateIconSelection(this)">
                            <div class="icon-inner" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; border: 2px solid #e2e8f0; border-radius: 18px; transition: all 0.3s;">
                                <i data-lucide="home" style="width: 28px; height: 28px; color: #64748b;"></i>
                                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase;">Hogar</span>
                            </div>
                        </label>
                        <!-- Icono Truck -->
                        <label class="icon-selector-card" style="cursor: pointer; position: relative;">
                            <input type="radio" name="icono" value="truck" style="position: absolute; opacity: 0;" onchange="updateIconSelection(this)">
                            <div class="icon-inner" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; border: 2px solid #e2e8f0; border-radius: 18px; transition: all 0.3s;">
                                <i data-lucide="truck" style="width: 28px; height: 28px; color: #64748b;"></i>
                                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase;">Rescate</span>
                            </div>
                        </label>
                        <!-- Icono Syringe -->
                        <label class="icon-selector-card" style="cursor: pointer; position: relative;">
                            <input type="radio" name="icono" value="syringe" style="position: absolute; opacity: 0;" onchange="updateIconSelection(this)">
                            <div class="icon-inner" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; border: 2px solid #e2e8f0; border-radius: 18px; transition: all 0.3s;">
                                <i data-lucide="syringe" style="width: 28px; height: 28px; color: #64748b;"></i>
                                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase;">Médico</span>
                            </div>
                        </label>
                        <!-- Icono Shield -->
                        <label class="icon-selector-card" style="cursor: pointer; position: relative;">
                            <input type="radio" name="icono" value="shield" style="position: absolute; opacity: 0;" onchange="updateIconSelection(this)">
                            <div class="icon-inner" style="display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; border: 2px solid #e2e8f0; border-radius: 18px; transition: all 0.3s;">
                                <i data-lucide="shield" style="width: 28px; height: 28px; color: #64748b;"></i>
                                <span style="font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase;">Seguro</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- ACCIONES -->
                <div style="margin-top: 3rem; display: flex; gap: 1.5rem; justify-content: flex-end; border-top: 1px solid #f1f5f9; padding-top: 2rem;">
                    <a th:href="@{/web/donaciones}" class="btn" 
                       style="padding: 1rem 2rem; border-radius: 16px; font-weight: 700; color: #64748b; background: #f1f5f9; text-decoration: none; transition: all 0.2s;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary" 
                            style="padding: 1rem 3rem; border-radius: 16px; font-weight: 700; background: var(--primary); color: white; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(22, 101, 52, 0.25); display: flex; align-items: center; gap: 10px;">
                        <i data-lucide="save" style="width: 20px;"></i>
                        Publicar Objetivo
                    </button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .icon-selector-card input:checked + .icon-inner {
            border-color: var(--primary) !important;
            background: rgba(22, 101, 52, 0.05);
            box-shadow: 0 10px 20px -5px rgba(22, 101, 52, 0.15);
        }
        .icon-selector-card input:checked + .icon-inner i {
            color: var(--primary) !important;
        }
        .icon-selector-card input:checked + .icon-inner span {
            color: var(--primary) !important;
        }
        .icon-inner:hover {
            border-color: #cbd5e1 !important;
            transform: translateY(-2px);
        }
    </style>

    <script>
        function updateIconSelection(input) {
            // CSS handles the visual part, but we can trigger lucide if needed
        }
        
        // Inicializar iconos
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</div>
</body>

</html>
