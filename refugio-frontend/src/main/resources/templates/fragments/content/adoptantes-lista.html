<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">
        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{adoptante.list.title}">Adoptantes</span>
                <div style="display:flex; gap:10px;">
                    <a class="btn btn-secondary" th:href="@{/web/adoptantes/pdf}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">Exportar PDF</span>
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/adoptantes/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo</span>
                    </a>
                </div>
            </div>

            <table id="tablaadoptantes">
                <thead>
                    <tr>
                        <th th:text="#{adoptante.table.header.id}">ID</th>
                        <th th:text="#{adoptante.table.header.name}">Nombre</th>
                        <th th:text="#{adoptante.table.header.surname}">Apellido</th>
                        <th th:text="#{adoptante.table.header.dni}">DNI</th>
                        <th th:text="#{adoptante.table.header.direccion}">Dirección</th>
                        <th th:text="#{adoptante.table.header.estado}">Estado Valid.</th>
                        <th th:text="#{adoptante.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${adoptantes}" th:id="'row-' + ${a.get('id')}"
                        th:with="u=${usuariosMap != null ? usuariosMap['' + a.get('usuarioId')] : null}"
                        th:attr="data-id=${a.get('id')}, data-uid=${a.get('usuarioId')}, data-nombre=${u != null ? u.get('nombre') : ''}, data-apellido=${u != null ? u.get('apellido') : ''}, data-dni=${a.get('dni')}, data-dir=${a.get('direccion')}, data-fnac=${a.get('fechaNacimiento')}">

                        <td th:text="${a.get('id')}">1</td>
                        <td style="font-weight: 600; color: var(--text-main);" th:text="${u != null ? u.get('nombre') : 'Usuario anónimo'}">Juan</td>
                        <td th:text="${u != null ? u.get('apellido') : ''}">Pérez</td>
                        <td th:text="${a.get('dni')}">12345678Z</td>
                        <td th:text="${a.get('direccion')}">Calle Falsa 123</td>
                        <td>
                            <span class="badge-soon" th:classappend="${a.get('estadoValidacion') != null ? (a.get('estadoValidacion').toString() == 'VALIDADO' ? 'success' : (a.get('estadoValidacion').toString() == 'RECHAZADO' ? 'danger' : 'warning')) : 'warning'}"
                                th:text="${a.get('estadoValidacion')}">PENDIENTE</span>
                        </td>
                        <td style="display:flex; gap:8px;">
                            <form th:if="${isAdmin and a.get('estadoValidacion') != null and a.get('estadoValidacion').toString() == 'PENDIENTE'}" 
                                  th:action="@{/web/adoptantes/{id}/aprobar(id=${a.get('id')})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-icon" style="color: green; background-color: rgba(30,220,100,0.1);" title="Aprobar">
                                    <i data-lucide="check" style="width:16px;"></i>
                                </button>
                            </form>
                            <form th:if="${isAdmin and a.get('estadoValidacion') != null and a.get('estadoValidacion').toString() == 'PENDIENTE'}" 
                                  th:action="@{/web/adoptantes/{id}/rechazar(id=${a.get('id')})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-icon" style="color: red; background-color: rgba(220,30,30,0.1);" title="Rechazar">
                                    <i data-lucide="x" style="width:16px;"></i>
                                </button>
                            </form>

                            <button class="btn-icon trigger-modal"><i data-lucide="edit-2"
                                    style="width:16px;"></i></button>
                            <button class="btn-icon delete"
                                th:hx-post="@{/web/adoptantes/{id}/borrar(id=${a.get('id')})}"
                                th:hx-target="'#row-' + ${a.get('id')}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar adoptante?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(adoptantes)}"
                style="text-align:center; padding:3rem; color:var(--text-muted);">
                <i data-lucide="users" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{adoptante.list.empty}">No hay adoptantes registrados.</p>
            </div>
        </div>

        <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>
        <div id="editModal" class="modal" style="display:none;">
            <h3 th:text="#{adoptante.modal.edit.title}">Editar Adoptante</h3>
            <form id="editForm" method="post" action="#">
                <input type="hidden" id="editId" name="id">

                <div class="form-grid" style="display:block;">
                    <div class="form-group">
                        <label th:text="#{adoptante.field.usuarioId}">Usuario ID</label>
                        <input type="number" id="editUsuarioId" name="usuarioId" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{adoptante.field.dni}">DNI</label>
                        <input type="text" id="editDni" name="dni" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{adoptante.field.direccion}">Dirección</label>
                        <input type="text" id="editDir" name="direccion" required>
                    </div>
                    <div class="form-group">
                        <label th:text="#{adoptante.field.fechaNacimiento}">Fecha Nac.</label>
                        <input type="date" id="editFnac" name="fechaNacimiento" required>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btnCancel" class="btn btn-secondary"
                        th:text="#{generic.btn.cancel}">Cancelar</button>
                    <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar</button>
                </div>
            </form>
        </div>

        <script>
            const modal = document.getElementById('editModal');
            const overlay = document.getElementById('modalOverlay');
            const form = document.getElementById('editForm');

            // Abrir Modal
            document.querySelectorAll('.trigger-modal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tr = e.target.closest('tr');
                    const id = tr.dataset.id;

                    // Set form action dynamically
                    form.action = '/web/adoptantes/' + id + '/editar';

                    document.getElementById('editId').value = id;
                    document.getElementById('editUsuarioId').value = tr.dataset.uid;
                    document.getElementById('editDni').value = tr.dataset.dni;
                    document.getElementById('editDir').value = tr.dataset.dir;
                    document.getElementById('editFnac').value = tr.dataset.fnac;

                    modal.style.display = 'block'; overlay.style.display = 'block';
                });
            });

            // Cerrar
            const close = () => { modal.style.display = 'none'; overlay.style.display = 'none'; };
            document.getElementById('btnCancel').addEventListener('click', close);
            
            document.body.addEventListener('htmx:afterSwap', function () {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });
        </script>
    </div>
</body>
</html>
