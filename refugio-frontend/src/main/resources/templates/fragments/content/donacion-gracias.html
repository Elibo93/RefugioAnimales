<!-- Vista de Agradecimiento: Mensaje de éxito tras completar satisfactoriamente una donación -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
        <div class="glass-panel"
            style="max-width: 700px; margin: 4rem auto; padding: 4rem; border-radius: 32px; text-align: center; animation: fadeInScale 0.6s ease-out;">

            <!-- Animated Heart Icon -->
            <div class="success-heart" style="margin-bottom: 2rem;">
                <div
                    style="background: rgba(239, 68, 68, 0.1); width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; border: 2px solid rgba(239, 68, 68, 0.2); animation: pulse 2s infinite;">

                    <i data-lucide="heart" style="width: 50px; height: 50px; color: #ef4444; fill: #ef4444;"></i>
                </div>
            </div>

            <h1
                style="font-size: 2.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 1rem; letter-spacing: -0.025em;">
                ¡Gracias de todo corazón!
            </h1>

            <p
                style="font-size: 1.25rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 3rem; max-width: 550px; margin-left: auto; margin-right: auto;">
                Tu generosidad es la semilla de una nueva vida para nuestros animales. Cada gesto nos acerca un paso más
                a darles el hogar y el cariño que merecen.
            </p>

            <!-- Emotional Image -->
            <div class="image-wrapper"
                style="margin-bottom: 3.5rem; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border: 4px solid white;">
                <img src="/images/gracias.png" alt="Perro y gato felices"
                    style="width: 100%; height: auto; display: block; filter: saturate(1.1);">
            </div>

            <div class="actions" style="display: flex; gap: 1.5rem; justify-content: center;">
                <a th:href="@{/web/donaciones}" class="btn btn-primary btn-lg"
                    style="padding: 1rem 2.5rem; justify-content: center; min-width: 220px;">
                    <i data-lucide="list"></i>
                    Ver donaciones
                </a>
                <a th:href="@{/web/home}" class="btn btn-secondary btn-lg"
                    style="padding: 1rem 2.5rem; justify-content: center; min-width: 200px;">
                    <i data-lucide="home"></i>
                    Ir al inicio
                </a>
            </div>
        </div>

        <style>
            @keyframes fadeInScale {
                from {
                    opacity: 0;
                    transform: scale(0.95) translateY(20px);
                }

                to {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }

            @keyframes pulse {
                0% {
                    transform: scale(1);
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
                }

                70% {
                    transform: scale(1.05);
                    box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
                }

                100% {
                    transform: scale(1);
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
                }
            }

            .image-wrapper img:hover {
                transform: scale(1.02);
                transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }
        </style>

        <script th:inline="javascript">
            if (window.lucide) {
                lucide.createIcons();
            }
        </script>
    </div>
</body>

</html>
