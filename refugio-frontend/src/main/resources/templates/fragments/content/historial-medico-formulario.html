<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="content">
    <div class="page-header" style="text-align:center; margin-bottom: 2rem;">
        <h1 class="page-title" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
            <div class="premium-modal-icon-wrapper" style="margin: 0; width: 48px; height: 48px; background: #fee2e2; color: #dc2626;">
                <i data-lucide="stethoscope"></i>
            </div>
            <span th:text="${historial.get('id') == null ? #messages.msg('historial.form.title') : #messages.msg('historial.modal.edit.title')}">
                Nuevo historial médico
            </span>
        </h1>
    </div>
    <div class="card" style="max-width:800px; margin:0 auto;">
        <form th:action="${historial.get('id') == null ? '/web/historiales/nuevo' : '/web/historiales/' + historial.get('id') + '/editar'}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label th:text="#{historial.field.animal}">Animal</label>
                    <select name="animalId" required>
                        <option value="" th:text="#{form.select.animal}">Seleccione un animal...</option>
                        <option th:each="a : ${animales}" th:value="${a.get('id')}" th:text="${a.get('nombre')}" 
                                th:selected="${historial.get('animalId') != null and a.get('id') == historial.get('animalId')}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha de Visita</label>
                    <input type="datetime-local" name="fecha" 
                           th:value="${historial.get('fecha') != null ? #strings.substring(historial.get('fecha').toString(), 0, 16) : #calendars.format(#calendars.createNow(), 'yyyy-MM-dd''T''HH:mm')}" required>
                </div>
                <div class="form-group">
                    <label th:text="#{historial.field.veterinario}">Veterinario</label>
                    <input type="text" name="veterinario" th:value="${historial.get('veterinario')}" required>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{historial.field.descripcion}">Descripción / Motivo</label>
                    <textarea name="descripcion" th:text="${historial.get('descripcion')}" required></textarea>
                </div>
                <div class="form-group" style="grid-column:1/-1;">
                    <label th:text="#{historial.field.tratamiento}">Tratamiento</label>
                    <textarea name="tratamiento" th:text="${historial.get('tratamiento')}"></textarea>
                </div>
            </div>
            <div class="modal-actions" style="margin-top:2rem;">
                <a th:href="@{/web/historiales}" class="btn btn-secondary" th:text="#{generic.btn.cancel}">Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="#{generic.btn.save}">Guardar historial</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
