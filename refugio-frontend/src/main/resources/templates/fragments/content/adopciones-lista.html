<!-- Vista de Listado de Adopciones: Historial de adopciones completadas y gestión de contratos -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar">
                <span class="user-name page" th:text="#{adopcion.list.title}">adopciones</span>
                <div style="display:flex; gap:10px; align-items: center;">
    <style>
        .adopcion-search-wrapper {
            position: relative !important;
            width: 360px !important;
            height: 44px !important;
            display: flex !important;
            align-items: center !important;
        }
        .adopcion-search-wrapper .form-control {
            height: 100% !important;
            width: 100% !important;
            padding-left: 40px !important;
            padding-right: 40px !important;
            border-radius: 14px !important;
            border: 2px solid #f1f5f9 !important;
            background: #f8fafc !important;
            font-size: 0.95rem !important;
            font-weight: 500 !important;
            transition: all 0.3s ease !important;
        }
        .adopcion-search-icon {
            position: absolute !important;
            left: 14px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            color: #94a3b8 !important;
            pointer-events: none !important;
            z-index: 10 !important;
            display: flex !important;
            align-items: center !important;
        }
        .adopcion-clear-btn {
            position: absolute !important;
            right: 12px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            cursor: pointer !important;
            color: #94a3b8 !important;
            z-index: 10 !important;
            display: none;
            align-items: center !important;
            justify-content: center !important;
            width: 24px !important;
            height: 24px !important;
            transition: color 0.2s !important;
        }
        .adopcion-clear-btn:hover {
            color: #ef4444 !important;
        }
    </style>

                    <form id="filterForm" th:action="@{/web/adopciones}" method="get"
                        hx-boost="true" hx-target="#adopcion-results" hx-select="#adopcion-results"
                        hx-trigger="submit, keyup changed delay:800ms from:input[name='q']"
                        hx-vals='{"page": 1}'
                        hx-swap="innerHTML show:none"
                        style="display:flex; gap:10px; margin:0; align-items: center;">
                        
                        <div class="adopcion-search-wrapper">
                            <input type="text" name="q" th:value="${q}" class="form-control"
                                id="searchInputAdop"
                                placeholder="Buscar por animal, adoptante..." autocomplete="off"
                                oninput="document.getElementById('clearBtnAdop').style.display = this.value ? 'flex' : 'none'">
                            
                            <div class="adopcion-search-icon">
                                <i data-lucide="search" style="width: 18px; height: 18px;"></i>
                            </div>
                            
                            <div id="clearBtnAdop" class="adopcion-clear-btn"
                                 th:style="${q != null and !q.isEmpty() ? 'display: flex !important;' : ''}"
                                 onclick="const input = document.getElementById('searchInputAdop'); input.value=''; input.dispatchEvent(new Event('keyup')); this.style.display='none'; input.focus();">
                                <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                            </div>
                        </div>
                    </form>
                    <a th:href="@{/web/adopciones/pdf}" target="_blank" title="Exportar listado a PDF" style="display: flex; align-items: center; justify-content: center; transition: transform 0.2s; padding: 0 4px;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/pdf.png" alt="PDF" style="height: 48px; width: 48px; object-fit: contain;">
                    </a>
                    <a th:href="@{/web/adopciones/excel}" target="_blank" title="Exportar listado a Excel" style="display: flex; align-items: center; justify-content: center; transition: transform 0.2s; padding: 0 4px;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/excel.png" alt="Excel" style="height: 48px; width: 48px; object-fit: contain;">
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/adopciones/nueva}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nueva</span>
                    </a>
                </div>
            </div>

            <!-- LISTA PREMIUM DE ADOPCIONES -->
            <div id="adopcion-results" class="premium-list-container" style="margin-top: 1.5rem;">
                <div class="list-header"
                    style="background: transparent; padding: 0 1.5rem 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="flex: 0.5; text-align: center;">ID</div>
                    <div style="flex: 2;">Adoptante</div>
                    <div style="flex: 2;">Animal</div>
                    <div style="flex: 1.5; text-align: center;">Estado</div>
                    <div style="flex: 1.5; text-align: center;">Fecha Firma</div>
                    <div style="flex: 1.2; text-align: center;">Acciones</div>
                </div>

                <div class="list-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div th:each="i : ${adopciones}" class="premium-row-card" th:id="'row-' + ${i.id}">
                        <div class="row-cell"
                            style="flex: 0.5; justify-content: center; font-weight: 700; color: var(--text-muted);"
                            th:text="${i.id}">1</div>

                        <div class="row-cell" style="flex: 2;">
                            <div style="display: flex; align-items: center; gap: 12px;"
                                th:with="usuarioId=${adoptanteUsuarioIds != null ? adoptanteUsuarioIds['' + i.adoptanteId] : null}, 
                                          perfilObj=${perfilesMap != null and usuarioId != null ? perfilesMap['' + usuarioId] : null},
                                          usuarioObj=${usuariosMap != null and usuarioId != null ? usuariosMap['' + usuarioId] : null}">
                                <div class="task-icon-box" style="background: #dcfce7;">
                                    <i data-lucide="user" style="width: 18px; color: #22c55e;"></i>
                                </div>
                                <a th:href="@{/web/personas/{id}(id=${usuarioId != null ? usuarioId : '0'})}"
                                    style="font-weight: 800; color: var(--text-main); text-decoration: none;"
                                    th:text="${perfilObj != null and perfilObj.nombre != null ? (perfilObj.nombre + ' ' + (perfilObj.apellido ?: '')) : 
                                            (usuarioObj != null ? usuarioObj.username : 'Adoptante #' + i.adoptanteId)}">Juan Pérez</a>
                            </div>
                        </div>

                        <div class="row-cell" style="flex: 2;">
                            <div style="display: flex; align-items: center; gap: 12px;" th:with="animalObj=${animalesMap != null ? animalesMap['' + i.animalId] : null}">
                                <div style="width: 40px; height: 40px; border-radius: 10px; overflow: hidden; background: #f1f5f9; flex-shrink: 0; border: 1px solid #e2e8f0;">
                                    <img th:src="${animalObj != null and animalObj.foto != null and animalObj.foto != '' ? animalObj.foto : '/images/placeholder-animal.png'}"
                                         style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                                <a th:href="@{/web/animales/{id}(id=${i.animalId})}"
                                    style="font-weight: 800; color: var(--secondary); text-decoration: none;"
                                    th:text="${animalObj != null ? animalObj.nombre : 'Animal'}">Rocky</a>
                            </div>
                        </div>

                        <div class="row-cell" style="flex: 1.5; justify-content: center;">
                            <span class="badge-premium"
                                  th:classappend="${i.estado == 'COMPLETADA' ? 'success' : 
                                                  (i.estado == 'CANCELADA' ? 'danger' : 
                                                  (i.estado == 'PENDIENTE_FIRMA' ? 'primary' : 
                                                  (i.estado == 'EN_PERIODO_ADAPTACION' ? 'warning' : 'info')))}"
                                  th:text="${i.estado != null ? #strings.replace(#strings.capitalize(#strings.toLowerCase(i.estado)), '_', ' ') : 'En proceso'}">Completada</span>
                        </div>

                        <div class="row-cell"
                            style="flex: 1.5; justify-content: center; font-weight: 600; color: var(--text-muted);"
                            th:text="${i.fechaAdopcion != null ? i.fechaAdopcion : '-'}">01/01/2023</div>

                        <div class="row-cell" style="flex: 1.2; justify-content: center; gap: 8px;">
                            <a class="btn-icon" th:href="@{/web/adopciones/{id}/contrato(id=${i.id})}"
                                title="Descargar Contrato" target="_blank" style="color: #4a90e2;">
                                <i data-lucide="file-signature" style="width: 16px;"></i>
                            </a>
                            <a class="btn-icon" th:href="@{/web/adopciones/{id}/editar(id=${i.id})}"
                                title="Editar">
                                <i data-lucide="edit-2" style="width: 16px;"></i>
                            </a>
                            <button class="btn-icon delete"
                                th:hx-post="@{/web/adopciones/{id}/borrar(id=${i.id})}"
                                th:hx-target="'#row-' + ${i.id}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar inscripción?">
                                <i data-lucide="trash-2" style="width: 16px;"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Paginación -->
                <div th:replace="~{fragments/pagination :: controls(pagination=${pagination}, url='/web/adopciones', target='#adopcion-results')}"></div>

                <div th:if="${#lists.isEmpty(adopciones)}"
                    style="text-align:center; padding:5rem; background:white; border-radius:24px; border:1px solid var(--border); margin-top: 1rem;">
                    <i data-lucide="heart-off"
                        style="width:48px; height:48px; margin-bottom:1rem; color: var(--text-muted); opacity: 0.3;"></i>
                    <p style="color: var(--text-muted); font-weight: 600;" th:text="#{adopcion.list.empty}">No hay
                        adopciones registradas.</p>
                </div>
            </div>
        </div>

</div>
</body>

</html>
