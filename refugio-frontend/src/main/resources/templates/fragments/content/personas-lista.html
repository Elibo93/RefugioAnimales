<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
    <div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar" style="display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: nowrap;">
                <div style="display:flex; align-items:center; gap:20px; flex: 1;">
                    <span class="user-name page" style="white-space: nowrap; margin: 0;" th:text="#{persona.list.title}">personas</span>
                    
                    <!-- Role Filter Form (Standard GET for maximum reliability) -->
                    <form action="/web/personas" method="get" 
                          style="display:flex; align-items:center; gap:8px; background: var(--bg-main); padding: 4px 8px; border-radius: 12px; border: 1px solid var(--border);">
                        
                        <div style="display:flex; align-items:center; gap:6px; padding: 0 8px;">
                            <i data-lucide="filter" style="width:14px; color:var(--text-muted);"></i>
                            <select name="rol" autocomplete="off" class="form-control" style="width:auto; height:32px; padding:0 5px; border-radius:6px; border:none; background:transparent; font-size:0.9rem; font-weight:500; cursor:pointer;">
                                <option value="ALL" th:selected="${selectedRol == 'ALL'}">Todos los roles</option>
                                <option value="ROLE_PUBLICO" th:selected="${selectedRol == 'ROLE_PUBLICO'}">Simpatizantes</option>
                                <option value="ROLE_VOLUNTARIO" th:selected="${selectedRol == 'ROLE_VOLUNTARIO'}">Voluntarios</option>
                                <option value="ROLE_ADOPTANTE" th:selected="${selectedRol == 'ROLE_ADOPTANTE'}">Adoptantes</option>
                                <option value="ROLE_ADMIN" th:selected="${selectedRol == 'ROLE_ADMIN'}">Administradores</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="height:30px; padding: 0 12px; font-size: 0.8rem; border-radius: 8px;">
                            Filtrar
                        </button>
                        
                        <a th:href="@{/web/personas}" class="btn btn-secondary" 
                           style="height:30px; padding: 0 12px; font-size: 0.8rem; border-radius: 8px; display: flex; align-items: center; text-decoration: none;">
                            Limpiar
                        </a>
                    </form>
                </div>

                <div style="display:flex; gap:10px; flex-shrink: 0;">
                    <a class="btn btn-secondary" th:href="@{/web/personas/pdf(rol=${selectedRol})}" target="_blank">
                        <i data-lucide="file-text" style="width:18px;"></i>
                        <span th:text="#{generic.link.export.pdf}">Exportar PDF</span>
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/personas/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo persona</span>
                    </a>
                </div>
            </div>

            <table id="tablapersonas">
                <thead>
                    <tr>
                        <th th:text="#{persona.table.header.id}">ID</th>
                        <th th:text="#{persona.table.header.name}">Nombre</th>
                        <th th:text="#{persona.table.header.apellido}">Apellido</th>
                        <th th:text="#{persona.table.header.rol}">Rol</th>
                        <th th:text="#{persona.table.header.email}">Email</th>
                        <th th:text="#{persona.table.header.telefono}">Tlf</th>
                        <th th:text="#{persona.table.header.action}">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-personas-body">
                    <tr th:each="a : ${personas}" th:id="'row-' + ${a.get('id')}"
                        th:attr="data-id=${a.get('id')}, data-email=${a.get('email')}, data-tlf=${a.get('telefono')}">

                        <td th:text="${a.get('id')}">1</td>
                        <td>
                            <a th:href="@{/web/personas/{id}(id=${a.get('id')})}" 
                               style="font-weight:600; color:var(--primary); text-decoration: none; display: block;" 
                               th:text="${a.get('nombre')}">Juan</a>
                        </td>
                        <td>
                            <a th:href="@{/web/personas/{id}(id=${a.get('id')})}" 
                               style="color:var(--text-main); text-decoration: none; display: block;" 
                               th:text="${a.get('apellido')}">Pérez</a>
                        </td>
                        <td><span class="badge-soon" style="background:#F1F5F9; color:#64748B;"
                                th:text="${a.get('rol')}">ROLE_ADMIN</span></td>
                        <td class="col-email" th:text="${a.get('email')}">juan@mail.com</td>
                        <td class="col-tlf" th:text="${a.get('telefono')}">600...</td>
                        <td style="display:flex; gap:8px;">
                            <a class="btn-icon" th:href="@{/web/personas/{id}/editar(id=${a.get('id')})}">
                                <i data-lucide="edit-2" style="width:16px;"></i>
                            </a>
                            <button class="btn-icon delete" hx-post
                                th:hx-post="@{/web/personas/{id}/borrar(id=${a.get('id')})}" hx-target
                                th:hx-target="'#row-' + ${a.get('id')}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar persona?">
                                <i data-lucide="trash-2" style="width:16px;"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(personas)}" style="text-align:center; padding:3rem; color:var(--text-muted);">
                <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; opacity:0.5;"></i>
                <p th:text="#{persona.list.empty}">No hay personas registradas.</p>
            </div>
        </div>

    </div>
</body>

</html>
