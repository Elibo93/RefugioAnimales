<!-- Vista de Listado de Personas: Gestión administrativa de usuarios con filtros de búsqueda y rol -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">

        <div class="table-wrapper">
            <div class="actions-bar"
                style="display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: nowrap;">
                <div style="display:flex; align-items:center; gap:20px; flex: 1;">
                    <span class="user-name page" style="white-space: nowrap; margin: 0;"
                        th:text="#{persona.list.title}">personas</span>

                    <!-- Buscador y Filtro Reactivo -->
                    <div style="display: flex; align-items: center; gap: 12px; flex: 1; max-width: 600px;">
                        <!-- Barra de Búsqueda -->
                        <div style="position: relative; flex: 1;">
                            <i data-lucide="search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--text-muted);"></i>
                            <input type="text" 
                                   id="personas-search-input"
                                   name="q" 
                                   th:value="${query}"
                                   placeholder="Buscar por nombre, usuario, email..." 
                                   class="form-control"
                                   style="padding-left: 38px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); width: 100%; font-size: 0.9rem;"
                                   th:hx-get="@{/web/personas}"
                                   hx-trigger="keyup delay:800ms, search"
                                   hx-vals='{"page": 1}'
                                   hx-target="#personas-results-container"
                                   hx-select="#personas-results-container"
                                   hx-swap="outerHTML"
                                   hx-include="#personas-role-select">
                        </div>

                        <!-- Selector de Rol -->
                        <div style="position: relative; min-width: 180px;">
                            <i data-lucide="filter" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-muted);"></i>
                            <select id="personas-role-select"
                                    name="rol" 
                                    class="form-control"
                                    style="padding-left: 35px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 0.9rem; cursor: pointer; width: 100%;"
                                    th:hx-get="@{/web/personas}"
                                    hx-trigger="change"
                                    hx-vals='{"page": 1}'
                                    hx-target="#personas-results-container"
                                    hx-select="#personas-results-container"
                                    hx-swap="outerHTML"
                                    hx-include="#personas-search-input">
                                <option value="ALL" th:selected="${selectedRol == 'ALL' or selectedRol == null}">Todos los roles</option>
                                <option value="ROLE_PUBLICO" th:selected="${selectedRol == 'ROLE_PUBLICO'}">Simpatizantes</option>
                                <option value="ROLE_VOLUNTARIO" th:selected="${selectedRol == 'ROLE_VOLUNTARIO'}">Voluntarios</option>
                                <option value="ROLE_ADOPTANTE" th:selected="${selectedRol == 'ROLE_ADOPTANTE'}">Adoptantes</option>
                                <option value="ROLE_ADMIN" th:selected="${selectedRol == 'ROLE_ADMIN'}">Administradores</option>
                            </select>
                        </div>

                        <a th:href="@{/web/personas}" 
                           hx-target="#personas-results-container"
                           hx-select="#personas-results-container"
                           hx-swap="outerHTML"
                           class="btn-icon" 
                           title="Limpiar filtros"
                           style="background: var(--bg-main); border: 1px solid var(--border); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-muted);">
                            <i data-lucide="refresh-cw" style="width: 16px;"></i>
                        </a>
                    </div>
                </div>

                <div style="display:flex; gap:10px; flex-shrink: 0;">
                    <a th:href="@{/web/personas/pdf(rol=${selectedRol})}" target="_blank" title="Exportar listado a PDF" style="display: flex; align-items: center; justify-content: center; transition: transform 0.2s; padding: 0 4px;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/pdf.png" alt="PDF" style="height: 48px; width: 48px; object-fit: contain;">
                    </a>
                    <a th:href="@{/web/personas/excel(rol=${selectedRol})}" target="_blank" title="Exportar listado a Excel" style="display: flex; align-items: center; justify-content: center; transition: transform 0.2s; padding: 0 4px;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/excel.png" alt="Excel" style="height: 48px; width: 48px; object-fit: contain;">
                    </a>
                    <a class="btn btn-primary" th:href="@{/web/personas/nuevo}">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{generic.link.create}">+ Nuevo persona</span>
                    </a>
                </div>
            </div>

            <!-- LISTA PREMIUM DE PERSONAS -->
            <div class="premium-list-container" style="margin-top: 1.5rem;">
                <!-- Encabezados -->
                <div class="list-header"
                    style="background: transparent; padding: 0 1.5rem 1rem; display: flex; align-items: center; gap: 1rem;">
                    <div style="flex: 0.5; text-align: center;">ID</div>
                    <div style="flex: 3;">Nombre Completo</div>
                    <div style="flex: 2; text-align: center;">Rol de Sistema</div>
                    <div style="flex: 3; text-align: center;">Datos de Contacto</div>
                    <div style="flex: 2; text-align: center;">Acciones</div>
                </div>

                <div id="personas-results-container">
                <div class="list-body" th:fragment="list-body" style="display: flex; flex-direction: column; gap: 12px; margin-top: 1rem;">
                    <!-- Mensaje si no hay resultados -->
                    <div th:if="${#lists.isEmpty(personas)}" 
                          style="background: white; padding: 4rem 2rem; border-radius: 16px; border: 1px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center;">
                        <div style="background: var(--bg-main); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="search-x" style="width: 32px; color: var(--text-muted);"></i>
                        </div>
                        <div>
                            <h3 style="margin: 0; color: var(--text-main); font-weight: 700;">No se encontraron personas</h3>
                            <p style="margin: 5px 0 0; color: var(--text-muted); font-size: 0.9rem;">Prueba con otros términos de búsqueda o filtros.</p>
                        </div>
                        <a th:href="@{/web/personas}" 
                           hx-get="/web/personas" 
                           hx-target="#personas-results-container"
                           hx-select="#personas-results-container"
                           hx-swap="outerHTML"
                           class="btn-premium secondary" style="height: 40px; padding: 0 1.5rem;">
                            Ver todos
                        </a>
                    </div>

                    <div th:each="a : ${personas}" class="premium-row-card" th:id="'row-' + ${a.id}">
                        <!-- ID -->
                        <div class="row-cell"
                            style="flex: 0.5; justify-content: center; font-weight: 700; color: var(--text-muted);"
                            th:text="${a.id}">1</div>

                        <!-- Nombre -->
                        <div class="row-cell" style="flex: 3;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="task-icon-box"
                                    th:style="'background: ' + (${a.rol == 'ROLE_ADMIN' ? '#fee2e2' : (a.rol == 'ROLE_VOLUNTARIO' ? '#e0f2fe' : '#dcfce7')})">
                                    <i th:data-lucide="${a.rol == 'ROLE_ADMIN' ? 'shield' : (a.rol == 'ROLE_VOLUNTARIO' ? 'clipboard-list' : 'heart')}"
                                        th:style="'width: 18px; color: ' + (${a.rol == 'ROLE_ADMIN' ? '#ef4444' : (a.rol == 'ROLE_VOLUNTARIO' ? '#0ea5e9' : '#22c55e')})"></i>
                                </div>
                                <div>
                                    <a th:href="@{/web/personas/{id}(id=${a.id})}"
                                        style="display: block; font-weight: 800; color: var(--text-main); font-size: 1rem; text-decoration: none;"
                                        th:text="${a.nombre != null && !#strings.isEmpty(a.nombre) ? (a.nombre + ' ' + (a.apellido ?: '')) : a.username}">Juan Pérez</a>
                                    <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 500;"
                                        th:text="${'@' + a.username}">@juanp</span>
                                </div>
                            </div>
                        </div>

                        <!-- Rol -->
                        <div class="row-cell" style="flex: 2; justify-content: center;">
                            <span class="badge-premium"
                                th:classappend="${a.rol == 'ROLE_ADMIN' ? 'danger' : (a.rol == 'ROLE_VOLUNTARIO' ? 'info' : (a.rol == 'ROLE_ADOPTANTE' ? 'primary' : 'success'))}"
                                th:text="${#strings.capitalize(#strings.toLowerCase(#strings.replace(a.rol.toString().replace('ROLE_', ''), '_', ' ')))}">Rol</span>
                        </div>

                        <!-- Contacto -->
                        <div class="row-cell"
                            style="flex: 3; display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: center;">
                            <div
                                style="display: flex; align-items: center; gap: 6px; color: var(--text-main); font-weight: 600; font-size: 0.9rem;">
                                <i data-lucide="mail" style="width: 14px; color: var(--text-muted);"></i>
                                <span th:text="${a.email}">juan@mail.com</span>
                            </div>
                            <div
                                style="display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.8rem;">
                                <i data-lucide="phone" style="width: 12px;"></i>
                                <span
                                    th:text="${a.telefono != null ? a.telefono : 'Sin teléfono'}">600...</span>
                            </div>
                        </div>

                        <!-- Acciones -->
                        <div class="row-cell" style="flex: 2; justify-content: center; gap: 12px;">
                            <a class="btn-icon" th:href="@{/web/personas/{id}/editar(id=${a.id})}"
                                title="Editar">
                                <i data-lucide="edit-2" style="width: 18px;"></i>
                            </a>
                            <button class="btn-icon delete" th:hx-post="@{/web/personas/{id}/borrar(id=${a.id})}"
                                th:hx-target="'#row-' + ${a.id}" hx-swap="outerHTML swap:0.3s"
                                hx-confirm="¿Eliminar persona?">
                                <i data-lucide="trash-2" style="width: 18px;"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Paginación Premium -->
                <div th:replace="~{fragments/pagination :: controls(pagination=${pagination}, target='#personas-results-container', url='/web/personas')}" style="margin-top: 1.5rem;"></div>
            </div>

            </div>
        </div>
    </div>

    </div>
</body>

</html>
