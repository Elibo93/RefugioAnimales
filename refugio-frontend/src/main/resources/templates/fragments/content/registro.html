<div th:fragment="content" style="max-width: 400px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: var(--shadow-lg); border: 1px solid var(--border);">
    <h2 style="text-align: center; margin-bottom: 25px; color: var(--text-main); font-weight: 800;" th:text="#{auth.register.title}">Crear una cuenta</h2>
    
    <form th:action="@{/web/registro}" method="post" style="display: flex; flex-direction: column; gap: 15px;">
        <div th:if="${param.error}" style="background-color: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; font-weight: 600; text-align: center; margin-bottom: 10px;" th:text="${param.error}">
            Mensaje de error
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600; color: var(--text-main);">Nombre de usuario:</label>
            <input type="text" name="username" required placeholder="Ej: pedro_88" 
                   style="padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.2s;" 
                   onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='#e2e8f0'" />
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600; color: var(--text-main);" th:text="#{auth.login.email}">Email:</label>
            <input type="email" name="email" required placeholder="tu@email.com" 
                   style="padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.2s;" 
                   onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='#e2e8f0'" />
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600; color: var(--text-main);" th:text="#{auth.login.password}">Contraseña:</label>
            <input type="password" name="password" required placeholder="••••••••" 
                   style="padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.2s;" 
                   onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='#e2e8f0'" />
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 10px; padding: 14px; border-radius: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;" th:text="#{auth.register.btn.submit}">Unirme al refugio</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; font-size: 0.95rem; color: var(--text-muted);">
        ¿Ya tienes cuenta? <a th:href="@{/login}" style="color: var(--primary); text-decoration: none; font-weight: 600;" th:text="#{auth.register.link.login}">Inicia sesión</a>
    </div>
</div>
