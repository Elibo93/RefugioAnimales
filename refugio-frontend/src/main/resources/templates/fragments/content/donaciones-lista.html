<!-- Vista de Listado de Donaciones: Panel administrativo para auditar todas las aportaciones recibidas -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
        <!-- Impact Section (Ahora filtrado dentro del fragmento para admin/user) -->
        <div th:replace="~{fragments/content/donacion-impacto :: impact}"></div>

        <!-- Integrated Donation Form (Oculto para admin para una vista de lista pura) -->
        <div th:if="${isAdmin == null or !isAdmin}" th:replace="~{fragments/content/donacion-formulario :: content}">
        </div>

        <!-- Panel de Lista para Admin -->
        <div class="table-wrapper"
            style="margin-top: 2rem; padding: 2rem; background: transparent; border: none; box-shadow: none;"
            th:if="${isAdmin}">

            <!-- Cabecera de Auditoría -->
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h2 style="font-weight: 800; color: var(--text-main); margin: 0; font-size: 1.85rem; letter-spacing: -0.02em;"
                        th:text="#{donacion.list.title}">Registro de Donaciones</h2>
                    <p style="color: var(--text-muted); margin-top: 0.25rem;">Historial completo e inmutable de
                        aportaciones al refugio</p>
                </div>
                <div style="display: flex; gap: 0.75rem;">
                    <a th:href="@{/web/donaciones/pdf}" target="_blank" class="btn"
                        style="padding: 0.7rem 1.25rem; border-radius: 14px; font-weight: 700; background: white; border: 1px solid #e2e8f0; color: #64748b; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm);">
                        <i data-lucide="download" style="width: 18px;"></i>
                        <span>Exportar Informe</span>
                    </a>
                </div>
            </div>

            <!-- LISTA PREMIUM DE DONACIONES -->
            <div class="premium-list-container">
                <!-- Encabezados -->
                <div class="list-header" style="background: transparent; padding: 0 3rem 1rem; display: flex; align-items: center; gap: 2rem;">
                    <div style="flex: 2;">Donante</div>
                    <div style="flex: 1.2; text-align: center;">Tipo</div>
                    <div style="flex: 1.2; text-align: center;">Cantidad</div>
                    <div style="flex: 1.2; text-align: center;">Fecha</div>
                    <div style="flex: 2.5; padding-left: 2rem;">Descripción</div>
                </div>

                <div class="list-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div th:each="d : ${donaciones}" class="premium-row-card" style="display: flex; align-items: center; padding: 1.5rem 3rem; gap: 2rem;">
                        <!-- Donante -->
                        <div class="row-cell" style="flex: 2; min-width: 180px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="task-icon-box" style="background: #f0fdf4; flex-shrink: 0;">
                                    <i data-lucide="user" style="width: 18px; color: var(--primary);"></i>
                                </div>
                                <div th:with="u=${usuariosMap != null and d.usuarioId != null ? usuariosMap.get(d.usuarioId) : null}" style="overflow: hidden;">
                                    <span style="display: block; font-weight: 700; color: var(--text-main); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" 
                                          th:text="${u != null ? (u.username == 'anonimo' ? 'Donante Anónimo' : u.username) : 'Donante Anónimo'}"></span>
                                    <span style="font-size: 0.75rem; color: var(--text-muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" 
                                          th:text="${u != null and u.username != 'anonimo' ? u.email : 'Contribución sin registro'}"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Tipo -->
                        <div class="row-cell" style="flex: 1.2; justify-content: center; display: flex;">
                            <span class="badge-premium info" style="min-width: 85px; text-align: center;"
                                  th:with="tipo=${d['tipo']}"
                                  th:text="${tipo != null ? #strings.replace(tipo, '_', ' ') : '-'}">DINERO</span>
                        </div>

                        <!-- Cantidad -->
                        <div class="row-cell" style="flex: 1.2; justify-content: center; display: flex; align-items: baseline; gap: 2px;">
                            <span style="font-weight: 800; color: var(--text-main); font-size: 1.15rem;" th:text="${d['cantidad']}">100.0</span>
                            <span style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted);">€</span>
                        </div>

                        <!-- Fecha -->
                        <div class="row-cell" style="flex: 1.2; justify-content: center; display: flex;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                                <div style="font-size: 0.9rem; font-weight: 700; color: var(--text-main); white-space: nowrap;" 
                                     th:text="${d['fecha'] != null ? #strings.substring(d['fecha'].toString().replace('T', ' '), 0, 10) : '-'}">2026-05-07</div>
                                <span class="badge-premium warning" style="font-size: 0.65rem; padding: 2px 8px; width: fit-content;"
                                      th:text="${d['frecuencia']}">UNICA</span>
                            </div>
                        </div>

                        <!-- Descripción -->
                        <div class="row-cell" style="flex: 2.5; padding-left: 2rem; border-left: 1px solid #f1f5f9;">
                            <p style="color: var(--text-muted); font-size: 0.85rem; margin: 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;" 
                               th:text="${d['descripcion']} ?: 'Sin descripción'">Descripción...</p>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(donaciones)}" style="text-align:center;padding:4rem;background:white;border-radius:24px;border: 1px solid var(--border);">
                    <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; color: var(--text-muted); opacity: 0.3;"></i>
                    <p style="color: var(--text-muted); font-weight: 600;">No hay donaciones registradas aún.</p>
                </div>
            </div>
        </div>

        <!-- Script para iconos -->
        <script th:if="${isAdmin}">
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        </script>
    </div>
</body>

</html>
