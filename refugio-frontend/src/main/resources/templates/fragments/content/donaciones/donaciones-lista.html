<!-- Vista de Listado de Donaciones: Panel administrativo para auditar todas las aportaciones recibidas -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
</head>

<body>
<div th:fragment="content">
        <!-- Impact Section (Ahora filtrado dentro del fragmento para admin/user) -->
        <div th:replace="~{fragments/content/donaciones/donacion-impacto :: impact}"></div>

        <!-- Integrated Donation Form (Ocultable para el administrador) -->
        <div id="donacion-form-container"
             th:style="${isAdmin} ? 'display: none; opacity: 0; transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);' : ''">
             <div th:replace="~{fragments/content/donaciones/donacion-formulario :: content}"></div>
        </div>

        <!-- Panel de Lista para Admin -->
        <div class="table-wrapper"
            style="padding-top: 1.7rem;"
            th:if="${isAdmin}">

            <!-- BARRA DE ACCIONES SUPERIOR -->
            <div class="actions-bar admin-actions-bar" style="border-bottom: 1px solid var(--border); padding-bottom: 1.7rem; margin-bottom: 2rem;">
                
                <!-- 1. TÍTULO E ICONO -->
                <div class="admin-title-container">
                    <div class="admin-title-icon-box">
                        <i data-lucide="coins" style="width: 24px;"></i>
                    </div>
                    <div>
                        <h1 class="admin-title-text" th:text="#{donacion.list.title}">Registro de Donaciones</h1>
                        <p class="admin-title-desc" th:text="#{donacion.auto.gestiona.aportaciones}">Historial de aportaciones</p>
                    </div>
                </div>

                <!-- 2. FILTROS Y BÚSQUEDA (Centrados) -->
                <div class="admin-filters-container">
                    <!-- Espacio para futuros filtros -->
                </div>

                <!-- 3. ACCIONES Y EXPORTACIÓN -->
                <div class="admin-actions-group">
                    <a th:href="@{/web/donaciones/pdf}" target="_blank" title="Exportar listado a PDF" class="admin-export-btn" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/pdf.png" alt="PDF" class="admin-export-img">
                    </a>
                    <a th:href="@{/web/donaciones/excel}" target="_blank" title="Exportar listado a Excel" class="admin-export-btn" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        <img src="/images/excel.png" alt="Excel" class="admin-export-img">
                    </a>
                    <button id="btn-admin-donar" class="btn btn-primary">
                        <i data-lucide="plus" style="width:18px;"></i>
                        <span th:text="#{donacion.auto.registrar.aportacion}">+ Registrar</span>
                    </button>
                </div>
            </div>

            <!-- LISTA PREMIUM DE DONACIONES -->
            <div id="donacion-results-container" class="premium-list-container">
                <div th:fragment="list-body">
                <!-- Encabezados -->
                <div class="premium-grid-header grid-cols-donaciones admin-list-header">
                    <div class="cell-left" th:text="#{donacion.auto.donante}"></div>
                    <div class="cell-center" th:text="#{donacion.auto.tipo}"></div>
                    <div class="cell-center" th:text="#{donacion.auto.cantidad}"></div>
                    <div class="cell-center" th:text="#{generic.auto.fecha}"></div>
                    <div class="cell-center" th:text="#{generic.auto.descripcion}"></div>
                </div>

                <div class="list-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div th:each="d : ${donaciones}" class="premium-row-card borderless premium-grid-row grid-cols-donaciones">
                        <!-- Donante -->
                        <div class="row-cell cell-left">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="task-icon-box" style="background: #f0fdf4; flex-shrink: 0;">
                                    <i data-lucide="user" style="width: 18px; color: var(--primary);"></i>
                                </div>
                                <div th:with="u=${usuariosMap != null and d.usuarioId != null ? usuariosMap.get(d.usuarioId) : null}" style="overflow: hidden;">
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <span style="color: #94a3b8; font-weight: 700; font-size: 0.8rem;" th:text="${'#' + d.id}"></span>
                                        <span style="display: block; font-weight: 700; color: var(--text-main); font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" 
                                              th:text="${u != null ? (u.username == 'anonimo' ? #messages.msg('donacion.auto.donante.anonimo') : u.username) : #messages.msg('donacion.auto.donante.anonimo')}"></span>
                                    </div>
                                    <span style="font-size: 0.75rem; color: var(--text-muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" 
                                          th:text="${u != null and u.username != 'anonimo' ? u.email : #messages.msg('donacion.auto.contribucion.sin.registro')}"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Tipo -->
                        <div class="row-cell cell-center">
                            <span class="badge-premium info" style="min-width: 85px; text-align: center;"
                                  th:text="${d.tipo != null ? #messages.msg('enum.TipoDonacion.' + d.tipo) : '-'}">DINERO</span>
                        </div>

                        <!-- Cantidad -->
                        <div class="row-cell cell-center" style="align-items: baseline; gap: 2px;">
                            <span style="font-weight: 800; color: var(--text-main); font-size: 1.15rem;" th:text="${d.cantidad}">100.0</span>
                            <span style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted);">€</span>
                        </div>

                        <!-- Fecha -->
                        <div class="row-cell cell-center">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                                <div style="font-size: 0.9rem; font-weight: 700; color: var(--text-main); white-space: nowrap;" 
                                     th:text="${d.fecha != null ? #strings.substring(d.fecha.toString().replace('T', ' '), 0, 10) : '-'}">2026-05-07</div>
                                <span class="badge-premium warning" style="font-size: 0.65rem; padding: 2px 8px; width: fit-content;"
                                      th:text="#{enum.FrecuenciaDonacion.__${d.frecuencia}__}">UNICA</span>
                            </div>
                        </div>

                        <!-- Descripción -->
                        <div class="row-cell cell-center" style="border-left: 1px solid #f1f5f9; justify-content: center; width: 100%;">
                            <p style="color: var(--text-muted); font-size: 0.85rem; margin: 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: center; width: 100%;" 
                               th:text="${d.descripcion} ?: #{generic.auto.sin.descripcion}">Descripción...</p>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(donaciones)}" style="text-align:center;padding:4rem;background:white;border-radius:24px;border: 1px solid var(--border);">
                    <i data-lucide="inbox" style="width:48px; height:48px; margin-bottom:1rem; color: var(--text-muted); opacity: 0.3;"></i>
                    <p style="color: var(--text-muted); font-weight: 600;" th:text="#{donacion.auto.no.hay.donaciones.registradas.aun}"></p>
                </div>
                </div>

                <!-- Paginación -->
                <div th:replace="~{fragments/pagination :: controls(pagination=${pagination}, url='/web/donaciones', target='#donacion-results-container')}"></div>

            </div>
        </div>

        <!-- Script para iconos -->
        <script th:if="${isAdmin}">
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        </script>
    </div>
</body>

</html>
