<!-- Fragmento de Scripts: Importación de librerías externas (HTMX, Lucide) y configuración de lógica global del cliente -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="scripts" th:remove="tag">
    <!-- Librerías Externas -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Scripts Estáticos (Lógica Principal) -->
    <script th:src="@{/js/scripts.js}"></script>
    
    <script>
        // --- CONFIGURACIÓN GLOBAL DE HTMX ---

        // Integración de Token CSRF para peticiones HTMX
        document.body.addEventListener('htmx:configRequest', function(evt) {
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]');
            const csrfToken = document.querySelector('meta[name="_csrf"]');
            if (csrfHeader && csrfToken && evt.detail.verb !== "get") {
                const headerName = csrfHeader.getAttribute('content');
                const token = csrfToken.getAttribute('content');
                if (headerName && token) {
                    evt.detail.headers[headerName] = token;
                }
            }
        });

        // Reinicialización de componentes tras actualizaciones de HTMX
        document.body.addEventListener('htmx:afterSettle', (evt) => {
            const target = evt.detail.target;
            const targetId = target ? target.id : '';
            const targetClass = target ? target.className : '';
            
            console.log(`DEBUG HTMX: afterSettle en #${targetId} .${targetClass}`);

            // Bloquear scroll si hay un modal abierto
            if (targetId === 'modal-host') {
                if (target.innerHTML.trim() !== '') {
                    document.body.classList.add('modal-open');
                }
            }

            // Excluir explícitamente el badge de notificaciones y cualquier elemento dentro de él
            const isNotification = targetId === 'notif-badge-container' || 
                                 (target && typeof target.closest === 'function' && target.closest('#notif-badge-container')) ||
                                 targetClass.includes('notification-badge');

            if (typeof refreshDynamicComponents === 'function' && !isNotification) {
                console.log("DEBUG HTMX: Ejecutando refreshDynamicComponents");
                refreshDynamicComponents();
            } else if (window.lucide && target) {
                // Si es una actualización menor, solo refrescamos iconos DENTRO del elemento afectado
                lucide.createIcons({
                    attrs: { 'class': 'lucide' },
                    nameAttr: 'data-lucide',
                    root: target
                });
            }
        });

        // Gestión de estados de carga en formularios
        document.addEventListener('submit', function (e) {
            const form = e.target;
            const btn = form.querySelector('[type="submit"]');
            if (btn && !btn.hasAttribute('data-no-loading')) {
                const btnText = btn.querySelector('.btn-text') || btn;
                btn.disabled = true;
                if (btnText === btn) {
                    btn.dataset.originalText = btn.textContent;
                    btn.textContent = "Guardando...";
                } else {
                    btnText.dataset.originalText = btnText.textContent;
                    btnText.textContent = "Guardando...";
                }
            }
        });

        // Listener para Toasts disparados desde el servidor (HX-Trigger)
        document.body.addEventListener('showToast', function(evt) {
            const message = evt.detail.message || evt.detail;
            const type = evt.detail.type || 'success';
            if (typeof showToast === 'function') {
                showToast(message, type);
            }
        });

        // Disparo de carga inicial
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
        });
    </script>
</div>
</html>
