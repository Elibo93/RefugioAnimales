<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">

<head th:replace="~{fragments/head :: head(#{app.name})}">
    <title>Refugio</title>
</head>

<body class="bg-dots">
    <div th:replace="~{fragments/sidebar :: sidebar(${currentUri})}"></div>
    <header th:replace="~{fragments/header :: header(${currentUri}, ${currentUri != '/web/home' and currentUri != '/web/home/' and currentUri != '/'})}"></header>

    <div th:replace="~{fragments/toast :: toast}"></div>

    <main id="contenido-dinamico" style="padding-bottom: 60px;">
        <div th:replace="~{${content} :: content}">
            Contenido principal
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div id="modal-host"></div>
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
