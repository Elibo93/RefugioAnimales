server:
  port: 8083
  forward-headers-strategy: native

spring:
  application:
    name: refugio-auth
  cloud:
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT_AUTH}/${DB_NAME_AUTH}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Configuración JWT con lectura de Variables de Entorno y Fallback Local para el TFG
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
